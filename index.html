<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ووردلات</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');

        * { font-family: 'Tajawal', sans-serif; box-sizing: border-box; }

        :root {
            --correct-color: #538d4e;
            --present-color: #b59f3b;
            --absent-color: #3a3a3c;
            --bg-gradient: linear-gradient(180deg, #121213 0%, #050505 100%);
            --surface-color: rgba(30, 30, 32, 0.7);
            --text-color: #ffffff;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        .light-mode {
            --bg-gradient: linear-gradient(180deg, #f8f9fa 0%, #e9ecef 100%);
            --surface-color: rgba(255, 255, 255, 0.8);
            --text-color: #121213;
            --border-color: rgba(0, 0, 0, 0.1);
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in { animation: fadeInUp 0.6s ease-out forwards; }

        .glass-card {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .glass-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--correct-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        .icon-box {
            width: 18px;
            height: 18px;
            border-radius: 4px;
        }

        .preview-tile {
            width: 2.2rem;
            height: 2.2rem;
            border-radius: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.85rem;
            color: white;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--absent-color); border-radius: 10px; }
    </style>
</head>
<body class="p-0 m-0">

    <header class="sticky top-0 z-50 w-full border-b border-[var(--border-color)] backdrop-blur-md bg-opacity-80 flex justify-between items-center px-6 py-4">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-[var(--correct-color)] rounded-lg flex items-center justify-center">
                <i class="fas fa-layer-group text-white text-sm"></i>
            </div>
            <span class="text-xl font-black tracking-tighter">ووردلات</span>
        </div>
        <button id="themeToggle" class="w-10 h-10 rounded-xl bg-[var(--surface-color)] border border-[var(--border-color)] flex items-center justify-center transition-all">
            <i class="fas fa-sun text-lg text-yellow-500"></i>
        </button>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full px-6 py-12">
        
        <div class="mb-12 text-center animate-fade-in" style="animation-delay: 0.1s;">
            <h2 class="text-4xl font-extrabold mb-3">مرحباً 👋</h2>
            <p class="text-[var(--text-muted)] opacity-70">اختر التحدي الذي يناسبك وابدأ اللعب.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <a href="words.html" class="game-card glass-card rounded-3xl p-10 flex flex-col items-center text-center gap-8 no-underline group animate-fade-in" style="animation-delay: 0.2s;">
                <div class="icon-grid">
                    <div class="icon-box bg-[var(--correct-color)]"></div><div class="icon-box bg-[var(--absent-color)]"></div><div class="icon-box bg-[var(--present-color)]"></div>
                    <div class="icon-box bg-[var(--absent-color)]"></div><div class="icon-box bg-[var(--correct-color)]"></div><div class="icon-box bg-[var(--absent-color)]"></div>
                    <div class="icon-box bg-[var(--present-color)]"></div><div class="icon-box bg-[var(--absent-color)]"></div><div class="icon-box bg-[var(--correct-color)]"></div>
                </div>
                <div>
                    <h3 class="text-2xl font-bold mb-2">ووردل الحروف</h3>
                    <p class="text-sm opacity-60 leading-relaxed max-w-[200px]">خمن الكلمة المكونة من 5 حروف في 6 محاولات.</p>
                </div>
                <div class="flex gap-1.5 justify-center">
                    <div class="preview-tile bg-[var(--correct-color)]">ك</div>
                    <div class="preview-tile bg-[var(--present-color)]">ل</div>
                    <div class="preview-tile bg-[var(--absent-color)]">م</div>
                    <div class="preview-tile bg-[var(--correct-color)]">ا</div>
                    <div class="preview-tile bg-[var(--correct-color)]">ت</div>
                </div>
            </a>

            <a href="numbers.html" class="game-card glass-card rounded-3xl p-10 flex flex-col items-center text-center gap-8 no-underline group animate-fade-in" style="animation-delay: 0.3s;">
                <div class="icon-grid">
                    <div class="icon-box bg-[var(--present-color)]"></div><div class="icon-box bg-[var(--absent-color)]"></div><div class="icon-box bg-[var(--correct-color)]"></div>
                    <div class="icon-box bg-[var(--correct-color)]"></div><div class="icon-box bg-[var(--present-color)]"></div><div class="icon-box bg-[var(--absent-color)]"></div>
                    <div class="icon-box bg-[var(--absent-color)]"></div><div class="icon-box bg-[var(--correct-color)]"></div><div class="icon-box bg-[var(--present-color)]"></div>
                </div>
                <div>
                    <h3 class="text-2xl font-bold mb-2">ووردل الأرقام</h3>
                    <p class="text-sm opacity-60 leading-relaxed max-w-[200px]">خمن الرقم السري المكون من 5 خانات بذكاء.</p>
                </div>
                <div class="flex gap-1.5 justify-center">
                    <div class="preview-tile bg-[var(--correct-color)]">0</div>
                    <div class="preview-tile bg-[var(--present-color)]">3</div>
                    <div class="preview-tile bg-[var(--absent-color)]">9</div>
                    <div class="preview-tile bg-[var(--present-color)]">5</div>
                    <div class="preview-tile bg-[var(--correct-color)]">3</div>
                </div>
            </a>

            <a href="arrows.html" class="game-card glass-card rounded-3xl p-10 flex flex-col items-center text-center gap-8 no-underline group animate-fade-in" style="animation-delay: 0.4s;">
                <div class="icon-grid">
                    <div class="icon-box bg-[var(--correct-color)]"></div><div class="icon-box bg-[var(--absent-color)]"></div><div class="icon-box bg-[var(--correct-color)]"></div>
                    <div class="icon-box bg-[var(--absent-color)]"></div><div class="icon-box bg-[var(--present-color)]"></div><div class="icon-box bg-[var(--absent-color)]"></div>
                    <div class="icon-box bg-[var(--correct-color)]"></div><div class="icon-box bg-[var(--absent-color)]"></div><div class="icon-box bg-[var(--correct-color)]"></div>
                </div>
                <div>
                    <h3 class="text-2xl font-bold mb-2">ووردل الأسهم</h3>
                    <p class="text-sm opacity-60 leading-relaxed max-w-[200px]">خمن الاتجاهات الستة الصحيحة بدقة.</p>
                </div>
                <div class="flex gap-1.5 justify-center">
                    <div class="preview-tile bg-[var(--correct-color)]">↑</div>
                    <div class="preview-tile bg-[var(--present-color)]">↓</div>
                    <div class="preview-tile bg-[var(--absent-color)]">←</div>
                    <div class="preview-tile bg-[var(--correct-color)]">→</div>
                    <div class="preview-tile bg-[var(--present-color)]">↑</div>
                    <div class="preview-tile bg-[var(--correct-color)]">↓</div>
                </div>
            </a>

        </div>
    </main>

    <footer class="p-8 text-center text-xs opacity-20"></footer>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const icon = themeToggle.querySelector('i');
        const savedTheme = localStorage.getItem('pro_wordle_theme');
        
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            icon.className = 'fas fa-moon text-lg text-blue-500';
        }

        themeToggle.addEventListener('click', () => {
            const isLight = document.body.classList.toggle('light-mode');
            icon.className = isLight ? 'fas fa-moon text-lg text-blue-500' : 'fas fa-sun text-lg text-yellow-500';
            localStorage.setItem('pro_wordle_theme', isLight ? 'light' : 'dark');
        });
    </script>

</body>
</html>
