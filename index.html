<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ووردلات - ضد الكمبيوتر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        * { font-family: 'Tajawal', sans-serif; box-sizing: border-box; }
        :root {
            --correct-color: #538d4e;
            --present-color: #b59f3b;
            --absent-color: #3a3a3c;
            --bg-color: #121213;
            --bg-gradient: linear-gradient(180deg, #121213 0%, #050505 100%);
            --surface-color: rgba(30,30,32,0.85);
            --text-color: #ffffff;
            --border-color: rgba(255,255,255,0.1);
            --key-bg: rgba(255,255,255,0.08);
            --correct-glow: rgba(83,141,78,0.5);
        }
        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .game-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 10px;
            overflow: hidden;
            gap: 10px;
        }
        .opponent-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 15px 10px;
            position: relative;
        }
        .opponent-badge {
            position: absolute;
            top: -12px;
            background: #e74c3c;
            color: white;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 2px 12px;
            border-radius: 12px;
        }
        .opponent-grid { display: flex; flex-direction: column; gap: 4px; }
        .opp-row { display: flex; gap: 4px; justify-content: center; }
        .opp-tile {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            background: transparent;
            border: 1px solid var(--border-color);
        }
        @media (max-width: 480px) { .opp-tile { width: 22px; height: 22px; } }
        .opp-tile.correct { background: var(--correct-color); border-color: var(--correct-color); }
        .opp-tile.present { background: var(--present-color); border-color: var(--present-color); }
        .opp-tile.absent { background: var(--absent-color); border-color: var(--absent-color); }
        .vs-divider { display: flex; align-items: center; justify-content: center; width: 100%; height: 20px; }
        .vs-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); }
        .vs-text { margin: 0 10px; font-weight: 800; font-size: 0.8rem; color: rgba(255,255,255,0.5); }
        .player-area { flex: 2; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 5px; }
        .grid-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 6px; }
        .tile {
            width: clamp(45px, 12vw, 60px);
            height: clamp(45px, 12vw, 60px);
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 800;
            border-radius: 8px;
        }
        .tile.correct { background-color: var(--correct-color); border-color: var(--correct-color); }
        .tile.present { background-color: var(--present-color); border-color: var(--present-color); }
        .tile.absent { background-color: var(--absent-color); border-color: var(--absent-color); }
        #keyboard { padding-bottom: 10px; }
        .keyboard-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 6px; width: 100%; }
        .key {
            height: clamp(42px, 6vh, 58px);
            min-width: clamp(28px, 6vw, 43px);
            background-color: var(--key-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-weight: 700;
            font-size: clamp(0.85rem, 3vw, 1.1rem);
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            cursor: pointer;
        }
        .key.wide { min-width: 65px; }
        .key.enter { background-color: var(--correct-color); font-size: 0.8rem; }
        .key.backspace { background-color: #9b2335; }
        .key.correct { background-color: var(--correct-color); }
        .key.present { background-color: var(--present-color); }
        .key.absent { background-color: var(--absent-color); opacity: 0.4; }
        header {
            padding: 10px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .score-badge {
            background: rgba(255,255,255,0.1);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            gap: 8px;
        }
        .score-badge span:first-child { color: var(--correct-color); }
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--surface-color);
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border-color);
        }
        .word-choice-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .word-choice-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .word-choice-btn:hover { background: var(--correct-color); transform: scale(1.02); }
        .hidden { display: none; }
        button { cursor: pointer; }
        .custom-input {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            margin: 10px 0;
            text-align: center;
        }
        .btn-primary { background: var(--correct-color); color: white; border: none; padding: 8px 16px; border-radius: 8px; }
        .btn-secondary { background: rgba(255,255,255,0.2); color: white; border: none; padding: 8px 16px; border-radius: 8px; }
        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid var(--correct-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .round-buttons { display: flex; gap: 8px; justify-content: center; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div class="text-sm font-bold opacity-70"><i class="fas fa-robot ml-2"></i> ضد الكمبيوتر</div>
    <div class="score-badge">
        <span id="myScore">أنت: 0</span> | <span id="oppScore" class="text-red-400">الكمبيوتر: 0</span>
    </div>
    <div class="round-buttons">
        <button id="resetRoundBtn" class="bg-yellow-500/20 text-yellow-400 px-2 py-1 rounded text-xs">جولة جديدة</button>
        <button id="resetScoresBtn" class="bg-red-500/20 text-red-400 px-2 py-1 rounded text-xs">إعادة النقاط</button>
    </div>
</header>

<div class="game-wrapper">
    <div class="opponent-area">
        <div class="opponent-badge">الكمبيوتر</div>
        <div id="opponentGrid" class="opponent-grid"></div>
    </div>
    <div class="vs-divider">
        <div class="vs-line"></div>
        <div class="vs-text">أنت</div>
        <div class="vs-line"></div>
    </div>
    <div class="player-area">
        <div id="playerGrid"></div>
    </div>
    <div id="keyboard"></div>
</div>

<!-- نافذة اختيار الكلمة -->
<div id="wordSelectModal" class="modal hidden">
    <div class="modal-content">
        <h2 class="text-xl font-bold text-center mb-4">اختر كلمتك للكمبيوتر</h2>
        <div id="wordOptions" class="word-choice-grid"></div>
        <button id="randomWordBtn" class="w-full bg-gray-600 py-2 rounded-lg mt-2">اختيار عشوائي</button>
    </div>
</div>

<!-- نافذة معلومات بسيطة (بدون تنبيه) -->
<div id="infoModal" class="modal hidden">
    <div class="modal-content">
        <h2 class="text-xl font-bold text-center mb-4" id="infoTitle"></h2>
        <p id="infoMessage" class="text-center mb-4"></p>
        <div class="flex justify-center">
            <button id="closeInfoBtn" class="btn-primary">حسناً</button>
        </div>
    </div>
</div>

<script>
    // ========== قاموس الكلمات (احتياطي) ==========
    const DEFAULT_DICTIONARY = [
        "كلمة", "بيت", "ماء", "شمس", "قمر", "نجم", "ورد", "نهر", "جبل", "وادي",
        "كتاب", "قلم", "ورق", "حاسوب", "هاتف", "شاشة", "طاولة", "كرسي", "باب", "نافذة",
        "سيارة", "طريق", "جسر", "مدينة", "قرية", "مدرسة", "جامعة", "مستشفى", "مطعم", "فندق",
        "طائر", "سمكة", "أسد", "نمر", "فيل", "زرافة", "ثعلب", "أرنب", "حصان", "بقرة",
        "تفاح", "موز", "برتقال", "عنب", "فراولة", "مانجو", "بطيخ", "خوخ", "كرز", "ليمون"
    ];

    // محاولة استيراد القواميس الخارجية إن وجدت
    let VALID_GUESSES = [];
    let VALID_WORDS = [];

    const possibleGuessNames = ['dictionary', 'VALID_GUESSES', 'validGuesses', 'allowedWords', 'DICTIONARY'];
    const possibleWordNames = ['words', 'VALID_WORDS', 'validWords', 'secretWords', 'WORDS'];

    for (let name of possibleGuessNames) {
        if (typeof window[name] !== 'undefined' && Array.isArray(window[name]) && window[name].length > 0) {
            VALID_GUESSES = window[name];
            break;
        }
    }
    for (let name of possibleWordNames) {
        if (typeof window[name] !== 'undefined' && Array.isArray(window[name]) && window[name].length > 0) {
            VALID_WORDS = window[name];
            break;
        }
    }

    if (VALID_GUESSES.length === 0) VALID_GUESSES = [...DEFAULT_DICTIONARY];
    if (VALID_WORDS.length === 0) VALID_WORDS = [...DEFAULT_DICTIONARY];

    // ========== دوال مساعدة ==========
    function getRandomWords(count = 10) {
        const shuffled = [...VALID_WORDS];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, count);
    }

    function isValidWord(word) {
        return VALID_GUESSES.includes(word);
    }

    // ========== متغيرات اللعبة ==========
    let currentGame = {
        status: 'waiting', // waiting, playing, finished
        mySecretWord: null,      // الكلمة التي اختارها اللاعب (سيحاول الكمبيوتر تخمينها)
        computerSecretWord: null,// الكلمة التي اختارها الكمبيوتر (سيحاول اللاعب تخمينها)
        myGuesses: [],           // تخمينات اللاعب (ضد كلمة الكمبيوتر)
        computerGuesses: [],     // تخمينات الكمبيوتر (ضد كلمة اللاعب)
        myScore: 0,
        computerScore: 0,
        roundActive: false,
        turn: 'player'           // player أو computer
    };

    let currentGuess = "";
    let currentRow = 0;
    const maxAttempts = 6;

    // ========== عناصر DOM ==========
    const playerGridDiv = document.getElementById('playerGrid');
    const opponentGridDiv = document.getElementById('opponentGrid');
    const myScoreSpan = document.getElementById('myScore');
    const oppScoreSpan = document.getElementById('oppScore');
    const wordSelectModal = document.getElementById('wordSelectModal');
    const wordOptionsDiv = document.getElementById('wordOptions');
    const randomWordBtn = document.getElementById('randomWordBtn');
    const infoModal = document.getElementById('infoModal');
    const infoTitle = document.getElementById('infoTitle');
    const infoMessage = document.getElementById('infoMessage');
    const closeInfoBtn = document.getElementById('closeInfoBtn');
    const resetRoundBtn = document.getElementById('resetRoundBtn');
    const resetScoresBtn = document.getElementById('resetScoresBtn');

    // ========== دوال الواجهة ==========
    function showModal(modal) { modal.classList.remove('hidden'); }
    function hideModal(modal) { modal.classList.add('hidden'); }

    function showInfo(title, msg, callback) {
        infoTitle.innerText = title;
        infoMessage.innerText = msg;
        showModal(infoModal);
        const handler = () => {
            hideModal(infoModal);
            closeInfoBtn.removeEventListener('click', handler);
            if (callback) callback();
        };
        closeInfoBtn.addEventListener('click', handler);
    }

    function renderPlayerGrid() {
        playerGridDiv.innerHTML = '';
        for (let row = 0; row < maxAttempts; row++) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'grid-row';
            for (let col = 0; col < 5; col++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                if (row < currentGame.myGuesses.length) {
                    const guess = currentGame.myGuesses[row];
                    if (guess && guess.word) {
                        tile.textContent = guess.word[col] || '';
                        tile.classList.add(guess.result[col]);
                    }
                } else if (row === currentGame.myGuesses.length && currentGuess && row === currentRow && currentGame.turn === 'player') {
                    tile.textContent = currentGuess[col] || '';
                }
                rowDiv.appendChild(tile);
            }
            playerGridDiv.appendChild(rowDiv);
        }
    }

    function renderOpponentGrid() {
        opponentGridDiv.innerHTML = '';
        for (let row = 0; row < maxAttempts; row++) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'opp-row';
            for (let col = 0; col < 5; col++) {
                const tile = document.createElement('div');
                tile.className = 'opp-tile';
                if (row < currentGame.computerGuesses.length) {
                    const guess = currentGame.computerGuesses[row];
                    if (guess && guess.result) {
                        tile.classList.add(guess.result[col]);
                    } else {
                        tile.classList.add('filled');
                    }
                } else if (row === currentGame.computerGuesses.length && currentGame.computerGuesses.length < maxAttempts) {
                    tile.classList.add('filled');
                }
                rowDiv.appendChild(tile);
            }
            opponentGridDiv.appendChild(rowDiv);
        }
    }

    function updateKeyboardColors() {
        document.querySelectorAll('.key').forEach(k => {
            if (!k.classList.contains('enter') && !k.classList.contains('backspace'))
                k.classList.remove('correct', 'present', 'absent');
        });
        currentGame.myGuesses.forEach(guess => {
            for (let i = 0; i < 5; i++) {
                const letter = guess.word[i];
                const status = guess.result[i];
                const key = document.querySelector(`.key[data-key="${letter}"]`);
                if (key) {
                    if (status === 'correct') key.classList.add('correct');
                    else if (status === 'present' && !key.classList.contains('correct')) key.classList.add('present');
                    else if (status === 'absent' && !key.classList.contains('correct') && !key.classList.contains('present')) key.classList.add('absent');
                }
            }
        });
    }

    function calculateResult(guess, target) {
        const result = Array(5).fill('absent');
        const targetCount = {};
        for (let ch of target) targetCount[ch] = (targetCount[ch] || 0) + 1;
        for (let i = 0; i < 5; i++) {
            if (guess[i] === target[i]) {
                result[i] = 'correct';
                targetCount[guess[i]]--;
            }
        }
        for (let i = 0; i < 5; i++) {
            if (result[i] !== 'correct' && targetCount[guess[i]] > 0) {
                result[i] = 'present';
                targetCount[guess[i]]--;
            }
        }
        return result;
    }

    // ========== منطق اللعبة ==========
    function endRound(winner) {
        currentGame.status = 'finished';
        currentGame.roundActive = false;
        if (winner === 'player') {
            currentGame.myScore++;
            showInfo('فزت!', 'أحسنت! +1 نقطة', () => {});
        } else {
            currentGame.computerScore++;
            showInfo('خسرت', 'الكمبيوتر فاز! +1 نقطة له', () => {});
        }
        myScoreSpan.innerText = `أنت: ${currentGame.myScore}`;
        oppScoreSpan.innerText = `الكمبيوتر: ${currentGame.computerScore}`;
        // بدأ جولة جديدة تلقائياً بعد ثانية
        setTimeout(() => startNewRound(), 2000);
    }

    async function playerGuess(guessWord) {
        if (!currentGame.roundActive || currentGame.turn !== 'player') return false;
        if (guessWord.length !== 5) { showInfo('تنبيه', 'يجب أن تكون الكلمة 5 أحرف'); return false; }
        if (!isValidWord(guessWord)) { showInfo('تنبيه', 'الكلمة غير موجودة في القاموس'); return false; }
        if (currentGame.myGuesses.some(g => g.word === guessWord)) { showInfo('تنبيه', 'لقد جربت هذه الكلمة من قبل'); return false; }

        const result = calculateResult(guessWord, currentGame.computerSecretWord);
        const isWin = guessWord === currentGame.computerSecretWord;
        currentGame.myGuesses.push({ word: guessWord, result: result });
        currentGuess = "";
        currentRow = currentGame.myGuesses.length;
        renderPlayerGrid();
        updateKeyboardColors();

        if (isWin) {
            endRound('player');
            return true;
        } else if (currentGame.myGuesses.length === maxAttempts) {
            endRound('computer');
            return true;
        }

        // دور الكمبيوتر
        currentGame.turn = 'computer';
        renderPlayerGrid(); // لتحديث حالة الإدخال
        setTimeout(() => computerGuess(), 500);
        return true;
    }

    async function computerGuess() {
        if (!currentGame.roundActive || currentGame.turn !== 'computer') return;

        // اختيار كلمة عشوائية لم يجربها الكمبيوتر بعد
        const triedWords = currentGame.computerGuesses.map(g => g.word);
        const availableGuesses = VALID_GUESSES.filter(w => !triedWords.includes(w));
        if (availableGuesses.length === 0) {
            // لا توجد كلمات متاحة، انتهى
            endRound('player');
            return;
        }
        const guessWord = availableGuesses[Math.floor(Math.random() * availableGuesses.length)];
        const result = calculateResult(guessWord, currentGame.mySecretWord);
        const isWin = guessWord === currentGame.mySecretWord;
        currentGame.computerGuesses.push({ word: guessWord, result: result });
        renderOpponentGrid();

        if (isWin) {
            endRound('computer');
            return;
        } else if (currentGame.computerGuesses.length === maxAttempts) {
            endRound('player');
            return;
        }

        // عودة الدور للاعب
        currentGame.turn = 'player';
        renderPlayerGrid(); // لتفعيل الإدخال
        // تنظيف أي كلمة حالية للاعب
        currentGuess = "";
        currentRow = currentGame.myGuesses.length;
        renderPlayerGrid();
    }

    // ========== إدارة الجولات ==========
    function startNewRound() {
        // اختيار الكلمات
        const playerWords = getRandomWords(10);
        const computerWords = getRandomWords(10);

        // نافذة اختيار كلمة اللاعب
        wordOptionsDiv.innerHTML = '';
        playerWords.forEach(word => {
            const btn = document.createElement('button');
            btn.className = 'word-choice-btn';
            btn.textContent = word;
            btn.onclick = () => {
                currentGame.mySecretWord = word;
                // الكمبيوتر يختار عشوائياً من قائمته
                currentGame.computerSecretWord = computerWords[Math.floor(Math.random() * computerWords.length)];
                hideModal(wordSelectModal);
                // بدء الجولة
                currentGame.status = 'playing';
                currentGame.roundActive = true;
                currentGame.turn = 'player';
                currentGame.myGuesses = [];
                currentGame.computerGuesses = [];
                currentGuess = "";
                currentRow = 0;
                renderPlayerGrid();
                renderOpponentGrid();
                updateKeyboardColors();
            };
            wordOptionsDiv.appendChild(btn);
        });
        randomWordBtn.onclick = () => {
            const randomIndex = Math.floor(Math.random() * playerWords.length);
            const btn = wordOptionsDiv.children[randomIndex];
            if (btn) btn.click();
        };
        showModal(wordSelectModal);
    }

    function resetRound() {
        if (currentGame.roundActive) {
            showInfo('إعادة الجولة', 'تم إلغاء الجولة الحالية', () => {});
        }
        startNewRound();
    }

    function resetScores() {
        currentGame.myScore = 0;
        currentGame.computerScore = 0;
        myScoreSpan.innerText = `أنت: 0`;
        oppScoreSpan.innerText = `الكمبيوتر: 0`;
        resetRound();
    }

    // ========== لوحة المفاتيح ==========
    function handleKey(key) {
        if (currentGame.turn !== 'player' || !currentGame.roundActive) return;
        if (key === 'Enter') {
            if (currentGuess.length === 5) playerGuess(currentGuess);
            else showInfo('تنبيه', 'أدخل 5 أحرف');
        } else if (key === 'Backspace') {
            currentGuess = currentGuess.slice(0, -1);
            renderPlayerGrid();
        } else if (/^[\u0600-\u06FF]$/.test(key) && currentGuess.length < 5) {
            currentGuess += key;
            renderPlayerGrid();
        }
    }

    function buildKeyboard() {
        const layout = [
            ["ج","ح","خ","ه","ع","غ","ف","ق","ث","ص"],
            ["ة","ك","م","ن","ت","ا","ل","ب","ي","س","ش"],
            ["ض","و","ر","ز","د","ذ","ط","ظ"]
        ];
        const keyboardDiv = document.getElementById('keyboard');
        keyboardDiv.innerHTML = '';
        layout.forEach((row, idx) => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'keyboard-row';
            if (idx === 2) {
                const enterKey = document.createElement('div');
                enterKey.className = 'key wide enter';
                enterKey.textContent = 'Enter';
                enterKey.addEventListener('click', () => handleKey('Enter'));
                rowDiv.appendChild(enterKey);
            }
            row.forEach(letter => {
                const key = document.createElement('div');
                key.className = 'key';
                key.textContent = letter;
                key.dataset.key = letter;
                key.addEventListener('click', () => handleKey(letter));
                rowDiv.appendChild(key);
            });
            if (idx === 2) {
                const backspace = document.createElement('div');
                backspace.className = 'key wide backspace';
                backspace.innerHTML = '<i class="fas fa-backspace"></i>';
                backspace.addEventListener('click', () => handleKey('Backspace'));
                rowDiv.appendChild(backspace);
            }
            keyboardDiv.appendChild(rowDiv);
        });
    }

    // ========== بدء اللعبة ==========
    resetRoundBtn.onclick = resetRound;
    resetScoresBtn.onclick = resetScores;
    buildKeyboard();
    startNewRound(); // تبدأ بأول جولة
</script>
</body>
</html>
