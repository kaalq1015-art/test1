<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ألعاب ووردل</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');

* { font-family: 'Tajawal', sans-serif; box-sizing: border-box; }

:root {
    --correct-color: #538d4e;
    --present-color: #b59f3b;
    --absent-color: #3a3a3c;
    --bg-color: #121213;
    --surface-color: #1e1e20;
    --text-color: #ffffff;
    --text-muted: #818384;
    --border-color: #3a3a3c;
}

.light-mode {
    --correct-color: #6aaa64;
    --present-color: #c9b458;
    --absent-color: #787c7e;
    --bg-color: #ffffff;
    --surface-color: #f8f9fa;
    --text-color: #121213;
    --text-muted: #787c7e;
    --border-color: #d3d6da;
}

body {
    background-color: var(--bg-color);
    color: var(--text-color);
    transition: all 0.3s ease;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

header {
    border-bottom: 1px solid var(--border-color);
    background-color: var(--bg-color);
}

.game-card {
    background-color: var(--surface-color);
    border: 2px solid var(--border-color);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.game-card:hover {
    transform: translateY(-6px);
}

.card-words:hover {
    border-color: var(--correct-color);
    box-shadow: 0 12px 25px rgba(83, 141, 78, 0.15);
}

.card-numbers:hover {
    border-color: var(--present-color);
    box-shadow: 0 12px 25px rgba(181, 159, 59, 0.15);
}

.game-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    transform: scaleX(0);
    transition: transform 0.3s ease;
}
.card-words::before { background-color: var(--correct-color); }
.card-numbers::before { background-color: var(--present-color); }
.game-card:hover::before { transform: scaleX(1); }

/* --- تنسيق الأيقونات المربعة (الصور اللي عجبتك) --- */
.card-icon-custom {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    margin-bottom: 8px;
    transition: transform 0.3s ease;
}

.game-card:hover .card-icon-custom {
    transform: scale(1.1);
}

.icon-box {
    width: 20px;
    height: 20px;
    border-radius: 3px;
}
.box-g { background-color: var(--correct-color); }
.box-y { background-color: var(--present-color); }
.box-d { background-color: var(--absent-color); }
/* --------------------------------------------------- */

.mini-tile {
    width: 30px;
    height: 30px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1rem;
    color: #ffffff;
}

.bg-correct { background-color: var(--correct-color); }
.bg-present { background-color: var(--present-color); }
.bg-absent { background-color: var(--absent-color); }
.light-mode .mini-tile { color: #ffffff; }

</style>
</head>
<body>

<header class="flex justify-between items-center px-5 py-3 h-[60px]">
    <div class="w-10"></div>
    <h1 class="text-xl font-extrabold tracking-wide m-0">ووردلات</h1>
    <button id="themeToggle" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-[var(--border-color)] transition-colors">
        <i class="fas fa-sun text-xl"></i>
    </button>
</header>

<main class="flex-1 flex flex-col items-center justify-center p-6 max-w-4xl mx-auto w-full">
    
    <div class="text-center mb-10">
        <h2 class="text-2xl sm:text-3xl font-extrabold mb-2">اختر لعبتك</h2>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 w-full max-w-2xl">
        
        <a href="words.html" class="game-card card-words rounded-2xl p-8 flex flex-col items-center text-center gap-4 cursor-pointer no-underline">
            <div class="card-icon-custom">
                <div class="icon-box box-g"></div><div class="icon-box box-d"></div><div class="icon-box box-y"></div>
                <div class="icon-box box-d"></div><div class="icon-box box-g"></div><div class="icon-box box-d"></div>
                <div class="icon-box box-y"></div><div class="icon-box box-d"></div><div class="icon-box box-g"></div>
            </div>
            
            <h3 class="text-xl font-bold text-[var(--text-color)] m-0">ووردل الحروف</h3>
            <p class="text-[var(--text-muted)] text-sm m-0 leading-relaxed">خمن الكلمة المكونة من 5 حروف في 6 محاولات فقط.</p>
            
            <div class="flex gap-1.5 mt-2">
                <div class="mini-tile bg-correct">ك</div>
                <div class="mini-tile bg-present">ل</div>
                <div class="mini-tile bg-absent">م</div>
                <div class="mini-tile bg-absent">ا</div>
                <div class="mini-tile bg-correct">ت</div>
            </div>
        </a>

        <a href="numbers.html" class="game-card card-numbers rounded-2xl p-8 flex flex-col items-center text-center gap-4 cursor-pointer no-underline">
            <div class="card-icon-custom">
                <div class="icon-box box-y"></div><div class="icon-box box-d"></div><div class="icon-box box-g"></div>
                <div class="icon-box box-g"></div><div class="icon-box box-y"></div><div class="icon-box box-d"></div>
                <div class="icon-box box-d"></div><div class="icon-box box-g"></div><div class="icon-box box-y"></div>
            </div>
            
            <h3 class="text-xl font-bold text-[var(--text-color)] m-0">ووردل الأرقام</h3>
            <p class="text-[var(--text-muted)] text-sm m-0 leading-relaxed">خمن الرقم السري المكون من 5 خانات بذكاء ومنطق.</p>
            
            <div class="flex gap-1.5 mt-2">
                <div class="mini-tile bg-correct">1</div>
                <div class="mini-tile bg-absent">2</div>
                <div class="mini-tile bg-present">3</div>
                <div class="mini-tile bg-correct">4</div>
                <div class="mini-tile bg-absent">5</div>
            </div>
        </a>

    </div>
</main>

<script>
    const themeToggle = document.getElementById('themeToggle');
    const icon = themeToggle.querySelector('i');
    const savedTheme = localStorage.getItem('numberle_theme');
    
    if (savedTheme === 'light') {
        document.body.classList.add('light-mode');
        icon.className = 'fas fa-moon text-xl';
    }

    themeToggle.addEventListener('click', () => {
        const isLight = document.body.classList.toggle('light-mode');
        icon.className = isLight ? 'fas fa-moon text-xl' : 'fas fa-sun text-xl';
        localStorage.setItem('numberle_theme', isLight ? 'light' : 'dark');
    });
</script>

</body>
</html>
