<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());

        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) return false;
            if(e.ctrlKey && e.keyCode == 85) return false;
        }

        setInterval(function(){
            var start = new Date().getTime();
            debugger; 
            var end = new Date().getTime();
            if (end - start > 100) {
                document.body.innerHTML = '';
                window.location.reload();
            }
        }, 100);
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كلمة - لعبة الكلمة العربية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap');
        
        * {
            font-family: 'Tajawal', sans-serif;
            box-sizing: border-box;
        }

        :root {
            --correct-color: #538d4e;
            --present-color: #b59f3b;
            --absent-color: #3a3a3c;
            --default-color: #818384;
            --bg-color: #121213;
            --text-color: #ffffff;
            --border-color: #3a3a3c;
            --key-bg: #818384;
            --key-text: #ffffff;
            --enter-color: #4a8bc7;
            --backspace-color: #e74c3c;
            --newgame-color: #2980b9;
            --newgame-hover: #3498db;
            --easy-color: #4CAF50;
            --hard-color: #f44336;
        }

        .light-mode {
            --correct-color: #6ca965;
            --present-color: #c8b653;
            --absent-color: #787c7e;
            --default-color: #d3d6da;
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #d3d6da;
            --key-bg: #d3d6da;
            --key-text: #000000;
            --enter-color: #5b9bd5;
            --backspace-color: #ff6b6b;
            --newgame-color: #3498db;
            --newgame-hover: #2980b9;
            --easy-color: #4CAF50;
            --hard-color: #f44336;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .tile {
            width: 50px;
            height: 50px;
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            user-select: none;
            transition: all 0.3s ease;
            border-radius: 4px;
        }

        @media (max-width: 640px) {
            .tile { width: 48px; height: 48px; font-size: 1.7rem; }
        }

        @media (max-width: 480px) {
            .tile { width: 44px; height: 44px; font-size: 1.6rem; }
        }

        @media (max-width: 380px) {
            .tile { width: 40px; height: 40px; font-size: 1.5rem; }
        }

        .tile.filled {
            border-color: #878a8c;
            animation: pop 0.1s ease;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .tile.correct { background-color: var(--correct-color); border-color: var(--correct-color); color: white; }
        .tile.present { background-color: var(--present-color); border-color: var(--present-color); color: white; }
        .tile.absent { background-color: var(--absent-color); border-color: var(--absent-color); color: white; }

        .flip { animation: flip 0.6s ease; }

        @keyframes flip {
            0% { transform: rotateX(0); }
            50% { transform: rotateX(90deg); }
            100% { transform: rotateX(0); }
        }

        .key {
            height: 50px;
            min-width: 32px;
            background-color: var(--key-bg);
            color: var(--key-text);
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            flex: 1;
            margin: 0 3px;
            padding: 0 4px;
            touch-action: manipulation;
        }

        .key.enter { background-color: var(--enter-color); color: white; font-size: 0.85rem; }
        .key.backspace { background-color: var(--backspace-color); color: white; }

        @media (max-width: 640px) {
            .key { height: 48px; min-width: 28px; font-size: 0.95rem; margin: 0 2px; padding: 0 3px; }
            .key.enter { font-size: 0.8rem; }
        }

        .key:hover { opacity: 0.9; }
        .key.wide { min-width: 60px; }
        .key.correct { background-color: var(--correct-color); color: white; }
        .key.present { background-color: var(--present-color); color: white; }
        .key.absent { background-color: var(--absent-color); color: white; }

        .shake { animation: shake 0.5s ease; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .bounce { animation: bounce 0.5s ease; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
        }

        header { padding: 8px 12px; border-bottom: 1px solid var(--border-color); }
        h1 { font-size: 1.6rem; text-align: center; }

        #newGameHeaderBtn {
            background-color: var(--newgame-color);
            color: white;
            transition: background-color 0.2s ease;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        main {
            padding: 10px 5px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        #grid { gap: 6px; margin-bottom: 15px; }
        .grid-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 6px; }

        #keyboard { padding: 8px; gap: 6px; width: 100%; }
        .keyboard-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 6px; width: 100%; }

        #message {
            font-size: 1rem;
            min-height: 40px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            text-align: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .modal-content {
            width: 95%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            margin: 10px;
        }

        .correct-word {
            background-color: var(--correct-color);
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .color-example {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            background-color: rgba(129, 131, 132, 0.1);
        }

        .color-box {
            width: 45px;
            height: 45px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        .color-box.correct { background-color: var(--correct-color); color: white; }
        .color-box.present { background-color: var(--present-color); color: white; }
        .color-box.absent { background-color: var(--absent-color); color: white; }

        .attempts-table-container {
            max-height: 250px;
            overflow-y: auto;
            margin: 15px 0;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px;
        }

        .attempts-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .attempts-table th { background-color: var(--default-color); padding: 8px; border-bottom: 2px solid var(--border-color); }
        .attempts-table td { padding: 6px; text-align: center; border-bottom: 1px solid var(--border-color); }

        .attempt-matrix-container {
            margin: 20px 0;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background-color: rgba(129, 131, 132, 0.05);
        }

        .matrix-grid { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .matrix-row { display: flex; justify-content: center; gap: 6px; }
        .matrix-tile { width: 24px; height: 24px; border-radius: 3px; }
        .matrix-tile.correct { background-color: var(--correct-color); }
        .matrix-tile.present { background-color: var(--present-color); }
        .matrix-tile.absent { background-color: var(--absent-color); }

        .difficulty-dropdown { position: relative; display: inline-block; }
        .difficulty-toggle {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            border: 2px solid var(--border-color);
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .difficulty-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 5px;
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            z-index: 100;
            display: none;
        }
        .difficulty-menu.show { display: block; }
        .difficulty-option { width: 100%; padding: 12px; text-align: center; border: none; background: none; color: var(--text-color); cursor: pointer; border-bottom: 1px solid var(--border-color); }
        .difficulty-option.active { color: var(--correct-color); font-weight: bold; }

        /* أزرار الإضافة والتبليغ */
        .suggest-btn {
            background-color: #2980b9;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            font-weight: bold;
        }
        .suggest-btn:hover { background-color: #1f6392; }
        .suggest-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .hard-word-btn {
            background-color: #e67e22;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }
        .hard-word-btn:hover { background-color: #d35400; }
        .hard-word-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .result-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .result-buttons button { flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <header class="grid grid-cols-3 items-center px-2 py-3 border-b border-[var(--border-color)]">
        <div class="flex items-center gap-1">
            <button id="helpBtn" class="p-1.5 hover:bg-[var(--default-color)] rounded-full"><i class="fas fa-question-circle text-lg"></i></button>
            <button id="statsBtn" class="p-1.5 hover:bg-[var(--default-color)] rounded-full"><i class="fas fa-chart-bar text-lg"></i></button>
        </div>
        <div class="flex justify-center"><h1 class="font-bold">كلمة</h1></div>
        <div class="flex items-center justify-end gap-1 sm:gap-2">
            <div class="difficulty-dropdown">
                <button id="difficultyToggle" class="difficulty-toggle">
                    <span class="text-[10px] sm:text-sm">الصعوبة</span>
                    <i class="fas fa-chevron-down text-[8px]"></i>
                </button>
                <div id="difficultyMenu" class="difficulty-menu">
                    <button data-difficulty="hard" class="difficulty-option active">صعب</button>
                    <button data-difficulty="easy" class="difficulty-option">سهل</button>
                </div>
            </div>
            <button id="newGameHeaderBtn"><i class="fas fa-redo-alt text-sm"></i></button>
            <button id="themeToggle" class="p-1.5 hover:bg-[var(--default-color)] rounded-full"><i class="fas fa-sun text-lg"></i></button>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center">
        <div id="message" class="text-center font-bold"></div>
        <div id="grid" class="mb-4"></div>
        <div id="keyboard" class="w-full px-2 space-y-2 max-w-xl"></div>
    </main>

    <div id="helpModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden p-4">
        <div class="bg-[var(--bg-color)] border border-[var(--border-color)] rounded-lg modal-content p-5">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xl font-bold">طريقة اللعب</h2>
                <button id="closeHelp" class="text-2xl">&times;</button>
            </div>
            <p id="helpAttemptsText" class="mb-5 text-center">خمّن الكلمة في 6 محاولات.</p>
            <div class="color-example"><div class="color-box correct"></div><div><h3 class="font-bold">أخضر</h3><p>الحرف صحيح في مكانه.</p></div></div>
            <div class="color-example"><div class="color-box present"></div><div><h3 class="font-bold">أصفر</h3><p>الحرف صحيح بمكان آخر.</p></div></div>
            <div class="color-example"><div class="color-box absent"></div><div><h3 class="font-bold">رمادي</h3><p>الحرف غير موجود.</p></div></div>
            <button id="startGameBtn" class="w-full bg-[var(--correct-color)] text-white py-3 rounded-lg font-bold mt-4">ابدأ اللعب</button>
        </div>
    </div>

    <div id="statsModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden p-4">
        <div class="bg-[var(--bg-color)] border border-[var(--border-color)] rounded-lg modal-content p-5">
            <div class="flex justify-between items-center mb-5"><h2 class="text-xl font-bold">الإحصائيات</h2><button id="closeStats" class="text-2xl">&times;</button></div>
            <div id="gameResultInfo"></div>
            <div class="flex justify-around mb-6 text-center">
                <div><div id="playedCount" class="text-2xl font-bold">0</div><div class="text-xs">لعب</div></div>
                <div><div id="winPercent" class="text-2xl font-bold">0%</div><div class="text-xs">فوز</div></div>
                <div><div id="currentStreak" class="text-2xl font-bold">0</div><div class="text-xs">تتابع</div></div>
            </div>
            <div id="attemptsTableContainer" class="attempts-table-container">
                <table class="attempts-table">
                    <thead><tr><th>#</th><th>المحاولات</th><th>النتيجة</th></tr></thead>
                    <tbody id="attemptsTableBody"></tbody>
                </table>
            </div>
            <button id="newGameFromStats" class="w-full border py-2 rounded font-bold mt-2">لعبة جديدة</button>
        </div>
    </div>

    <div id="gameResultModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden p-4">
        <div class="bg-[var(--bg-color)] border border-[var(--border-color)] rounded-lg modal-content p-5 text-center">
            <h2 id="resultModalTitle" class="text-xl font-bold mb-4"></h2>
            <div id="gameResultDetails"></div>
            <div id="attemptMatrixContainer" class="attempt-matrix-container">
                <div id="matrixGrid" class="matrix-grid"></div>
            </div>
            <button id="reportHardBtn" class="hard-word-btn">الكلمة صعبة! بلّغ عنها</button>
            <div class="result-buttons">
                <button id="playAgainBtn" class="bg-[var(--correct-color)] text-white">العب مجدداً</button>
                <button id="viewStatsBtn" class="border">الإحصائيات</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== Supabase Setup ====================
        const SUPABASE_URL = 'https://yourproject.supabase.co'; // استبدل برابطك
        const SUPABASE_ANON_KEY = 'your-anon-key'; // استبدل بمفتاحك
        let supabaseClient = null;

        try {
            if (typeof supabase !== 'undefined') {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        } catch(e) { console.warn("Supabase Init Error", e); }

        async function reportToSupabase(word, type) {
            if (!supabaseClient) {
                showTemporaryMessage("⚠️ قاعدة البيانات غير متصلة");
                return;
            }
            try {
                const { error } = await supabaseClient.from('suggestions').insert([{ word, type }]);
                if (!error) {
                    if (type === 'hard_word') {
                        const btn = document.getElementById('reportHardBtn');
                        btn.innerText = '✅ تم التبليغ بنجاح';
                        btn.disabled = true;
                    }
                    return true;
                }
            } catch (err) { console.error(err); }
            return false;
        }

        function showTemporaryMessage(msg, duration = 3000) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = msg;
            setTimeout(() => { if (msgDiv.innerHTML === msg) msgDiv.innerHTML = ''; }, duration);
        }

        // ==================== Game Logic ====================
        const STATS_KEY = 'kalima_stats_v10';
        const DIFFICULTY_KEY = 'kalima_difficulty_v4';
        const WORD_LIST = ["جميل", "كتاب", "صلاة", "سماء", "نخله", "قهوة", "شمس", "قمر"]; // عينة كلمات
        const DICTIONARY = [...WORD_LIST]; // يمكن توسيع القاموس هنا

        const gameState = {
            targetWord: "", currentRow: 0, currentGuess: "", gameOver: false, gameWon: false,
            stats: { played: 0, wins: 0, currentStreak: 0, maxStreak: 0 },
            attemptsHistory: [], difficulty: 'hard', maxRows: 6, isProcessing: false
        };

        function init() {
            loadDifficulty(); loadStats(); createGrid(); createKeyboard();
            startNewGame(); setupEventListeners();
            if (!localStorage.getItem('kalima_help')) {
                document.getElementById('helpModal').classList.remove('hidden');
                localStorage.setItem('kalima_help', 'true');
            }
        }

        function loadDifficulty() {
            gameState.difficulty = localStorage.getItem(DIFFICULTY_KEY) || 'hard';
            gameState.maxRows = gameState.difficulty === 'hard' ? 6 : 8;
            updateDifficultyUI();
        }

        function updateDifficultyUI() {
            document.querySelectorAll('.difficulty-option').forEach(opt => {
                opt.classList.toggle('active', opt.dataset.difficulty === gameState.difficulty);
            });
            document.getElementById('helpAttemptsText').innerText = `خمّن الكلمة في ${gameState.maxRows} محاولات.`;
        }

        function loadStats() {
            const saved = localStorage.getItem(STATS_KEY);
            if (saved) gameState.stats = JSON.parse(saved);
        }

        function saveStats() { localStorage.setItem(STATS_KEY, JSON.stringify(gameState.stats)); }

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let r = 0; r < gameState.maxRows; r++) {
                const row = document.createElement('div');
                row.className = 'grid-row'; row.id = `row-${r}`;
                for (let c = 0; c < 5; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile'; tile.id = `tile-${r}-${c}`;
                    row.appendChild(tile);
                }
                grid.appendChild(row);
            }
        }

        function createKeyboard() {
            const layout = [["ض", "ص", "ث", "ق", "ف", "غ", "ع", "ه", "خ", "ح", "ج"], ["ش", "س", "ي", "ب", "ل", "ا", "ت", "ن", "م", "ك", "ط"], ["ذ", "د", "ر", "ز", "و", "ة", "ى", "ء", "أ", "ظ"]];
            const kb = document.getElementById('keyboard'); kb.innerHTML = '';
            layout.forEach((row, i) => {
                const rowDiv = document.createElement('div'); rowDiv.className = 'keyboard-row';
                if (i === 2) rowDiv.appendChild(createKey('دخول', 'Enter', 'wide enter'));
                row.forEach(char => rowDiv.appendChild(createKey(char, char)));
                if (i === 2) rowDiv.appendChild(createKey('⌫', 'Backspace', 'wide backspace'));
                kb.appendChild(rowDiv);
            });
        }

        function createKey(text, val, cls = '') {
            const btn = document.createElement('button');
            btn.className = `key ${cls}`; btn.textContent = text; btn.dataset.key = val;
            btn.onclick = () => handleInput(val); return btn;
        }

        function startNewGame() {
            gameState.targetWord = WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)];
            gameState.currentRow = 0; gameState.currentGuess = "";
            gameState.gameOver = false; gameState.gameWon = false; gameState.isProcessing = false;
            document.getElementById('message').innerHTML = '';
            document.getElementById('gameResultModal').classList.add('hidden');
            document.getElementById('statsModal').classList.add('hidden');
            document.querySelectorAll('.tile').forEach(t => { t.className = 'tile'; t.textContent = ''; });
            document.querySelectorAll('.key').forEach(k => k.classList.remove('correct', 'present', 'absent'));
            document.getElementById('reportHardBtn').disabled = false;
            document.getElementById('reportHardBtn').innerText = 'الكلمة صعبة! بلّغ عنها';
            createGrid();
        }

        function handleInput(key) {
            if (gameState.gameOver || gameState.isProcessing) return;
            if (key === 'Enter') submitGuess();
            else if (key === 'Backspace') {
                gameState.currentGuess = gameState.currentGuess.slice(0, -1);
                updateRowUI();
            } else if (gameState.currentGuess.length < 5 && /^[\u0600-\u06FF]$/.test(key)) {
                gameState.currentGuess += key;
                updateRowUI();
            }
        }

        function updateRowUI() {
            for (let i = 0; i < 5; i++) {
                const t = document.getElementById(`tile-${gameState.currentRow}-${i}`);
                t.textContent = gameState.currentGuess[i] || '';
                t.classList.toggle('filled', !!gameState.currentGuess[i]);
            }
        }

        function submitGuess() {
            if (gameState.currentGuess.length !== 5) {
                showTemporaryMessage("الكلمة ناقصة!");
                shakeRow(); return;
            }

            if (!DICTIONARY.includes(gameState.currentGuess)) {
                const msgDiv = document.getElementById('message');
                msgDiv.innerHTML = `<span>الكلمة غير موجودة.. </span>`;
                const sBtn = document.createElement('button');
                sBtn.className = 'suggest-btn'; sBtn.textContent = 'إضافة؟';
                
                sBtn.onclick = async () => {
                    sBtn.disabled = true; sBtn.textContent = 'جاري..';
                    const ok = await reportToSupabase(gameState.currentGuess, 'new_word');
                    if (ok) {
                        sBtn.textContent = 'تم الإرسال ✅';
                        setTimeout(() => { msgDiv.innerHTML = ''; }, 1500);
                    } else {
                        sBtn.textContent = 'خطأ!';
                        setTimeout(() => { sBtn.disabled = false; sBtn.textContent = 'إضافة؟'; }, 2000);
                    }
                };
                
                msgDiv.appendChild(sBtn);
                shakeRow();
                // مسح الزر تلقائياً بعد 4 ثواني إذا لم يضغط
                setTimeout(() => { if(msgDiv.contains(sBtn) && sBtn.textContent === 'إضافة؟') msgDiv.innerHTML = ''; }, 4000);
                return;
            }

            gameState.isProcessing = true;
            evaluateGuess();
        }

        function evaluateGuess() {
            const guess = gameState.currentGuess;
            const target = gameState.targetWord;
            const result = Array(5).fill('absent');
            const targetArr = target.split('');

            for (let i = 0; i < 5; i++) {
                if (guess[i] === target[i]) {
                    result[i] = 'correct'; targetArr[i] = null;
                }
            }
            for (let i = 0; i < 5; i++) {
                if (result[i] !== 'correct' && targetArr.includes(guess[i])) {
                    result[i] = 'present'; targetArr[targetArr.indexOf(guess[i])] = null;
                }
            }

            result.forEach((status, i) => {
                setTimeout(() => {
                    const tile = document.getElementById(`tile-${gameState.currentRow}-${i}`);
                    tile.classList.add('flip');
                    setTimeout(() => {
                        tile.classList.add(status);
                        updateKeyUI(guess[i], status);
                        if (i === 4) finishEvaluation(guess === target);
                    }, 300);
                }, i * 200);
            });
        }

        function updateKeyUI(letter, status) {
            const key = document.querySelector(`.key[data-key="${letter}"]`);
            if (!key) return;
            if (status === 'correct') { key.className = 'key correct'; }
            else if (status === 'present' && !key.classList.contains('correct')) { key.className = 'key present'; }
            else if (status === 'absent' && !key.classList.contains('correct') && !key.classList.contains('present')) { key.className = 'key absent'; }
        }

        function finishEvaluation(isWin) {
            if (isWin) {
                gameState.gameWon = gameState.gameOver = true;
                gameState.stats.played++; gameState.stats.wins++; gameState.stats.currentStreak++;
                saveStats(); showMessage("🎉 مبروك!");
                setTimeout(() => showFinalModal(true), 1000);
            } else if (gameState.currentRow === gameState.maxRows - 1) {
                gameState.gameOver = true;
                gameState.stats.played++; gameState.stats.currentStreak = 0;
                saveStats(); showMessage(`الكلمة هي: ${gameState.targetWord}`);
                setTimeout(() => showFinalModal(false), 1000);
            } else {
                gameState.currentRow++; gameState.currentGuess = "";
                gameState.isProcessing = false;
            }
        }

        function showFinalModal(win) {
            const modal = document.getElementById('gameResultModal');
            document.getElementById('resultModalTitle').innerText = win ? "أحسنت صنعاً!" : "حظاً أوفر!";
            document.getElementById('gameResultDetails').innerHTML = `<div class="correct-word">${gameState.targetWord}</div>`;
            renderMatrix();
            modal.classList.remove('hidden');
        }

        function renderMatrix() {
            const grid = document.getElementById('matrixGrid'); grid.innerHTML = '';
            for (let r = 0; r <= gameState.currentRow; r++) {
                const row = document.createElement('div'); row.className = 'matrix-row';
                for (let c = 0; c < 5; c++) {
                    const tile = document.getElementById(`tile-${r}-${c}`);
                    const mTile = document.createElement('div');
                    mTile.className = 'matrix-tile ' + (tile.classList.contains('correct') ? 'correct' : tile.classList.contains('present') ? 'present' : 'absent');
                    row.appendChild(mTile);
                }
                grid.appendChild(row);
            }
        }

        function showMessage(txt) { document.getElementById('message').innerText = txt; }
        function shakeRow() {
            const r = document.getElementById(`row-${gameState.currentRow}`);
            r.classList.add('shake'); setTimeout(() => r.classList.remove('shake'), 500);
        }

        function setupEventListeners() {
            document.getElementById('difficultyToggle').onclick = (e) => {
                e.stopPropagation();
                document.getElementById('difficultyMenu').classList.toggle('show');
            };
            
            document.querySelectorAll('.difficulty-option').forEach(opt => {
                opt.onclick = () => {
                    gameState.difficulty = opt.dataset.difficulty;
                    localStorage.setItem(DIFFICULTY_KEY, gameState.difficulty);
                    loadDifficulty(); startNewGame();
                };
            });

            document.addEventListener('click', () => document.getElementById('difficultyMenu').classList.remove('show'));
            
            document.getElementById('helpBtn').onclick = () => document.getElementById('helpModal').classList.remove('hidden');
            document.getElementById('closeHelp').onclick = () => document.getElementById('helpModal').classList.add('hidden');
            document.getElementById('startGameBtn').onclick = () => document.getElementById('helpModal').classList.add('hidden');
            
            document.getElementById('statsBtn').onclick = () => {
                updateStatsUI();
                document.getElementById('statsModal').classList.remove('hidden');
            };
            document.getElementById('closeStats').onclick = () => document.getElementById('statsModal').classList.add('hidden');
            document.getElementById('newGameFromStats').onclick = startNewGame;
            document.getElementById('newGameHeaderBtn').onclick = startNewGame;
            document.getElementById('playAgainBtn').onclick = startNewGame;
            document.getElementById('closeGameResult').onclick = () => document.getElementById('gameResultModal').classList.add('hidden');
            
            document.getElementById('themeToggle').onclick = () => {
                const isLight = document.body.classList.toggle('light-mode');
                document.querySelector('#themeToggle i').className = isLight ? 'fas fa-moon' : 'fas fa-sun';
            };

            document.getElementById('reportHardBtn').onclick = () => {
                reportToSupabase(gameState.targetWord, 'hard_word');
            };

            document.addEventListener('keydown', (e) => handleInput(e.key === 'Enter' ? 'Enter' : e.key === 'Backspace' ? 'Backspace' : e.key));
        }

        function updateStatsUI() {
            document.getElementById('playedCount').innerText = gameState.stats.played;
            document.getElementById('winPercent').innerText = gameState.stats.played ? Math.round((gameState.stats.wins/gameState.stats.played)*100)+'%' : '0%';
            document.getElementById('currentStreak').innerText = gameState.stats.currentStreak;
        }

        window.onload = init;
    </script>
</body>
</html>
