<!DOCTYPE html>
<html lang="ar" dir="rtl">
    <head>
        <script>
            document.addEventListener('contextmenu', event => event.preventDefault());

            document.onkeydown = function(e) {
                if(e.keyCode == 123) return false;
                if(e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) return false;
                if(e.ctrlKey && e.keyCode == 85) return false;
            }

            setInterval(function(){
                var start = new Date().getTime();
                debugger; 
                var end = new Date().getTime();
                if (end - start > 100) {
                    document.body.innerHTML = '';
                    window.location.reload();
                }
            }, 100);
        </script>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>كلمة - لعبة الكلمة العربية</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap');
            
            * {
                font-family: 'Tajawal', sans-serif;
                box-sizing: border-box;
            }

            :root {
                --correct-color: #538d4e;
                --present-color: #b59f3b;
                --absent-color: #3a3a3c;
                --default-color: #818384;
                --bg-color: #121213;
                --text-color: #ffffff;
                --border-color: #3a3a3c;
                --key-bg: #818384;
                --key-text: #ffffff;
                --enter-color: #4a8bc7;
                --backspace-color: #e74c3c;
                --newgame-color: #2980b9;
                --newgame-hover: #3498db;
                --easy-color: #4CAF50;
                --hard-color: #f44336;
            }

            .light-mode {
                --correct-color: #6ca965;
                --present-color: #c8b653;
                --absent-color: #787c7e;
                --default-color: #d3d6da;
                --bg-color: #ffffff;
                --text-color: #000000;
                --border-color: #d3d6da;
                --key-bg: #d3d6da;
                --key-text: #000000;
                --enter-color: #5b9bd5;
                --backspace-color: #ff6b6b;
                --newgame-color: #3498db;
                --newgame-hover: #2980b9;
                --easy-color: #4CAF50;
                --hard-color: #f44336;
            }

            body {
                background-color: var(--bg-color);
                color: var(--text-color);
                transition: all 0.3s ease;
                margin: 0;
                padding: 0;
                min-height: 100vh;
                overflow-x: hidden;
                touch-action: manipulation;
            }

            .tile {
                width: 50px;
                height: 50px;
                border: 2px solid var(--border-color);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.8rem;
                font-weight: bold;
                user-select: none;
                transition: all 0.3s ease;
                border-radius: 4px;
            }

            .tile.filled {
                border-color: #878a8c;
                animation: pop 0.1s ease;
            }

            @keyframes pop {
                0% { transform: scale(1); }
                50% { transform: scale(1.1); }
                100% { transform: scale(1); }
            }

            .tile.correct { background-color: var(--correct-color); border-color: var(--correct-color); color: white; }
            .tile.present { background-color: var(--present-color); border-color: var(--present-color); color: white; }
            .tile.absent { background-color: var(--absent-color); border-color: var(--absent-color); color: white; }

            .flip { animation: flip 0.6s ease; }
            @keyframes flip {
                0% { transform: rotateX(0); }
                50% { transform: rotateX(90deg); }
                100% { transform: rotateX(0); }
            }

            .key {
                height: 50px;
                min-width: 32px;
                background-color: var(--key-bg);
                color: var(--key-text);
                border: none;
                border-radius: 4px;
                font-weight: bold;
                font-size: 1rem;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                user-select: none;
                transition: all 0.2s ease;
                flex: 1;
                margin: 0 3px;
                padding: 0 4px;
                touch-action: manipulation;
            }

            .key.enter { background-color: var(--enter-color); color: white; font-size: 0.85rem; }
            .key.backspace { background-color: var(--backspace-color); color: white; }
            .key.correct { background-color: var(--correct-color); color: white; }
            .key.present { background-color: var(--present-color); color: white; }
            .key.absent { background-color: var(--absent-color); color: white; }

            .shake { animation: shake 0.5s ease; }
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                20%, 40%, 60%, 80% { transform: translateX(5px); }
            }

            .bounce { animation: bounce 0.5s ease; }
            @keyframes bounce {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-10px); }
            }

            .modal-overlay {
                background-color: rgba(0, 0, 0, 0.7);
                backdrop-filter: blur(4px);
            }

            .modal-content {
                width: 95%;
                max-width: 500px;
                max-height: 90vh;
                overflow-y: auto;
                margin: 10px;
            }

            .correct-word {
                background-color: var(--correct-color);
                color: white;
                padding: 12px;
                border-radius: 8px;
                margin: 12px 0;
                text-align: center;
                font-size: 1.4rem;
                font-weight: bold;
            }

            /* --- الإضافات الجديدة للتنسيق --- */
            .suggest-btn {
                background-color: #2980b9;
                color: white;
                padding: 2px 10px;
                border-radius: 4px;
                font-size: 0.8rem;
                margin-right: 8px;
                cursor: pointer;
                border: none;
            }
            .hard-word-btn {
                background-color: #e67e22;
                color: white;
                padding: 10px;
                border-radius: 8px;
                font-weight: bold;
                width: 100%;
                margin-top: 15px;
                cursor: pointer;
                border: none;
            }

            .grid-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 6px; }
            .difficulty-dropdown { position: relative; display: inline-block; }
            .difficulty-menu {
                position: absolute; top: 100%; left: 0; right: 0; margin-top: 5px;
                background-color: var(--bg-color); border: 2px solid var(--border-color);
                border-radius: 6px; z-index: 100; display: none;
            }
            .difficulty-menu.show { display: block; }
            .difficulty-option.active { color: var(--correct-color); font-weight: bold; }
        </style>
    </head>
    <body class="flex flex-col min-h-screen">
        <header class="grid grid-cols-3 items-center px-2 py-3 border-b border-[var(--border-color)] min-h-[60px]">
            <div class="flex items-center gap-1">
                <button id="helpBtn" class="p-1.5 hover:bg-[var(--default-color)] rounded-full"><i class="fas fa-question-circle text-lg"></i></button>
                <button id="statsBtn" class="p-1.5 hover:bg-[var(--default-color)] rounded-full"><i class="fas fa-chart-bar text-lg"></i></button>
            </div>
            <div class="flex justify-center"><h1 class="font-bold text-lg sm:text-xl whitespace-nowrap">كلمة</h1></div>
            <div class="flex items-center justify-end gap-1 sm:gap-2">
                <div class="difficulty-dropdown">
                    <button id="difficultyToggle" class="flex items-center gap-1 px-1.5 py-1 sm:px-2 sm:py-1.5 border-2 border-[var(--border-color)] rounded-lg bg-[var(--bg-color)]">
                        <span class="text-[10px] sm:text-sm font-bold">الصعوبة</span>
                        <i class="fas fa-chevron-down text-[8px] sm:text-[10px]"></i>
                    </button>
                    <div id="difficultyMenu" class="difficulty-menu text-xs sm:text-sm">
                        <button data-difficulty="hard" class="difficulty-option active">صعب</button>
                        <button data-difficulty="easy" class="difficulty-option">سهل</button>
                    </div>
                </div>
                <button id="newGameHeaderBtn" class="w-8 h-8 sm:w-9 sm:h-9 flex items-center justify-center bg-[var(--newgame-color)] text-white rounded-full shrink-0"><i class="fas fa-redo-alt text-xs sm:text-sm"></i></button>
                <button id="themeToggle" class="p-1.5 hover:bg-[var(--default-color)] rounded-full shrink-0"><i class="fas fa-sun text-lg"></i></button>
            </div>
        </header>

        <main class="flex-grow flex flex-col items-center justify-center">
            <div id="message" class="text-center font-bold h-8 mb-2 flex items-center justify-center"></div>
            <div id="grid" class="mb-4"></div>
            <div id="keyboard" class="w-full px-2 space-y-2 max-w-xl"></div>
        </main>

        <div id="helpModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden p-4">
            <div class="bg-[var(--bg-color)] border border-[var(--border-color)] rounded-lg modal-content p-5">
                <h2 class="text-xl font-bold mb-4">طريقة اللعب</h2>
                <p id="helpAttemptsText" class="mb-4">خمّن الكلمة في 6 محاولات.</p>
                <button id="startGameBtn" class="bg-[var(--correct-color)] text-white px-6 py-2 rounded-lg font-bold w-full">ابدأ اللعب</button>
            </div>
        </div>

        <div id="gameResultModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden p-4">
            <div class="bg-[var(--bg-color)] border border-[var(--border-color)] rounded-lg modal-content p-5">
                <h2 class="text-xl font-bold text-center" id="resultModalTitle">نتيجة اللعبة</h2>
                <div id="gameResultDetails"></div>
                
                <button id="reportHardBtn" class="hard-word-btn">الكلمة صعبة! بلّغ عنها</button>

                <div class="flex gap-2 mt-4">
                    <button id="playAgainBtn" class="bg-[var(--correct-color)] text-white flex-1 py-2 rounded font-bold">لعبة جديدة</button>
                    <button id="viewStatsBtn" class="border border-[var(--border-color)] flex-1 py-2 rounded font-bold">الإحصائيات</button>
                </div>
            </div>
        </div>

        <div id="statsModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden p-4">
            <div class="bg-[var(--bg-color)] border border-[var(--border-color)] rounded-lg modal-content p-5">
                <h2 class="text-xl font-bold mb-4">الإحصائيات</h2>
                <div id="statsContent" class="flex justify-around mb-4">
                    <div class="text-center"><div id="playedCount" class="font-bold">0</div><div>لعب</div></div>
                    <div class="text-center"><div id="winPercent" class="font-bold">0%</div><div>فوز</div></div>
                </div>
                <button id="closeStats" class="w-full bg-[var(--default-color)] py-2 rounded font-bold">إغلاق</button>
            </div>
        </div>

        <script>
            // إعدادات الربط - استبدل القيم بمفاتيحك
            const SB_URL = 'رابط_مشروعك_هنا';
            const SB_KEY = 'مفتاح_مشروعك_هنا';
            const _supabase = supabase.createClient(SB_URL, SB_KEY);

            // وظيفة الإرسال لقاعدة البيانات
            async function reportToSupabase(word, type) {
                const { error } = await _supabase.from('suggestions').insert([{ word, type }]);
                if (!error) {
                    if (type === 'hard_word') {
                        document.getElementById('reportHardBtn').innerText = 'تم التبليغ بنجاح ✅';
                    } else {
                        document.getElementById('message').innerHTML = 'تم إرسال طلبك للقاموس ✅';
                    }
                }
            }

            const HELP_SEEN_KEY = 'kalima_help_seen_v10';
            const STATS_KEY = 'kalima_stats_v10';
            const THEME_KEY = 'kalima_dark_v10';
            const ATTEMPTS_KEY = 'kalima_attempts_v10';
            const DIFFICULTY_KEY = 'kalima_difficulty_v4';

            const WORD_LIST = ["صصصصص", "ثثثثث", "ققققق", "ففففف"];
            const DICTIONARY = [...new Set(WORD_LIST)].concat(["صصصصص", "ثثثثث", "ققققق", "ففففف"]);

            const gameState = {
                targetWord: "", currentRow: 0, currentGuess: "", gameOver: false,
                stats: { played: 0, wins: 0, currentStreak: 0, maxStreak: 0 },
                difficulty: 'hard', maxRows: 6, isProcessing: false
            };

            function init() {
                loadDifficulty(); loadStats(); loadTheme();
                createGrid(); createKeyboard(); startNewGame();
                setupEventListeners(); showHelpIfFirstTime();
            }

            function loadDifficulty() {
                const saved = localStorage.getItem(DIFFICULTY_KEY);
                gameState.difficulty = (saved === 'easy' || saved === 'hard') ? saved : 'hard';
                gameState.maxRows = gameState.difficulty === 'hard' ? 6 : 8;
            }

            function startNewGame() {
                gameState.targetWord = WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)];
                gameState.currentRow = 0; gameState.currentGuess = '';
                gameState.gameOver = false; gameState.isProcessing = false;
                document.getElementById('grid').innerHTML = ''; createGrid();
                document.querySelectorAll('.key').forEach(k => k.classList.remove('correct', 'present', 'absent'));
                document.getElementById('message').textContent = '';
                document.getElementById('gameResultModal').classList.add('hidden');
                document.getElementById('reportHardBtn').innerText = 'الكلمة صعبة! بلّغ عنها';
            }

            function createGrid() {
                const grid = document.getElementById('grid');
                for (let r = 0; r < gameState.maxRows; r++) {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'grid-row'; rowDiv.id = `row-${r}`;
                    for (let c = 0; c < 5; c++) {
                        const tile = document.createElement('div');
                        tile.className = 'tile'; tile.id = `tile-${r}-${c}`;
                        rowDiv.appendChild(tile);
                    }
                    grid.appendChild(rowDiv);
                }
            }

            function createKeyboard() {
                const keyboard = document.getElementById('keyboard');
                const layout = [["ج", "ح", "خ", "ه", "ع", "غ", "ف", "ق", "ث", "ص", "ض"], ["ة", "ك", "م", "ن", "ت", "ا", "ل", "ب", "ي", "س", "ش"], ["ى", "و", "ر", "ز", "د", "ذ", "ط", "ظ", "ء", "أ"]];
                keyboard.innerHTML = '';
                layout.forEach((row, idx) => {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'keyboard-row flex justify-center gap-1 mb-2';
                    if (idx === 2) rowDiv.appendChild(createKey('Enter', 'Enter', 'key enter wide'));
                    row.forEach(char => rowDiv.appendChild(createKey(char, char, 'key')));
                    if (idx === 2) rowDiv.appendChild(createKey('⌫', 'Backspace', 'key backspace wide'));
                    keyboard.appendChild(rowDiv);
                });
            }

            function createKey(text, val, cls) {
                const btn = document.createElement('button');
                btn.className = cls; btn.textContent = text; btn.dataset.key = val;
                btn.onclick = () => handleInput(val); return btn;
            }

            function handleInput(key) {
                if (gameState.gameOver || gameState.isProcessing) return;
                if (key === 'Enter') submitGuess();
                else if (key === 'Backspace') {
                    gameState.currentGuess = gameState.currentGuess.slice(0, -1);
                    updateRow();
                } else if (gameState.currentGuess.length < 5 && /^[\u0600-\u06FF]$/.test(key)) {
                    gameState.currentGuess += key;
                    updateRow();
                }
            }

            function updateRow() {
                for (let i = 0; i < 5; i++) {
                    const tile = document.getElementById(`tile-${gameState.currentRow}-${i}`);
                    tile.textContent = gameState.currentGuess[i] || '';
                    tile.classList.toggle('filled', !!gameState.currentGuess[i]);
                }
            }

            function submitGuess() {
                if (gameState.currentGuess.length !== 5) return;
                
                // منطق التحقق مع زر الإضافة للقاموس
                if (!DICTIONARY.includes(gameState.currentGuess)) {
                    const msgDiv = document.getElementById('message');
                    msgDiv.innerHTML = 'الكلمة غير موجودة.. ';
                    const btn = document.createElement('button');
                    btn.className = 'suggest-btn';
                    btn.innerText = 'إضافة للقاموس؟';
                    btn.onclick = () => reportToSupabase(gameState.currentGuess, 'new_word');
                    msgDiv.appendChild(btn);
                    shakeRow(); return;
                }

                gameState.isProcessing = true;
                const result = calculateResult(gameState.currentGuess, gameState.targetWord);
                revealRow(result);
            }

            function calculateResult(guess, target) {
                const res = Array(5).fill('absent');
                const tArr = target.split('');
                const gArr = guess.split('');
                gArr.forEach((l, i) => { if (l === tArr[i]) { res[i] = 'correct'; tArr[i] = null; } });
                gArr.forEach((l, i) => { if (res[i] !== 'correct' && tArr.includes(l)) { res[i] = 'present'; tArr[tArr.indexOf(l)] = null; } });
                return res;
            }

            function revealRow(result) {
                let count = 0;
                result.forEach((status, i) => {
                    const tile = document.getElementById(`tile-${gameState.currentRow}-${i}`);
                    setTimeout(() => {
                        tile.classList.add('flip');
                        setTimeout(() => {
                            tile.classList.add(status);
                            updateKeyStatus(gameState.currentGuess[i], status);
                            if (++count === 5) checkGameEnd();
                        }, 300);
                    }, i * 200);
                });
            }

            function updateKeyStatus(letter, status) {
                const key = document.querySelector(`.key[data-key="${letter}"]`);
                if (!key || key.classList.contains('correct')) return;
                key.classList.remove('present', 'absent');
                key.classList.add(status);
            }

            function checkGameEnd() {
                if (gameState.currentGuess === gameState.targetWord) {
                    gameState.gameOver = true;
                    showResult(true);
                    updateStats(true);
                } else if (gameState.currentRow === gameState.maxRows - 1) {
                    gameState.gameOver = true;
                    showResult(false);
                    updateStats(false);
                } else {
                    gameState.currentRow++;
                    gameState.currentGuess = '';
                    gameState.isProcessing = false;
                }
            }

            function showResult(win) {
                document.getElementById('resultModalTitle').textContent = win ? "🎉 أحسنت!" : "💔 حظ أوفر";
                document.getElementById('gameResultDetails').innerHTML = `<div class="correct-word">${gameState.targetWord}</div>`;
                document.getElementById('gameResultModal').classList.remove('hidden');
            }

            function updateStats(win) {
                gameState.stats.played++;
                if (win) gameState.stats.wins++;
                localStorage.setItem(STATS_KEY, JSON.stringify(gameState.stats));
            }

            function shakeRow() {
                const row = document.getElementById(`row-${gameState.currentRow}`);
                row.classList.add('shake');
                setTimeout(() => row.classList.remove('shake'), 500);
            }

            function setupEventListeners() {
                document.getElementById('difficultyToggle').onclick = (e) => {
                    e.stopPropagation();
                    document.getElementById('difficultyMenu').classList.toggle('show');
                };
                
                document.querySelectorAll('.difficulty-option').forEach(opt => {
                    opt.onclick = () => {
                        gameState.difficulty = opt.dataset.difficulty;
                        gameState.maxRows = gameState.difficulty === 'hard' ? 6 : 8;
                        localStorage.setItem(DIFFICULTY_KEY, gameState.difficulty);
                        startNewGame();
                    };
                });

                document.getElementById('reportHardBtn').onclick = () => reportToSupabase(gameState.targetWord, 'hard_word');
                document.getElementById('playAgainBtn').onclick = startNewGame;
                document.getElementById('newGameHeaderBtn').onclick = startNewGame;
                document.getElementById('helpBtn').onclick = () => document.getElementById('helpModal').classList.remove('hidden');
                document.getElementById('startGameBtn').onclick = () => document.getElementById('helpModal').classList.add('hidden');
                document.getElementById('statsBtn').onclick = () => {
                    document.getElementById('playedCount').textContent = gameState.stats.played;
                    document.getElementById('winPercent').textContent = gameState.stats.played ? Math.round((gameState.stats.wins/gameState.stats.played)*100)+'%' : '0%';
                    document.getElementById('statsModal').classList.remove('hidden');
                };
                document.getElementById('closeStats').onclick = () => document.getElementById('statsModal').classList.add('hidden');
                
                document.addEventListener('keydown', (e) => handleInput(e.key === 'Backspace' ? 'Backspace' : (e.key === 'Enter' ? 'Enter' : e.key)));
            }

            function loadStats() {
                const saved = localStorage.getItem(STATS_KEY);
                if (saved) gameState.stats = JSON.parse(saved);
            }

            function loadTheme() {
                if (localStorage.getItem(THEME_KEY) === 'true') document.body.classList.add('light-mode');
            }

            function showHelpIfFirstTime() {
                if (!localStorage.getItem(HELP_SEEN_KEY)) {
                    document.getElementById('helpModal').classList.remove('hidden');
                    localStorage.setItem(HELP_SEEN_KEY, 'true');
                }
            }

            window.onload = init;
        </script>
    </body>
</html>
