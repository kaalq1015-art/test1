<!DOCTYPE html>
<html lang="ar" dir="rtl">
    <head>
        <script>
            document.addEventListener('contextmenu', event => event.preventDefault());

            document.onkeydown = function(e) {
                if(e.keyCode == 123) return false;
                if(e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) return false;
                if(e.ctrlKey && e.keyCode == 85) return false;
            }

            setInterval(function(){
                var start = new Date().getTime();
                debugger; 
                var end = new Date().getTime();
                if (end - start > 100) {
                    document.body.innerHTML = '';
                    window.location.reload();
                }
            }, 100);
        </script>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>كلمة - لعبة الكلمة العربية</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap');
            
            * {
                font-family: 'Tajawal', sans-serif;
                box-sizing: border-box;
            }

            :root {
                --correct-color: #538d4e;
                --present-color: #b59f3b;
                --absent-color: #3a3a3c;
                --default-color: #818384;
                --bg-color: #121213;
                --text-color: #ffffff;
                --border-color: #3a3a3c;
                --key-bg: #818384;
                --key-text: #ffffff;
                --enter-color: #4a8bc7;
                --backspace-color: #e74c3c;
                --newgame-color: #2980b9;
                --newgame-hover: #3498db;
                --easy-color: #4CAF50;
                --hard-color: #f44336;
            }

            .light-mode {
                --correct-color: #6ca965;
                --present-color: #c8b653;
                --absent-color: #787c7e;
                --default-color: #d3d6da;
                --bg-color: #ffffff;
                --text-color: #000000;
                --border-color: #d3d6da;
                --key-bg: #d3d6da;
                --key-text: #000000;
                --enter-color: #5b9bd5;
                --backspace-color: #ff6b6b;
                --newgame-color: #3498db;
                --newgame-hover: #2980b9;
                --easy-color: #4CAF50;
                --hard-color: #f44336;
            }

            body {
                background-color: var(--bg-color);
                color: var(--text-color);
                transition: all 0.3s ease;
                margin: 0;
                padding: 0;
                min-height: 100vh;
                overflow-x: hidden;
                touch-action: manipulation;
            }

            .tile {
                width: 50px;
                height: 50px;
                border: 2px solid var(--border-color);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.8rem;
                font-weight: bold;
                user-select: none;
                transition: all 0.3s ease;
                border-radius: 4px;
            }

            /* تنسيق الأزرار الجديدة */
            .suggest-btn {
                background-color: var(--newgame-color);
                color: white;
                padding: 4px 10px;
                border-radius: 4px;
                font-size: 0.8rem;
                margin-right: 8px;
                cursor: pointer;
                border: none;
            }
            .hard-word-btn {
                background-color: #e67e22;
                color: white;
                padding: 10px;
                border-radius: 8px;
                font-weight: bold;
                width: 100%;
                margin-top: 15px;
                border: none;
                cursor: pointer;
            }

            @media (max-width: 640px) {
                .tile { width: 48px; height: 48px; font-size: 1.7rem; }
            }

            @media (max-width: 480px) {
                .tile { width: 44px; height: 44px; font-size: 1.6rem; }
            }

            .tile.filled { border-color: #878a8c; animation: pop 0.1s ease; }
            @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
            .tile.correct { background-color: var(--correct-color); border-color: var(--correct-color); color: white; }
            .tile.present { background-color: var(--present-color); border-color: var(--present-color); color: white; }
            .tile.absent { background-color: var(--absent-color); border-color: var(--absent-color); color: white; }
            .flip { animation: flip 0.6s ease; }
            @keyframes flip { 0% { transform: rotateX(0); } 50% { transform: rotateX(90deg); } 100% { transform: rotateX(0); } }

            .key {
                height: 50px;
                min-width: 32px;
                background-color: var(--key-bg);
                color: var(--key-text);
                border: none;
                border-radius: 4px;
                font-weight: bold;
                font-size: 1rem;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                user-select: none;
                transition: all 0.2s ease;
                flex: 1;
                margin: 0 3px;
                padding: 0 4px;
                touch-action: manipulation;
            }

            .key.enter { background-color: var(--enter-color); color: white; font-size: 0.85rem; }
            .key.backspace { background-color: var(--backspace-color); color: white; }
            .key:hover { opacity: 0.9; }
            .key.wide { min-width: 60px; }
            .key.correct { background-color: var(--correct-color); color: white; }
            .key.present { background-color: var(--present-color); color: white; }
            .key.absent { background-color: var(--absent-color); color: white; }

            .shake { animation: shake 0.5s ease; }
            @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); } 20%, 40%, 60%, 80% { transform: translateX(5px); } }
            .bounce { animation: bounce 0.5s ease; }
            @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

            .modal-overlay { background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); }
            header { padding: 8px 12px; border-bottom: 1px solid var(--border-color); }
            h1 { font-size: 1.6rem; text-align: center; }
            #newGameHeaderBtn { background-color: var(--newgame-color); color: white; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }

            main { padding: 10px 5px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; width: 100%; max-width: 500px; margin: 0 auto; }
            #grid { gap: 6px; margin-bottom: 15px; }
            #keyboard { padding: 8px; gap: 6px; width: 100%; }
            .keyboard-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 6px; width: 100%; }
            #message { font-size: 1rem; height: 28px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; padding: 0 10px; text-align: center; flex-wrap: wrap; gap: 5px;}

            .modal-content { width: 95%; max-width: 500px; max-height: 90vh; overflow-y: auto; margin: 10px; }
            .correct-word { background-color: var(--correct-color); color: white; padding: 12px; border-radius: 8px; margin: 12px 0; text-align: center; font-size: 1.4rem; font-weight: bold; }
            .attempts-table-container { max-height: 250px; overflow-y: auto; margin: 15px 0; border: 1px solid var(--border-color); border-radius: 8px; padding: 8px; }
            .attempts-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
            .attempts-table th { background-color: var(--default-color); padding: 8px; text-align: center; border-bottom: 2px solid var(--border-color); }
            .attempts-table td { padding: 6px; text-align: center; border-bottom: 1px solid var(--border-color); }
            .grid-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 6px; }

            .attempt-matrix-container { margin: 20px 0; padding: 15px; border: 2px solid var(--border-color); border-radius: 10px; background-color: rgba(129, 131, 132, 0.05); }
            .matrix-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; text-align: center; }
            .matrix-grid { display: flex; flex-direction: column; align-items: center; gap: 8px; }
            .matrix-row { display: flex; justify-content: center; gap: 6px; }
            .matrix-tile { width: 24px; height: 24px; border-radius: 3px; }
            .matrix-tile.correct { background-color: var(--correct-color); }
            .matrix-tile.present { background-color: var(--present-color); }
            .matrix-tile.absent { background-color: var(--absent-color); }

            .result-buttons { display: flex; gap: 10px; margin-top: 20px; }
            .result-buttons button { flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; }

            .difficulty-dropdown { position: relative; display: inline-block; }
            .difficulty-toggle { padding: 8px 16px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; cursor: pointer; border: 2px solid var(--border-color); background-color: var(--bg-color); color: var(--text-color); display: flex; align-items: center; gap: 8px; min-width: 120px; justify-content: center;}
            .difficulty-menu { position: absolute; top: 100%; left: 0; right: 0; margin-top: 5px; background-color: var(--bg-color); border: 2px solid var(--border-color); border-radius: 6px; z-index: 100; display: none; }
            .difficulty-menu.show { display: block; }
            .difficulty-option { width: 100%; padding: 12px 16px; text-align: center; border: none; background: none; color: var(--text-color); cursor: pointer; border-bottom: 1px solid var(--border-color); }
            .difficulty-option.active { color: var(--correct-color); font-weight: bold; }
        </style>
    </head>
    <body class="flex flex-col min-h-screen">
        <header class="grid grid-cols-3 items-center px-2 py-3 border-b border-[var(--border-color)]">
            <div class="flex items-center gap-1">
                <button id="helpBtn" class="p-1.5 hover:bg-[var(--default-color)] rounded-full"><i class="fas fa-question-circle text-lg"></i></button>
                <button id="statsBtn" class="p-1.5 hover:bg-[var(--default-color)] rounded-full"><i class="fas fa-chart-bar text-lg"></i></button>
            </div>
            <div class="flex justify-center"><h1 class="font-bold text-lg sm:text-xl">كلمة</h1></div>
            <div class="flex items-center justify-end gap-1 sm:gap-2">
                <div class="difficulty-dropdown">
                    <button id="difficultyToggle" class="difficulty-toggle"><span>الصعوبة</span><i class="fas fa-chevron-down"></i></button>
                    <div id="difficultyMenu" class="difficulty-menu">
                        <button data-difficulty="hard" class="difficulty-option active">صعب</button>
                        <button data-difficulty="easy" class="difficulty-option">سهل</button>
                    </div>
                </div>
                <button id="newGameHeaderBtn" class="shrink-0"><i class="fas fa-redo-alt text-xs sm:text-sm"></i></button>

            </div>
        </header>

        <main class="flex-grow flex flex-col items-center justify-center">
            <div id="message" class="text-center font-bold"></div>
            <div id="grid" class="mb-4"></div>
            <div id="keyboard" class="w-full px-2 space-y-2 max-w-xl"></div>
        </main>

        <div id="helpModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden p-4">
            <div class="bg-[var(--bg-color)] border border-[var(--border-color)] rounded-lg modal-content p-5">
                <h2 class="text-xl font-bold mb-5">طريقة اللعب</h2>
                <p id="helpAttemptsText" class="text-center mb-5">خمّن الكلمة في 6 محاولات.</p>
                <button id="startGameBtn" class="w-full bg-[var(--correct-color)] text-white py-3 rounded-lg font-bold">بدء اللعب</button>
            </div>
        </div>

        <div id="statsModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden p-4">
            <div class="bg-[var(--bg-color)] border border-[var(--border-color)] rounded-lg modal-content p-5">
                <h2 class="text-xl font-bold mb-5">الإحصائيات</h2>
                <div id="gameResultInfo" class="mb-4"></div>
                <button id="newGameFromStats" class="w-full border py-2.5 rounded font-bold">لعبة جديدة</button>
            </div>
        </div>

        <div id="gameResultModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden p-4">
            <div class="bg-[var(--bg-color)] border border-[var(--border-color)] rounded-lg modal-content p-5">
                <h2 class="text-xl font-bold" id="resultModalTitle">نتيجة اللعبة</h2>
                <div id="gameResultDetails" class="text-center mb-4"></div>
                <div id="matrixGrid" class="matrix-grid"></div>
                
                <button id="reportHardBtn" class="hard-word-btn">الكلمة صعبة! بلّغ عنها</button>

                <div class="result-buttons">
                    <button id="playAgainBtn" class="bg-[var(--correct-color)] text-white">العب مجدداً</button>
                </div>
            </div>
        </div>

        <script>
            // إعدادات Supabase
            const SB_URL = 'YOUR_URL';
            const SB_KEY = 'YOUR_KEY';
            const _supabase = (SB_URL !== 'YOUR_URL') ? supabase.createClient(SB_URL, SB_KEY) : null;

            const HELP_SEEN_KEY = 'kalima_help_seen_v10';
            const STATS_KEY = 'kalima_stats_v10';
            const THEME_KEY = 'kalima_dark_v10';
            const ATTEMPTS_KEY = 'kalima_attempts_v10';
            const ATTEMPT_MATRICES_KEY = 'kalima_attempt_matrices_v6';
            const DIFFICULTY_KEY = 'kalima_difficulty_v4';

            const WORD_LIST = ["صصصصص", "ثثثثث", "ققققق", "ففففف"];
            const DICTIONARY = [...new Set(WORD_LIST)].concat(["صصصصص", "ثثثثث", "ققققق", "ففففف"]);

            const gameState = { targetWord: "", currentRow: 0, currentGuess: "", gameOver: false, gameWon: false, startTime: null, gameDuration: 0, attemptResults: [], stats: { played: 0, wins: 0, currentStreak: 0, maxStreak: 0 }, attemptsHistory: [], attemptMatrices: [], isProcessing: false, inputLock: false, difficulty: 'hard', maxRows: 6 };

            async function reportToSupabase(word, type) {
                if (!_supabase) { alert('يرجى ربط Supabase!'); return; }
                const { error } = await _supabase.from('suggestions').insert([{ word, type }]);
                if (!error) {
                    if (type === 'hard_word') document.getElementById('reportHardBtn').innerText = 'تم التبليغ بنجاح ✅';
                    else document.getElementById('message').innerHTML = 'تم إرسال طلبك للقاموس ✅';
                }
            }

            function init() { loadDifficulty(); loadStats(); loadAttemptsHistory(); loadAttemptMatrices(); loadTheme(); createGrid(); createKeyboard(); startNewGame(); setupEventListeners(); showHelpIfFirstTime(); updateDifficultyUI(); }

            function loadDifficulty() { const saved = localStorage.getItem(DIFFICULTY_KEY); gameState.difficulty = (saved === 'easy' || saved === 'hard') ? saved : 'hard'; gameState.maxRows = gameState.difficulty === 'hard' ? 6 : 8; }
            function saveDifficulty() { localStorage.setItem(DIFFICULTY_KEY, gameState.difficulty); }
            function updateDifficultyUI() { const easyOption = document.querySelector('[data-difficulty="easy"]'); const hardOption = document.querySelector('[data-difficulty="hard"]'); const helpText = document.getElementById('helpAttemptsText'); if (gameState.difficulty === 'hard') { hardOption.classList.add('active'); easyOption.classList.remove('active'); helpText.textContent = 'خمّن الكلمة في 6 محاولات.'; } else { hardOption.classList.remove('active'); easyOption.classList.add('active'); helpText.textContent = 'خمّن الكلمة في 8 محاولات.'; } }
            function changeDifficulty(newDifficulty) { if (newDifficulty !== 'easy' && newDifficulty !== 'hard') return; gameState.difficulty = newDifficulty; gameState.maxRows = newDifficulty === 'hard' ? 6 : 8; saveDifficulty(); updateDifficultyUI(); createGrid(); startNewGame(); }
            function loadStats() { const saved = localStorage.getItem(STATS_KEY); if (saved) { try { const parsed = JSON.parse(saved); if (parsed && typeof parsed === 'object') gameState.stats = parsed; } catch (e) { resetStats(); } } else { resetStats(); } }
            function loadAttemptMatrices() { const saved = localStorage.getItem(ATTEMPT_MATRICES_KEY); if (saved) { try { const parsed = JSON.parse(saved); if (Array.isArray(parsed)) gameState.attemptMatrices = parsed; } catch (e) { gameState.attemptMatrices = []; } } }
            function saveAttemptMatrices() { localStorage.setItem(ATTEMPT_MATRICES_KEY, JSON.stringify(gameState.attemptMatrices)); }
            function resetStats() { gameState.stats = { played: 0, wins: 0, currentStreak: 0, maxStreak: 0 }; saveStats(); }
            function loadAttemptsHistory() { const saved = localStorage.getItem(ATTEMPTS_KEY); if (saved) { try { const parsed = JSON.parse(saved); if (Array.isArray(parsed)) gameState.attemptsHistory = parsed; } catch (e) { gameState.attemptsHistory = []; } } }
            function saveStats() { localStorage.setItem(STATS_KEY, JSON.stringify(gameState.stats)); }
            function saveAttemptsHistory() { localStorage.setItem(ATTEMPTS_KEY, JSON.stringify(gameState.attemptsHistory)); }
            function loadTheme() { const saved = localStorage.getItem(THEME_KEY); const icon = document.querySelector('#themeToggle i'); if (saved === 'false') { document.body.classList.add('light-mode'); icon.className = 'fas fa-moon text-lg'; } else { document.body.classList.remove('light-mode'); icon.className = 'fas fa-sun text-lg'; } }
            function showHelpIfFirstTime() { if (!localStorage.getItem(HELP_SEEN_KEY)) { setTimeout(() => document.getElementById('helpModal').classList.remove('hidden'), 500); localStorage.setItem(HELP_SEEN_KEY, 'true'); } }
            function createGrid() { const grid = document.getElementById('grid'); grid.innerHTML = ''; for (let row = 0; row < gameState.maxRows; row++) { const rowDiv = document.createElement('div'); rowDiv.className = 'grid-row'; rowDiv.id = `row-${row}`; for (let col = 0; col < 5; col++) { const tile = document.createElement('div'); tile.className = 'tile'; tile.id = `tile-${row}-${col}`; rowDiv.appendChild(tile); } grid.appendChild(rowDiv); } }
            function createKeyboard() {
                const keyboard = document.getElementById('keyboard'); const layout = [["ج", "ح", "خ", "ه", "ع", "غ", "ف", "ق", "ث", "ص", "ض"], ["ة", "ك", "م", "ن", "ت", "ا", "ل", "ب", "ي", "س", "ش"], ["ى", "و", "ر", "ز", "د", "ذ", "ط", "ظ", "ء", "أ"]];
                keyboard.innerHTML = ''; layout.forEach((row, index) => { const rowDiv = document.createElement('div'); rowDiv.className = 'keyboard-row'; if (index === 2) rowDiv.appendChild(createKey('Enter', 'Enter', 'wide enter')); for (const char of row) rowDiv.appendChild(createKey(char, char)); if (index === 2) rowDiv.appendChild(createKey('⌫', 'Backspace', 'wide backspace')); keyboard.appendChild(rowDiv); });
            }
            function createKey(text, value, extraClass='') { const key = document.createElement('button'); key.className = `key ${extraClass}`; key.textContent = text; key.dataset.key = value; key.addEventListener('click', () => handleInput(value)); return key; }
            function startNewGame() {
                gameState.targetWord = WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)];
                gameState.currentRow = 0; gameState.currentGuess = ''; gameState.gameOver = false; gameState.gameWon = false; gameState.isProcessing = false; gameState.inputLock = false; gameState.startTime = new Date(); gameState.gameDuration = 0; gameState.attemptResults = [];
                document.querySelectorAll('.tile').forEach(tile => { tile.className = 'tile'; tile.textContent = ''; });
                document.querySelectorAll('.grid-row').forEach(row => row.classList.remove('shake', 'win-celebration'));
                document.querySelectorAll('.key').forEach(key => key.classList.remove('correct', 'present', 'absent'));
                document.getElementById('message').textContent = ''; document.getElementById('gameResultModal').classList.add('hidden'); document.getElementById('reportHardBtn').innerText = 'الكلمة صعبة! بلّغ عنها'; updateCurrentRow();
            }
            function handleInput(key) { if (gameState.inputLock || gameState.gameOver || gameState.isProcessing) return; if (key === 'Enter') submitGuess(); else if (key === 'Backspace') handleBackspace(); else if (/^[\u0600-\u06FF]$/.test(key)) handleLetterInput(key); }
            function handleLetterInput(letter) { if (gameState.currentGuess.length < 5) { gameState.inputLock = true; gameState.currentGuess += letter; updateCurrentRow(); const tile = document.getElementById(`tile-${gameState.currentRow}-${gameState.currentGuess.length - 1}`); if (tile) { tile.classList.add('filled'); setTimeout(() => { tile.classList.remove('filled'); gameState.inputLock = false; }, 100); } else { gameState.inputLock = false; } } }
            function handleBackspace() { if (gameState.currentGuess.length > 0) { gameState.currentGuess = gameState.currentGuess.slice(0, -1); updateCurrentRow(); } }
            function updateCurrentRow() { for (let i = 0; i < 5; i++) { const tile = document.getElementById(`tile-${gameState.currentRow}-${i}`); if (tile) tile.textContent = gameState.currentGuess[i] || ''; } }
            
            // إضافة زر الاقتراح عند الخطأ في القاموس
            function submitGuess() {
                if (gameState.isProcessing) return;
                if (gameState.currentGuess.length !== 5) { showMessage('الكلمة يجب أن تكون 5 أحرف'); shakeRow(); return; }
                if (!DICTIONARY.includes(gameState.currentGuess)) { 
                    const msg = document.getElementById('message');
                    msg.innerHTML = 'الكلمة غير موجودة.. ';
                    const btn = document.createElement('button');
                    btn.className = 'suggest-btn';
                    btn.innerText = 'إضافة للقاموس؟';
                    btn.onclick = () => reportToSupabase(gameState.currentGuess, 'new_word');
                    msg.appendChild(btn);
                    shakeRow(); return; 
                }
                gameState.isProcessing = true; evaluateGuess();
            }

            function evaluateGuess() {
                const guess = gameState.currentGuess; const target = gameState.targetWord; const result = calculateGuessResult(guess, target); gameState.attemptResults[gameState.currentRow] = result; gameState.inputLock = true; let completed = 0;
                for (let i = 0; i < 5; i++) { const tile = document.getElementById(`tile-${gameState.currentRow}-${i}`); setTimeout(() => { tile.classList.add('flip'); setTimeout(() => { tile.classList.add(result[i]); updateKeyboard(guess[i], result[i]); completed++; if (completed === 5) { setTimeout(() => { processGuessResult(guess, target); gameState.inputLock = false; }, 300); } }, 300); }, i * 300); }
            }
            function calculateGuessResult(guess, target) { const result = Array(5).fill('absent'); const counts = {}; for (const l of target) counts[l] = (counts[l] || 0) + 1; for (let i = 0; i < 5; i++) if (guess[i] === target[i]) { result[i] = 'correct'; counts[guess[i]]--; } for (let i = 0; i < 5; i++) if (result[i] !== 'correct' && counts[guess[i]] > 0) { result[i] = 'present'; counts[guess[i]]--; } return result; }
            function processGuessResult(guess, target) { if (guess === target) { gameState.gameWon = gameState.gameOver = true; handleWin(); } else if (gameState.currentRow === gameState.maxRows - 1) { gameState.gameOver = true; handleLoss(); } else { gameState.currentRow++; gameState.currentGuess = ''; gameState.isProcessing = false; updateCurrentRow(); } }
            function updateKeyboard(letter, status) { const key = document.querySelector(`.key[data-key="${letter}"]`); if (!key) return; if (status === 'correct') { key.classList.add('correct'); key.classList.remove('present', 'absent'); } else if (status === 'present' && !key.classList.contains('correct')) { key.classList.add('present'); key.classList.remove('absent'); } else if (status === 'absent' && !key.classList.contains('correct') && !key.classList.contains('present')) key.classList.add('absent'); }
            function renderAttemptMatrix() { const container = document.getElementById('matrixGrid'); container.innerHTML = ''; gameState.attemptResults.forEach((res) => { const rowDiv = document.createElement('div'); rowDiv.className = 'matrix-row'; res.forEach((status) => { const tile = document.createElement('div'); tile.className = `matrix-tile ${status}`; rowDiv.appendChild(tile); }); container.appendChild(rowDiv); }); }
            function handleWin() { showMessage('🎉 أحسنت! لقد فزت!'); gameState.stats.played++; gameState.stats.wins++; saveStats(); setTimeout(() => showGameResultModal(true), 2000); }
            function handleLoss() { showMessage(`💔 الكلمة: ${gameState.targetWord}`); gameState.stats.played++; saveStats(); setTimeout(() => showGameResultModal(false), 2000); }
            function showMessage(text) { const el = document.getElementById('message'); el.textContent = text; el.classList.add('bounce'); setTimeout(() => el.classList.remove('bounce'), 500); }
            function shakeRow() { const r = document.getElementById(`row-${gameState.currentRow}`); if (r) { r.classList.add('shake'); setTimeout(() => r.classList.remove('shake'), 500); } }
            
            function showGameResultModal(isWin) {
                const m = document.getElementById('gameResultModal'); const d = document.getElementById('gameResultDetails');
                document.getElementById('resultModalTitle').textContent = isWin ? '🎉 مبروك! فزت!' : '💔 انتهت المحاولات!';
                d.innerHTML = `<div class="correct-word">${gameState.targetWord}</div>`;
                renderAttemptMatrix(); m.classList.remove('hidden');
            }

            function setupEventListeners() {
                document.addEventListener('keydown', (e) => { if (e.ctrlKey || e.metaKey || e.altKey) return; if (e.key === 'Enter') handleInput('Enter'); else if (e.key === 'Backspace') handleInput('Backspace'); else if (/^[\u0600-\u06FF]$/.test(e.key)) handleInput(e.key); });
                const diffToggle = document.getElementById('difficultyToggle'); const diffMenu = document.getElementById('difficultyMenu');
                diffToggle.onclick = (e) => { e.stopPropagation(); diffMenu.classList.toggle('show'); };
                document.querySelectorAll('.difficulty-option').forEach(opt => opt.onclick = function() { changeDifficulty(this.dataset.difficulty); });
                document.getElementById('helpBtn').onclick = () => document.getElementById('helpModal').classList.remove('hidden');
                document.getElementById('statsBtn').onclick = () => { document.getElementById('playedCount').innerText = gameState.stats.played; document.getElementById('statsModal').classList.remove('hidden'); };
                document.getElementById('newGameHeaderBtn').onclick = startNewGame;
                document.getElementById('themeToggle').onclick = () => { const isLight = document.body.classList.toggle('light-mode'); localStorage.setItem(THEME_KEY, !isLight); };
                document.getElementById('reportHardBtn').onclick = () => reportToSupabase(gameState.targetWord, 'hard_word');
                document.getElementById('startGameBtn').onclick = () => { document.getElementById('helpModal').classList.add('hidden'); startNewGame(); };
                document.getElementById('closeHelp').onclick = () => document.getElementById('helpModal').classList.add('hidden');
                document.getElementById('closeStats').onclick = () => document.getElementById('statsModal').classList.add('hidden');
                document.getElementById('closeGameResult').onclick = () => document.getElementById('gameResultModal').classList.add('hidden');
                document.getElementById('playAgainBtn').onclick = startNewGame;
            }
            window.addEventListener('load', init);
        </script>
    </body>
</html>
