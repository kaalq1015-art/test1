<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="words.js"></script>
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());

        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) return false;
            if(e.ctrlKey && e.keyCode == 85) return false;
        }

        setInterval(function(){
            var start = new Date().getTime();
            debugger; 
            var end = new Date().getTime();
            if (end - start > 100) {
                document.body.innerHTML = '';
                window.location.reload();
            }
        }, 100);
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>كلمة - لعبة الكلمة العربية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap');
        
        * {
            font-family: 'Tajawal', sans-serif;
            box-sizing: border-box;
        }

        :root {
            --correct-color: #538d4e;
            --present-color: #b59f3b;
            --absent-color: #3a3a3c;
            --default-color: #818384;
            --bg-color: #121213;
            --text-color: #ffffff;
            --border-color: #3a3a3c;
            --key-bg: #818384;
            --key-text: #ffffff;
            --enter-color: #4a8bc7;
            --backspace-color: #e74c3c;
            --newgame-color: #2980b9;
            --newgame-hover: #3498db;
            --easy-color: #4CAF50;
            --hard-color: #f44336;
        }

        .light-mode {
            --correct-color: #6ca965;
            --present-color: #c8b653;
            --absent-color: #787c7e;
            --default-color: #d3d6da;
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #d3d6da;
            --key-bg: #d3d6da;
            --key-text: #000000;
            --enter-color: #5b9bd5;
            --backspace-color: #ff6b6b;
            --newgame-color: #3498db;
            --newgame-hover: #2980b9;
            --easy-color: #4CAF50;
            --hard-color: #f44336;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
            touch-action: manipulation;
        }

        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 10px;
            gap: 15px;
        }

        .tile {
            width: clamp(52px, 16vw, 62px);
            height: clamp(52px, 16vw, 62px);
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.8rem, 6vw, 2.2rem);
            font-weight: bold;
            user-select: none;
            transition: all 0.3s ease;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .tile.filled {
            border-color: #878a8c;
            animation: pop 0.1s ease;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .tile.correct {
            background-color: var(--correct-color);
            border-color: var(--correct-color);
            color: white;
        }

        .tile.present {
            background-color: var(--present-color);
            border-color: var(--present-color);
            color: white;
        }

        .tile.absent {
            background-color: var(--absent-color);
            border-color: var(--absent-color);
            color: white;
        }

        .flip {
            animation: flip 0.6s ease;
        }

        @keyframes flip {
            0% { transform: rotateX(0); }
            50% { transform: rotateX(90deg); }
            100% { transform: rotateX(0); }
        }

        .key {
            height: clamp(48px, 12vw, 58px);
            min-width: clamp(30px, 8vw, 42px);
            background-color: var(--key-bg);
            color: var(--key-text);
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            flex: 1;
            margin: 0 2px;
            touch-action: manipulation;
        }

        .key.enter {
            background-color: var(--enter-color);
            color: white;
            font-size: clamp(0.75rem, 3vw, 0.9rem);
            min-width: clamp(55px, 15vw, 75px);
        }

        .key.backspace {
            background-color: var(--backspace-color);
            color: white;
            min-width: clamp(45px, 12vw, 60px);
        }

        .key:hover { opacity: 0.9; }
        
        .key.correct { background-color: var(--correct-color); color: white; }
        .key.present { background-color: var(--present-color); color: white; }
        .key.absent { background-color: var(--absent-color); color: white; }

        .shake { animation: shake 0.5s ease; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .bounce { animation: bounce 0.5s ease; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
        }

        header {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 8px;
            width: 100%;
        }

        .grid-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        #message {
            font-size: 1rem;
            min-height: 42px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            text-align: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .modal-content {
            width: 95%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            margin: 10px;
        }

        .correct-word {
            background-color: var(--correct-color);
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .color-example {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            background-color: rgba(129, 131, 132, 0.1);
        }

        .color-box {
            width: 45px;
            height: 45px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        .color-box.correct { background-color: var(--correct-color); border-color: var(--correct-color); color: white; }
        .color-box.present { background-color: var(--present-color); border-color: var(--present-color); color: white; }
        .color-box.absent { background-color: var(--absent-color); border-color: var(--absent-color); color: white; }

        .attempts-table-container {
            max-height: 250px;
            overflow-y: auto;
            margin: 15px 0;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px;
        }

        .attempts-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .attempts-table th { background-color: var(--default-color); padding: 8px; text-align: center; border-bottom: 2px solid var(--border-color); }
        .attempts-table td { padding: 6px; text-align: center; border-bottom: 1px solid var(--border-color); }

        .attempt-matrix-container {
            margin: 20px 0;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background-color: rgba(129, 131, 132, 0.05);
        }

        .matrix-grid { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 15px; }
        .matrix-row { display: flex; justify-content: center; gap: 6px; }

        .matrix-tile {
            width: 24px;
            height: 24px;
            border-radius: 3px;
        }

        .matrix-tile.correct { background-color: var(--correct-color); }
        .matrix-tile.present { background-color: var(--present-color); }
        .matrix-tile.absent { background-color: var(--absent-color); }

        .difficulty-dropdown { position: relative; display: inline-block; }
        .difficulty-toggle {
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            border: 2px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .difficulty-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 5px;
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            z-index: 100;
            display: none;
        }

        .difficulty-menu.show { display: block; }

        .difficulty-option {
            width: 100%;
            padding: 10px;
            text-align: center;
            background: none;
            color: var(--text-color);
            cursor: pointer;
            display: block;
            border-bottom: 1px solid var(--border-color);
        }

        .difficulty-option.active { color: var(--correct-color); font-weight: bold; }

        .suggest-btn {
            background-color: #2980b9;
            color: white;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 8px;
            cursor: pointer;
            border: none;
        }
        .hard-word-btn {
            background-color: #e67e22;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>
    <header class="grid grid-cols-3 items-center px-4 py-3 border-b border-[var(--border-color)]">
        <div class="flex items-center gap-2">
            <button id="helpBtn" class="p-2 hover:bg-[var(--default-color)] rounded-full">
                <i class="fas fa-question-circle text-xl"></i>
            </button>
            <button id="statsBtn" class="p-2 hover:bg-[var(--default-color)] rounded-full">
                <i class="fas fa-chart-bar text-xl"></i>
            </button>
        </div>
        <div class="flex justify-center">
            <h1 class="font-bold text-2xl tracking-wider">كلمة</h1>
        </div>
        <div class="flex items-center justify-end gap-2">
            <div class="difficulty-dropdown">
                <button id="difficultyToggle" class="difficulty-toggle">
                    <span class="text-xs font-bold">الصعوبة</span>
                    <i class="fas fa-chevron-down text-[10px]"></i>
                </button>
                <div id="difficultyMenu" class="difficulty-menu text-sm">

            </button>

    </header>

    <div class="game-container">
        <div id="message" class="font-bold"></div>
        <div id="grid"></div>
        <div id="keyboard" class="w-full"></div>
    </div>

    <div id="helpModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden p-4">
        <div class="bg-[var(--bg-color)] border border-[var(--border-color)] rounded-lg modal-content">
            <div class="p-6">
                <div class="flex justify-between items-center mb-5">
                    <h2 class="text-xl font-bold">طريقة اللعب</h2>
                    <button id="closeHelp" class="text-2xl">&times;</button>
                </div>
                <div class="mb-6">
                    <p class="text-base mb-5 text-center" id="helpAttemptsText">خمّن الكلمة في 6 محاولات.</p>
                    <div class="color-example">
                        <div class="color-box correct"></div>
                        <div class="color-description">
                            <h3 class="font-bold">اللون الأخضر</h3>
                            <p>الحرف صحيح وفي المكان الصحيح.</p>
                        </div>
                    </div>
                    <div class="color-example">
                        <div class="color-box present"></div>
                        <div class="color-description">
                            <h3 class="font-bold">اللون الأصفر</h3>
                            <p>الحرف صحيح ولكن في المكان الخطأ.</p>
                        </div>
                    </div>
                    <div class="color-example">
                        <div class="color-box absent"></div>
                        <div class="color-description">
                            <h3 class="font-bold">اللون الرمادي</h3>
                            <p>الحرف غير موجود في الكلمة.</p>
                        </div>
                    </div>
                </div>
                <div class="text-center">
                    <button id="startGameBtn" class="bg-[var(--correct-color)] text-white px-8 py-3 rounded-lg font-bold">ابدأ اللعب</button>
                </div>
            </div>
        </div>
    </div>

    <div id="statsModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden p-4">
        <div class="bg-[var(--bg-color)] border border-[var(--border-color)] rounded-lg modal-content">
            <div class="p-6">
                <div class="flex justify-between items-center mb-5">
                    <h2 class="text-xl font-bold">الإحصائيات</h2>
                    <button id="closeStats" class="text-2xl">&times;</button>
                </div>
                <div id="gameResultInfo"></div>
                <div class="flex justify-around mb-6">
                    <div class="text-center">
                        <div id="playedCount" class="text-2xl font-bold">0</div>
                        <div class="text-xs">العب</div>
                    </div>
                    <div class="text-center">
                        <div id="winPercent" class="text-2xl font-bold">0%</div>
                        <div class="text-xs">فوز</div>
                    </div>
                    <div class="text-center">
                        <div id="currentStreak" class="text-2xl font-bold">0</div>
                        <div class="text-xs">تتابع</div>
                    </div>
                </div>
                <button id="newGameFromStats" class="w-full border border-[var(--border-color)] py-3 rounded font-bold">لعبة جديدة</button>
            </div>
        </div>
    </div>

    <div id="gameResultModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden p-4">
        <div class="bg-[var(--bg-color)] border border-[var(--border-color)] rounded-lg modal-content">
            <div class="p-6">
                <div class="flex justify-between items-center mb-5">
                    <h2 class="text-xl font-bold" id="resultModalTitle">نتيجة اللعبة</h2>
                    <button id="closeGameResult" class="text-2xl">&times;</button>
                </div>
                <div id="gameResultDetails" class="text-center mb-4"></div>
                <div id="attemptMatrixContainer" class="attempt-matrix-container">
                    <h3 class="text-center mb-3 font-bold">خريطة التفكير</h3>
                    <div id="matrixGrid" class="matrix-grid"></div>
                </div>
                <button id="reportHardBtn" class="hard-word-btn">الكلمة صعبة! بلّغ عنها</button>
                <div class="flex gap-2 mt-4">
                    <button id="playAgainBtn" class="flex-1 bg-[var(--correct-color)] text-white py-3 rounded-lg font-bold">العب مرة أخرى</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://fgqpxberckadkbwybecp.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_9owboLLUIPUApmjLfs4gmQ_N7VNiwGd';
        let supabaseClient = null;
        try {
            if (typeof supabase !== 'undefined' && supabase.createClient) {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        } catch(e) { console.warn("Supabase init error", e); }

        async function reportToSupabase(word, type) {
            if (!supabaseClient) throw new Error("Supabase غير مهيأ");
            const { error } = await supabaseClient.from('suggestions').insert([{ word, type }]);
            if (error) throw error;
            return true;
        }

        let tempMsgTimeout = null;
        function showTemporaryMessage(msg, duration = 3000) {
            const msgDiv = document.getElementById('message');
            const originalHTML = msgDiv.innerHTML;
            msgDiv.innerHTML = msg;
            if (tempMsgTimeout) clearTimeout(tempMsgTimeout);
            tempMsgTimeout = setTimeout(() => {
                if (msgDiv.innerHTML === msg) msgDiv.innerHTML = originalHTML;
                tempMsgTimeout = null;
            }, duration);
        }

        const HELP_SEEN_KEY = 'kalima_help_seen_v10';
        const STATS_KEY = 'kalima_stats_v10';
        const THEME_KEY = 'kalima_dark_v10';
        const ATTEMPTS_KEY = 'kalima_attempts_v10';
        const ATTEMPT_MATRICES_KEY = 'kalima_attempt_matrices_v6';
        const DIFFICULTY_KEY = 'kalima_difficulty_v4';

        const gameState = {
            targetWord: "",
            currentRow: 0,
            currentGuess: "",
            gameOver: false,
            gameWon: false,
            startTime: null,
            gameDuration: 0,
            attemptResults: [],
            stats: { played: 0, wins: 0, currentStreak: 0, maxStreak: 0 },
            attemptsHistory: [],
            attemptMatrices: [],
            isProcessing: false,
            inputLock: false,
            difficulty: 'hard',
            maxRows: 6
        };

        function init() {
            if (typeof WORD_LIST === 'undefined' || typeof DICTIONARY === 'undefined') {
                console.error("ملف words.js لم يتم تحميله بشكل صحيح");
                return;
            }
            loadDifficulty();
            loadStats();
            loadAttemptsHistory();
            loadAttemptMatrices();
            loadTheme();
            createGrid();
            createKeyboard();
            startNewGame();
            setupEventListeners();
            showHelpIfFirstTime();
            updateDifficultyUI();
        }

        function loadDifficulty() {
            const saved = localStorage.getItem(DIFFICULTY_KEY);
            gameState.difficulty = (saved === 'easy' || saved === 'hard') ? saved : 'hard';
            gameState.maxRows = gameState.difficulty === 'hard' ? 6 : 8;
        }
        function saveDifficulty() { localStorage.setItem(DIFFICULTY_KEY, gameState.difficulty); }

        function updateDifficultyUI() {
            const easyOption = document.querySelector('[data-difficulty="easy"]');
            const hardOption = document.querySelector('[data-difficulty="hard"]');
            const helpText = document.getElementById('helpAttemptsText');
            if (gameState.difficulty === 'hard') {
                hardOption.classList.add('active');
                easyOption.classList.remove('active');
                helpText.textContent = 'خمّن الكلمة في 6 محاولات.';
            } else {
                hardOption.classList.remove('active');
                easyOption.classList.add('active');
                helpText.textContent = 'خمّن الكلمة في 8 محاولات.';
            }
        }

        function changeDifficulty(newDifficulty) {
            if (newDifficulty !== 'easy' && newDifficulty !== 'hard') return;
            if (gameState.difficulty === newDifficulty) return;
            gameState.difficulty = newDifficulty;
            gameState.maxRows = newDifficulty === 'hard' ? 6 : 8;
            saveDifficulty();
            updateDifficultyUI();
            createGrid();
            startNewGame();
        }

        function loadStats() {
            const saved = localStorage.getItem(STATS_KEY);
            if (saved) {
                try { gameState.stats = JSON.parse(saved); }
                catch(e) { resetStats(); }
            } else resetStats();
        }
        function loadAttemptMatrices() {
            const saved = localStorage.getItem(ATTEMPT_MATRICES_KEY);
            if (saved) {
                try { gameState.attemptMatrices = JSON.parse(saved); }
                catch(e) { gameState.attemptMatrices = []; }
            }
        }
        function saveAttemptMatrices() { localStorage.setItem(ATTEMPT_MATRICES_KEY, JSON.stringify(gameState.attemptMatrices)); }
        function resetStats() { gameState.stats = { played:0, wins:0, currentStreak:0, maxStreak:0 }; saveStats(); }
        function loadAttemptsHistory() {
            const saved = localStorage.getItem(ATTEMPTS_KEY);
            if (saved) {
                try { gameState.attemptsHistory = JSON.parse(saved); }
                catch(e) { gameState.attemptsHistory = []; }
            }
        }
        function saveStats() { localStorage.setItem(STATS_KEY, JSON.stringify(gameState.stats)); }
        function saveAttemptsHistory() { localStorage.setItem(ATTEMPTS_KEY, JSON.stringify(gameState.attemptsHistory)); }

        function loadTheme() {
            const saved = localStorage.getItem(THEME_KEY);
            const icon = document.querySelector('#themeToggle i');
            if (saved === 'false') {
                document.body.classList.add('light-mode');
                icon.className = 'fas fa-moon text-xl';
            } else {
                document.body.classList.remove('light-mode');
                icon.className = 'fas fa-sun text-xl';
            }
        }

        function showHelpIfFirstTime() {
            if (!localStorage.getItem(HELP_SEEN_KEY)) {
                setTimeout(() => document.getElementById('helpModal').classList.remove('hidden'), 500);
                localStorage.setItem(HELP_SEEN_KEY, 'true');
            }
        }

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let row = 0; row < gameState.maxRows; row++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'grid-row';
                rowDiv.id = `row-${row}`;
                for (let col = 0; col < 5; col++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.id = `tile-${row}-${col}`;
                    rowDiv.appendChild(tile);
                }
                grid.appendChild(rowDiv);
            }
        }

        function createKeyboard() {
            const keyboard = document.getElementById('keyboard');
            const layout = [
                ["ج", "ح", "خ", "ه", "ع", "غ", "ف", "ق", "ث", "ص"],
                ["ة", "ك", "م", "ن", "ت", "ا", "ل", "ب", "ي", "س", "ش"],
                ["ض", "و", "ر", "ز", "د", "ذ", "ط", "ظ"]
            ];
            keyboard.innerHTML = '';
            layout.forEach((row, index) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'keyboard-row';
                if (index === 2) rowDiv.appendChild(createKey('دخول', 'Enter', 'enter'));
                for (const char of row) rowDiv.appendChild(createKey(char, char));
                if (index === 2) rowDiv.appendChild(createKey('⌫', 'Backspace', 'backspace'));
                keyboard.appendChild(rowDiv);
            });
        }

        function createKey(text, value, extraClass='') {
            const key = document.createElement('button');
            key.className = `key ${extraClass}`;
            key.textContent = text;
            key.dataset.key = value;
            key.addEventListener('click', () => handleInput(value));
            return key;
        }

        function startNewGame() {
            gameState.targetWord = WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)];
            gameState.currentRow = 0;
            gameState.currentGuess = '';
            gameState.gameOver = false;
            gameState.gameWon = false;
            gameState.isProcessing = false;
            gameState.inputLock = false;
            gameState.startTime = new Date();
            gameState.gameDuration = 0;
            gameState.attemptResults = [];

            document.querySelectorAll('.tile').forEach(tile => {
                tile.className = 'tile';
                tile.textContent = '';
            });
            document.querySelectorAll('.grid-row').forEach(row => row.classList.remove('shake', 'win-celebration'));
            document.querySelectorAll('.key').forEach(key => key.classList.remove('correct', 'present', 'absent'));
            document.getElementById('message').innerHTML = '';
            document.getElementById('gameResultModal').classList.add('hidden');
            document.getElementById('statsModal').classList.add('hidden');
            updateCurrentRow();
        }

        function handleInput(key) {
            if (gameState.inputLock || gameState.gameOver || gameState.isProcessing) return;
            if (key === 'Enter') submitGuess();
            else if (key === 'Backspace') handleBackspace();
            else if (/^[\u0600-\u06FF]$/.test(key)) handleLetterInput(key);
        }

        function handleLetterInput(letter) {
            if (gameState.currentGuess.length < 5) {
                gameState.inputLock = true;
                gameState.currentGuess += letter;
                updateCurrentRow();
                const tile = document.getElementById(`tile-${gameState.currentRow}-${gameState.currentGuess.length-1}`);
                if (tile) {
                    tile.classList.add('filled');
                    setTimeout(() => tile.classList.remove('filled'), 100);
                }
                setTimeout(() => gameState.inputLock = false, 100);
            }
        }

        function handleBackspace() {
            if (gameState.currentGuess.length > 0) {
                gameState.currentGuess = gameState.currentGuess.slice(0, -1);
                updateCurrentRow();
            }
        }

        function updateCurrentRow() {
            for (let i=0;i<5;i++) {
                const tile = document.getElementById(`tile-${gameState.currentRow}-${i}`);
                if (tile) tile.textContent = gameState.currentGuess[i] || '';
            }
        }

        function submitGuess() {
            if (gameState.isProcessing) return;
            if (gameState.currentGuess.length !== 5) { showMessage('الكلمة يجب أن تكون 5 أحرف'); shakeRow(); return; }
            if (!isValidWord(gameState.currentGuess)) {
                const msgDiv = document.getElementById('message');
                msgDiv.innerHTML = '';
                const textSpan = document.createElement('span');
                textSpan.textContent = 'الكلمة غير موجودة.. ';
                const btn = document.createElement('button');
                btn.className = 'suggest-btn';
                btn.textContent = 'إضافة؟';
                msgDiv.appendChild(textSpan);
                msgDiv.appendChild(btn);

                let autoRemoveTimer = setTimeout(() => {
                    if (msgDiv.contains(btn)) msgDiv.innerHTML = '';
                }, 5000);

                btn.onclick = async (e) => {
                    e.stopPropagation();
                    clearTimeout(autoRemoveTimer);
                    btn.disabled = true;
                    btn.textContent = 'جاري الإرسال...';
                    try {
                        await reportToSupabase(gameState.currentGuess, 'new_word');
                        msgDiv.innerHTML = '✅ تم إرسال طلبك للقاموس';
                    } catch(err) {
                        msgDiv.innerHTML = '❌ حدث خطأ';
                    }
                };
                shakeRow();
                return;
            }
            gameState.isProcessing = true;
            evaluateGuess();
        }

        function isValidWord(word) { return DICTIONARY.includes(word); }

        function evaluateGuess() {
            const guess = gameState.currentGuess;
            const target = gameState.targetWord;
            const result = calculateGuessResult(guess, target);
            gameState.attemptResults[gameState.currentRow] = result;
            gameState.inputLock = true;
            let completed = 0;
            for (let i=0;i<5;i++) {
                const tile = document.getElementById(`tile-${gameState.currentRow}-${i}`);
                if (!tile) continue;
                setTimeout(() => {
                    tile.classList.add('flip');
                    setTimeout(() => {
                        tile.classList.add(result[i]);
                        updateKeyboard(guess[i], result[i]);
                        completed++;
                        if (completed === 5) {
                            setTimeout(() => {
                                processGuessResult(guess, target);
                                gameState.inputLock = false;
                            }, 300);
                        }
                    }, 300);
                }, i*300);
            }
        }

        function calculateGuessResult(guess, target) {
            const res = Array(5).fill('absent');
            const counts = {};
            for (const l of target) counts[l] = (counts[l]||0)+1;
            for (let i=0;i<5;i++) if (guess[i]===target[i]) { res[i]='correct'; counts[guess[i]]--; }
            for (let i=0;i<5;i++) if (res[i]!=='correct' && counts[guess[i]]>0) { res[i]='present'; counts[guess[i]]--; }
            return res;
        }

        function processGuessResult(guess, target) {
            if (guess === target) {
                gameState.gameWon = gameState.gameOver = true;
                gameState.isProcessing = false;
                handleWin();
            } else if (gameState.currentRow === gameState.maxRows-1) {
                gameState.gameOver = true;
                gameState.isProcessing = false;
                handleLoss();
            } else {
                gameState.currentRow++;
                gameState.currentGuess = '';
                gameState.isProcessing = false;
                updateCurrentRow();
            }
        }

        function updateKeyboard(letter, status) {
            const key = document.querySelector(`.key[data-key="${letter}"]`);
            if (!key || key.classList.contains('enter') || key.classList.contains('backspace')) return;
            if (status === 'correct') { key.classList.add('correct'); key.classList.remove('present','absent'); }
            else if (status === 'present' && !key.classList.contains('correct')) { key.classList.add('present'); key.classList.remove('absent'); }
            else if (status === 'absent' && !key.classList.contains('correct') && !key.classList.contains('present')) key.classList.add('absent');
        }

        function renderAttemptMatrix() {
            const container = document.getElementById('matrixGrid');
            container.innerHTML = '';
            const used = gameState.attemptResults.filter(r => r && r.length);
            used.forEach(res => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'matrix-row';
                res.forEach(st => {
                    const tile = document.createElement('div');
                    tile.className = `matrix-tile ${st}`;
                    rowDiv.appendChild(tile);
                });
                container.appendChild(rowDiv);
            });
        }

        function handleWin() {
            gameState.gameDuration = Math.floor((new Date() - gameState.startTime)/1000);
            showMessage('🎉 أحسنت! لقد فزت!');
            const matrix = [];
            for (let r=0; r<=gameState.currentRow; r++) {
                const row = [];
                for (let c=0;c<5;c++) {
                    const t = document.getElementById(`tile-${r}-${c}`);
                    row.push(t.classList.contains('correct')?'correct':(t.classList.contains('present')?'present':'absent'));
                }
                matrix.push(row);
            }
            gameState.attemptMatrices.unshift({ matrix, result:'win', attempts:gameState.currentRow+1, difficulty:gameState.difficulty, word:gameState.targetWord });
            saveAttemptMatrices();
            gameState.attemptsHistory.unshift({ attemptNumber: gameState.attemptsHistory.length+1, attempts:gameState.currentRow+1, result:'win', difficulty:gameState.difficulty, word:gameState.targetWord });
            saveAttemptsHistory();
            gameState.stats.played++;
            gameState.stats.wins++;
            gameState.stats.currentStreak++;
            gameState.stats.maxStreak = Math.max(gameState.stats.maxStreak, gameState.stats.currentStreak);
            saveStats();
            updateStatsDisplay();
            setTimeout(() => showGameResultModal(true), 1500);
        }

        function handleLoss() {
            showMessage(`💔 الكلمة: ${gameState.targetWord}`);
            const matrix = [];
            for (let r=0; r<gameState.maxRows; r++) {
                const row = [];
                for (let c=0;c<5;c++) {
                    const t = document.getElementById(`tile-${r}-${c}`);
                    row.push(t.classList.contains('correct')?'correct':(t.classList.contains('present')?'present':'absent'));
                }
                matrix.push(row);
            }
            gameState.attemptMatrices.unshift({ matrix, result:'loss', attempts:gameState.maxRows, difficulty:gameState.difficulty, word:gameState.targetWord });
            saveAttemptMatrices();
            gameState.attemptsHistory.unshift({ attemptNumber: gameState.attemptsHistory.length+1, attempts:gameState.maxRows, result:'loss', difficulty:gameState.difficulty, word:gameState.targetWord });
            saveAttemptsHistory();
            gameState.stats.played++;
            gameState.stats.currentStreak = 0;
            saveStats();
            updateStatsDisplay();
            setTimeout(() => showGameResultModal(false), 1500);
        }

        function showMessage(text) {
            const el = document.getElementById('message');
            el.innerHTML = text;
            el.classList.add('bounce');
            setTimeout(() => el.classList.remove('bounce'), 500);
        }

        function shakeRow() {
            const r = document.getElementById(`row-${gameState.currentRow}`);
            if (r) { r.classList.add('shake'); setTimeout(() => r.classList.remove('shake'), 500); }
        }

        function showGameResultModal(isWin) {
            const m = document.getElementById('gameResultModal');
            const t = document.getElementById('resultModalTitle');
            const d = document.getElementById('gameResultDetails');
            t.textContent = isWin ? '🎉 مبروك! فزت!' : '💔 خسارة!';
            d.innerHTML = `
                <div class="correct-word">${gameState.targetWord}</div>
            `;
            renderAttemptMatrix();
            m.classList.remove('hidden');
        }

        function showStats(isWin=false) { updateStatsDisplay(isWin); document.getElementById('statsModal').classList.remove('hidden'); }
        function updateStatsDisplay(isWin=false) {
            document.getElementById('playedCount').textContent = gameState.stats.played;
            document.getElementById('winPercent').textContent = gameState.stats.played ? Math.round((gameState.stats.wins/gameState.stats.played)*100)+'%' : '0%';
            document.getElementById('currentStreak').textContent = gameState.stats.currentStreak;
            const info = document.getElementById('gameResultInfo');
            info.innerHTML = '';
            if (gameState.gameOver) {
                info.innerHTML = `<div class="correct-word">${gameState.targetWord}</div>`;
            }
        }

        function setupEventListeners() {
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey || e.metaKey || e.altKey) return;
                if (e.key === 'Enter') handleInput('Enter');
                else if (e.key === 'Backspace') handleInput('Backspace');
                else if (/^[\u0600-\u06FF]$/.test(e.key)) handleInput(e.key);
            });

            const diffToggle = document.getElementById('difficultyToggle');
            const diffMenu = document.getElementById('difficultyMenu');
            diffToggle.addEventListener('click', (e) => { e.stopPropagation(); diffMenu.classList.toggle('show'); });
            document.addEventListener('click', () => diffMenu?.classList.remove('show'));

            document.querySelectorAll('.difficulty-option').forEach(opt => {
                opt.addEventListener('click', function() { changeDifficulty(this.dataset.difficulty); });
            });

            document.getElementById('helpBtn').addEventListener('click', () => document.getElementById('helpModal').classList.remove('hidden'));
            document.getElementById('statsBtn').addEventListener('click', () => showStats(gameState.gameWon));
            document.getElementById('newGameHeaderBtn').addEventListener('click', startNewGame);

            document.getElementById('themeToggle').addEventListener('click', () => {
                const isLight = document.body.classList.toggle('light-mode');
                document.querySelector('#themeToggle i').className = isLight ? 'fas fa-moon text-xl' : 'fas fa-sun text-xl';
                localStorage.setItem(THEME_KEY, !isLight);
            });

            document.getElementById('newGameFromStats').addEventListener('click', startNewGame);
            document.getElementById('startGameBtn').addEventListener('click', () => { document.getElementById('helpModal').classList.add('hidden'); startNewGame(); });
            document.getElementById('closeHelp').addEventListener('click', () => document.getElementById('helpModal').classList.add('hidden'));
            document.getElementById('closeStats').addEventListener('click', () => document.getElementById('statsModal').classList.add('hidden'));
            document.getElementById('closeGameResult').addEventListener('click', () => document.getElementById('gameResultModal').classList.add('hidden'));
            document.getElementById('playAgainBtn').addEventListener('click', startNewGame);

            const reportBtn = document.getElementById('reportHardBtn');
            if (reportBtn) {
                reportBtn.onclick = () => {
                    if (gameState.targetWord && gameState.gameOver) {
                        reportToSupabase(gameState.targetWord, 'hard_word')
                            .then(() => {
                                reportBtn.innerText = 'تم التبليغ ✅';
                                reportBtn.disabled = true;
                            })
                            .catch(() => showTemporaryMessage('❌ فشل التبليغ', 2000));
                    }
                };
            }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
