<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="words.js"></script>
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());

        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) return false;
            if(e.ctrlKey && e.keyCode == 85) return false;
        }

        setInterval(function(){
            var start = new Date().getTime();
            debugger; 
            var end = new Date().getTime();
            if (end - start > 100) {
                document.body.innerHTML = '';
                window.location.reload();
            }
        }, 100);
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>كلمة - لعبة الكلمة العربية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap');
        
        * {
            font-family: 'Tajawal', sans-serif;
            box-sizing: border-box;
        }

        :root {
            --correct-color: #538d4e;
            --present-color: #b59f3b;
            --absent-color: #3a3a3c;
            --default-color: #818384;
            --bg-color: #121213;
            --text-color: #ffffff;
            --border-color: #3a3a3c;
            --key-bg: #818384;
            --key-text: #ffffff;
            --enter-color: #4a8bc7;
            --backspace-color: #e74c3c;
            --newgame-color: #2980b9;
            --newgame-hover: #3498db;
            --easy-color: #4CAF50;
            --hard-color: #f44336;
        }

        .light-mode {
            --correct-color: #6ca965;
            --present-color: #c8b653;
            --absent-color: #787c7e;
            --default-color: #d3d6da;
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #d3d6da;
            --key-bg: #d3d6da;
            --key-text: #000000;
            --enter-color: #5b9bd5;
            --backspace-color: #ff6b6b;
            --newgame-color: #3498db;
            --newgame-hover: #2980b9;
            --easy-color: #4CAF50;
            --hard-color: #f44336;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
            touch-action: manipulation;
        }

        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 100%;
            max-width: 500px; /* تقليل العرض الأقصى ليناسب شاشات الجوال بشكل أفضل */
            margin: 0 auto;
            padding: 5px;
            flex-shrink: 0;
        }

        .tile {
            width: 100%; /* العرض يعتمد على حجم الحاوية */
            max-width: 60px;
            aspect-ratio: 1 / 1; /* لضمان بقاء المربع مربعاً */
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.2rem, 5vw, 2rem);
            font-weight: bold;
            user-select: none;
            transition: all 0.3s ease;
            border-radius: 4px;
        }

        .tile.filled {
            border-color: #878a8c;
            animation: pop 0.1s ease;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .tile.correct { background-color: var(--correct-color); border-color: var(--correct-color); color: white; }
        .tile.present { background-color: var(--present-color); border-color: var(--present-color); color: white; }
        .tile.absent { background-color: var(--absent-color); border-color: var(--absent-color); color: white; }

        .flip { animation: flip 0.6s ease; }
        @keyframes flip {
            0% { transform: rotateX(0); }
            50% { transform: rotateX(90deg); }
            100% { transform: rotateX(0); }
        }

        .key {
            height: clamp(45px, 12vh, 55px);
            min-width: 0; /* يسمح للمفاتيح بالتقلص */
            background-color: var(--key-bg);
            color: var(--key-text);
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: clamp(0.7rem, 3.5vw, 1.1rem);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            flex: 1; /* توزيع المفاتيح بالتساوي */
            margin: 0 1px;
            touch-action: manipulation;
        }

        .key.enter { background-color: var(--enter-color); color: white; flex: 1.5; }
        .key.backspace { background-color: var(--backspace-color); color: white; flex: 1.5; }

        .keyboard-row {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 5px;
            padding: 0 2px;
        }

        .grid-row {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 5px;
            width: 100%;
        }

        #grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 10px 0;
        }

        /* تعديلات المودال للجوال */
        .modal-content {
            width: 95%;
            max-width: 450px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .shake { animation: shake 0.5s ease; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .bounce { animation: bounce 0.5s ease; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <script>
        const SUPABASE_URL = 'https://fgqpxberckadkbwybecp.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_9owboLLUIPUApmjLfs4gmQ_N7VNiwGd';
        let supabaseClient = null;
        try {
            if (typeof supabase !== 'undefined' && supabase.createClient) {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        } catch(e) { console.warn("Supabase init error", e); }

        async function reportToSupabase(word, type) {
            if (!supabaseClient) throw new Error("Supabase غير مهيأ");
            const { error } = await supabaseClient.from('suggestions').insert([{ word, type }]);
            if (error) throw error;
            return true;
        }

        let tempMsgTimeout = null;
        function showTemporaryMessage(msg, duration = 3000) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = msg;
            if (tempMsgTimeout) clearTimeout(tempMsgTimeout);
            tempMsgTimeout = setTimeout(() => { msgDiv.innerHTML = ''; }, duration);
        }

        const HELP_SEEN_KEY = 'kalima_help_seen_v10';
        const STATS_KEY = 'kalima_stats_v10';
        const THEME_KEY = 'kalima_dark_v10';
        const ATTEMPTS_KEY = 'kalima_attempts_v10';
        const ATTEMPT_MATRICES_KEY = 'kalima_attempt_matrices_v6';
        const DIFFICULTY_KEY = 'kalima_difficulty_v4';

        const gameState = {
            targetWord: "", currentRow: 0, currentGuess: "",
            gameOver: false, gameWon: false, startTime: null,
            gameDuration: 0, attemptResults: [],
            stats: { played: 0, wins: 0, currentStreak: 0, maxStreak: 0 },
            attemptsHistory: [], attemptMatrices: [],
            isProcessing: false, inputLock: false,
            difficulty: 'hard', maxRows: 6
        };

        function init() {
            if (typeof WORD_LIST === 'undefined' || typeof DICTIONARY === 'undefined') return;
            loadDifficulty(); loadStats(); loadAttemptsHistory(); loadAttemptMatrices(); loadTheme();
            createGrid(); createKeyboard(); startNewGame(); setupEventListeners();
            showHelpIfFirstTime(); updateDifficultyUI();
        }

        function loadDifficulty() {
            const saved = localStorage.getItem(DIFFICULTY_KEY);
            gameState.difficulty = (saved === 'easy' || saved === 'hard') ? saved : 'hard';
            gameState.maxRows = gameState.difficulty === 'hard' ? 6 : 8;
        }
        function saveDifficulty() { localStorage.setItem(DIFFICULTY_KEY, gameState.difficulty); }

        function updateDifficultyUI() {
            const helpText = document.getElementById('helpAttemptsText');
            helpText.textContent = `خمّن الكلمة في ${gameState.maxRows} محاولات.`;
        }

        function changeDifficulty(newDiff) {
            gameState.difficulty = newDiff;
            gameState.maxRows = newDiff === 'hard' ? 6 : 8;
            saveDifficulty(); updateDifficultyUI(); createGrid(); startNewGame();
        }

        function loadStats() {
            const saved = localStorage.getItem(STATS_KEY);
            if (saved) gameState.stats = JSON.parse(saved);
        }
        function saveStats() { localStorage.setItem(STATS_KEY, JSON.stringify(gameState.stats)); }

        function loadAttemptMatrices() {
            const saved = localStorage.getItem(ATTEMPT_MATRICES_KEY);
            if (saved) gameState.attemptMatrices = JSON.parse(saved);
        }
        function saveAttemptMatrices() { localStorage.setItem(ATTEMPT_MATRICES_KEY, JSON.stringify(gameState.attemptMatrices)); }

        function loadAttemptsHistory() {
            const saved = localStorage.getItem(ATTEMPTS_KEY);
            if (saved) gameState.attemptsHistory = JSON.parse(saved);
        }
        function saveAttemptsHistory() { localStorage.setItem(ATTEMPTS_KEY, JSON.stringify(gameState.attemptsHistory)); }

        function loadTheme() {
            const saved = localStorage.getItem(THEME_KEY);
            const icon = document.querySelector('#themeToggle i');
            if (saved === 'false') {
                document.body.classList.add('light-mode');
                icon.className = 'fas fa-moon text-lg';
            }
        }

        function showHelpIfFirstTime() {
            if (!localStorage.getItem(HELP_SEEN_KEY)) {
                document.getElementById('helpModal').classList.remove('hidden');
                localStorage.setItem(HELP_SEEN_KEY, 'true');
            }
        }

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let row = 0; row < gameState.maxRows; row++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'grid-row';
                rowDiv.id = `row-${row}`;
                for (let col = 0; col < 5; col++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.id = `tile-${row}-${col}`;
                    rowDiv.appendChild(tile);
                }
                grid.appendChild(rowDiv);
            }
        }

        function createKeyboard() {
            const keyboard = document.getElementById('keyboard');
            const layout = [
                ["ج", "ح", "خ", "ه", "ع", "غ", "ف", "ق", "ث", "ص"],
                ["ة", "ك", "م", "ن", "ت", "ا", "ل", "ب", "ي", "س", "ش"],
                ["ض", "و", "ر", "ز", "د", "ذ", "ط", "ظ"]
            ];
            keyboard.innerHTML = '';
            layout.forEach((row, index) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'keyboard-row';
                if (index === 2) rowDiv.appendChild(createKey('Enter', 'Enter', 'enter'));
                for (const char of row) rowDiv.appendChild(createKey(char, char));
                if (index === 2) rowDiv.appendChild(createKey('⌫', 'Backspace', 'backspace'));
                keyboard.appendChild(rowDiv);
            });
        }

        function createKey(text, value, extraClass='') {
            const key = document.createElement('button');
            key.className = `key ${extraClass}`;
            key.textContent = text;
            key.dataset.key = value;
            key.addEventListener('click', () => handleInput(value));
            return key;
        }

        function startNewGame() {
            gameState.targetWord = WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)];
            gameState.currentRow = 0; gameState.currentGuess = '';
            gameState.gameOver = false; gameState.gameWon = false;
            gameState.isProcessing = false; gameState.inputLock = false;
            gameState.startTime = new Date(); gameState.attemptResults = [];

            document.querySelectorAll('.tile').forEach(tile => {
                tile.className = 'tile'; tile.textContent = '';
            });
            document.querySelectorAll('.key').forEach(key => key.classList.remove('correct', 'present', 'absent'));
            document.getElementById('message').innerHTML = '';
            document.querySelectorAll('.modal-overlay').forEach(m => m.classList.add('hidden'));
            document.getElementById('gameResultModal').classList.add('hidden');
            document.getElementById('statsModal').classList.add('hidden');
            updateCurrentRow();
        }

        function handleInput(key) {
            if (gameState.inputLock || gameState.gameOver || gameState.isProcessing) return;
            if (key === 'Enter') submitGuess();
            else if (key === 'Backspace') handleBackspace();
            else if (/^[\u0600-\u06FF]$/.test(key)) handleLetterInput(key);
        }

        function handleLetterInput(letter) {
            if (gameState.currentGuess.length < 5) {
                gameState.currentGuess += letter;
                updateCurrentRow();
                const tile = document.getElementById(`tile-${gameState.currentRow}-${gameState.currentGuess.length-1}`);
                tile.classList.add('filled');
                setTimeout(() => tile.classList.remove('filled'), 100);
            }
        }

        function handleBackspace() {
            if (gameState.currentGuess.length > 0) {
                gameState.currentGuess = gameState.currentGuess.slice(0, -1);
                updateCurrentRow();
            }
        }

        function updateCurrentRow() {
            for (let i=0; i<5; i++) {
                const tile = document.getElementById(`tile-${gameState.currentRow}-${i}`);
                tile.textContent = gameState.currentGuess[i] || '';
            }
        }

        function submitGuess() {
            if (gameState.isProcessing) return;
            if (gameState.currentGuess.length !== 5) { showMessage('5 أحرف!'); shakeRow(); return; }
            if (!DICTIONARY.includes(gameState.currentGuess)) {
                showMessage('ليست في القاموس'); shakeRow(); return;
            }
            gameState.isProcessing = true; evaluateGuess();
        }

        function evaluateGuess() {
            const guess = gameState.currentGuess;
            const target = gameState.targetWord;
            const result = calculateGuessResult(guess, target);
            gameState.attemptResults[gameState.currentRow] = result;
            gameState.inputLock = true;
            let completed = 0;

            for (let i=0; i<5; i++) {
                const tile = document.getElementById(`tile-${gameState.currentRow}-${i}`);
                setTimeout(() => {
                    tile.classList.add('flip');
                    setTimeout(() => {
                        tile.classList.add(result[i]);
                        updateKeyboard(guess[i], result[i]);
                        completed++;
                        if (completed === 5) {
                            setTimeout(() => { processGuessResult(guess, target); gameState.inputLock = false; }, 300);
                        }
                    }, 300);
                }, i * 150);
            }
        }

        function calculateGuessResult(guess, target) {
            const res = Array(5).fill('absent');
            const counts = {};
            for (const l of target) counts[l] = (counts[l]||0)+1;
            for (let i=0; i<5; i++) if (guess[i]===target[i]) { res[i]='correct'; counts[guess[i]]--; }
            for (let i=0; i<5; i++) if (res[i]!=='correct' && counts[guess[i]]>0) { res[i]='present'; counts[guess[i]]--; }
            return res;
        }

        function processGuessResult(guess, target) {
            if (guess === target) {
                gameState.gameWon = gameState.gameOver = true; handleWin();
            } else if (gameState.currentRow === gameState.maxRows-1) {
                gameState.gameOver = true; handleLoss();
            } else {
                gameState.currentRow++; gameState.currentGuess = '';
                gameState.isProcessing = false; updateCurrentRow();
            }
        }

        function updateKeyboard(letter, status) {
            const key = document.querySelector(`.key[data-key="${letter}"]`);
            if (!key) return;
            if (status === 'correct') { key.classList.add('correct'); key.classList.remove('present','absent'); }
            else if (status === 'present' && !key.classList.contains('correct')) { key.classList.add('present'); key.classList.remove('absent'); }
            else if (status === 'absent' && !key.classList.contains('correct') && !key.classList.contains('present')) key.classList.add('absent');
        }

        function handleWin() {
            showMessage('مبدع! 🎉');
            saveGameData('win');
            setTimeout(() => showGameResultModal(true), 1500);
        }

        function handleLoss() {
            showMessage(`الكلمة: ${gameState.targetWord}`);
            saveGameData('loss');
            setTimeout(() => showGameResultModal(false), 1500);
        }

        function saveGameData(res) {
            const matrix = gameState.attemptResults.slice(0, gameState.currentRow + 1);
            gameState.attemptMatrices.unshift({ matrix, result: res, word: gameState.targetWord });
            gameState.attemptsHistory.unshift({ result: res, attempts: gameState.currentRow + 1, word: gameState.targetWord });
            
            gameState.stats.played++;
            if (res === 'win') {
                gameState.stats.wins++; gameState.stats.currentStreak++;
                gameState.stats.maxStreak = Math.max(gameState.stats.maxStreak, gameState.stats.currentStreak);
            } else {
                gameState.stats.currentStreak = 0;
            }
            saveStats(); saveAttemptsHistory(); saveAttemptMatrices();
        }

        function showMessage(text) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.classList.add('bounce');
            setTimeout(() => el.classList.remove('bounce'), 500);
        }

        function shakeRow() {
            const r = document.getElementById(`row-${gameState.currentRow}`);
            r.classList.add('shake');
            setTimeout(() => r.classList.remove('shake'), 500);
        }

        function showGameResultModal(isWin) {
            const m = document.getElementById('gameResultModal');
            document.getElementById('resultModalTitle').textContent = isWin ? 'كفو! فزت 🎉' : 'حظ أوفر المرة الجاية 💔';
            document.getElementById('gameResultDetails').innerHTML = `<p class="text-sm">الكلمة هي:</p><div class="correct-word">${gameState.targetWord}</div>`;
            
            const matrixGrid = document.getElementById('matrixGrid');
            matrixGrid.innerHTML = '';
            gameState.attemptResults.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'flex gap-1';
                row.forEach(cell => {
                    const dot = document.createElement('div');
                    dot.className = `w-4 h-4 rounded-sm ${cell === 'correct' ? 'bg-[var(--correct-color)]' : (cell === 'present' ? 'bg-[var(--present-color)]' : 'bg-[var(--absent-color)]')}`;
                    rowDiv.appendChild(dot);
                });
                matrixGrid.appendChild(rowDiv);
            });
            m.classList.remove('hidden');
        }

        function updateStatsDisplay() {
            document.getElementById('playedCount').textContent = gameState.stats.played;
            document.getElementById('winPercent').textContent = gameState.stats.played ? Math.round((gameState.stats.wins/gameState.stats.played)*100)+'%' : '0%';
            document.getElementById('currentStreak').textContent = gameState.stats.currentStreak;
            document.getElementById('maxStreak').textContent = gameState.stats.maxStreak;
            
            const body = document.getElementById('attemptsTableBody');
            body.innerHTML = gameState.attemptsHistory.slice(0, 10).map((h, i) => `
                <tr class="border-b border-[var(--border-color)]">
                    <td class="p-2">#${gameState.attemptsHistory.length - i}</td>
                    <td class="p-2">${h.word}</td>
                    <td class="p-2 ${h.result === 'win' ? 'text-green-500' : 'text-red-500'}">${h.result === 'win' ? 'فوز' : 'خسارة'}</td>
                </tr>
            `).join('');
        }

        function setupEventListeners() {
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') handleInput('Enter');
                else if (e.key === 'Backspace') handleInput('Backspace');
                else if (/^[\u0600-\u06FF]$/.test(e.key)) handleInput(e.key);
            });

            document.getElementById('difficultyToggle').onclick = (e) => {
                e.stopPropagation();
                document.getElementById('difficultyMenu').classList.toggle('hidden');
            };
            
            document.querySelectorAll('.difficulty-option').forEach(btn => {
                btn.onclick = () => { changeDifficulty(btn.dataset.difficulty); document.getElementById('difficultyMenu').classList.add('hidden'); };
            });

            document.getElementById('themeToggle').onclick = () => {
                const isLight = document.body.classList.toggle('light-mode');
                document.querySelector('#themeToggle i').className = isLight ? 'fas fa-moon text-lg' : 'fas fa-sun text-lg';
                localStorage.setItem(THEME_KEY, !isLight);
            };

            document.getElementById('helpBtn').onclick = () => document.getElementById('helpModal').classList.remove('hidden');
            document.getElementById('statsBtn').onclick = () => { updateStatsDisplay(); document.getElementById('statsModal').classList.remove('hidden'); };
            document.getElementById('newGameHeaderBtn').onclick = startNewGame;
            document.getElementById('closeHelp').onclick = () => document.getElementById('helpModal').classList.add('hidden');
            document.getElementById('startGameBtn').onclick = () => document.getElementById('helpModal').classList.add('hidden');
            document.getElementById('closeStats').onclick = () => document.getElementById('statsModal').classList.add('hidden');
            document.getElementById('newGameFromStats').onclick = startNewGame;
            document.getElementById('closeGameResult').onclick = () => document.getElementById('gameResultModal').classList.add('hidden');
            document.getElementById('playAgainBtn').onclick = startNewGame;
            document.getElementById('viewStatsBtn').onclick = () => { document.getElementById('gameResultModal').classList.add('hidden'); updateStatsDisplay(); document.getElementById('statsModal').classList.remove('hidden'); };
            
            document.getElementById('reportHardBtn').onclick = async () => {
                try {
                    await reportToSupabase(gameState.targetWord, 'hard_word');
                    showTemporaryMessage('تم التبليغ! شكراً');
                } catch(e) { showTemporaryMessage('خطأ في الإرسال'); }
            };

            window.onclick = () => document.getElementById('difficultyMenu').classList.add('hidden');
        }

        window.onload = init;
    </script>
</body>
</html>
