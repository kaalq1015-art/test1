<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Numberle - لغز المعادلات الحسابية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        
        *{font-family:'Tajawal',sans-serif;box-sizing:border-box;}
        
        :root {
            --color-correct: #2fc1a5;
            --color-present: #f79a6f;
            --color-absent: #a4aec4;
            --color-tile-bg: #ffffff;
            --color-tile-border: #d3d6da;
            --bg-main: #f8f9fa;
            --header-bg: #ffffff;
        }

        .dark-mode {
            --color-correct: #2fc1a5;
            --color-present: #f79a6f;
            --color-absent: #3a3a3c;
            --color-tile-bg: #121213;
            --color-tile-border: #3a3a3c;
            --bg-main: #050505;
            --header-bg: #121213;
            --text-main: #ffffff;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0; padding: 0;
            height: 100dvh; display: flex; flex-direction: column;
            overflow: hidden; touch-action: manipulation;
            transition: background 0.3s ease;
        }

        header {
            background: var(--header-bg);
            border-bottom: 1px solid var(--color-tile-border);
            padding: 10px 16px;
            display: flex; align-items: center; justify-content: space-between;
            min-height: 60px;
        }

        .logo-text { font-size: 1.5rem; font-weight: 800; color: var(--color-correct); letter-spacing: -1px; }

        .game-container {
            flex: 1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            padding: 10px; width: 100%; max-width: 600px; margin: 0 auto;
        }

        /* شبكة اللعب - معادلات من اليسار لليمين */
        .grid {
            display: grid; grid-template-rows: repeat(6, 1fr); 
            gap: 6px; margin-bottom: 20px; direction: ltr !important;
        }
        .grid-row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }

        .tile {
            width: clamp(38px, 11vw, 55px); height: clamp(38px, 11vw, 55px);
            border: 2px solid var(--color-tile-border);
            background: var(--color-tile-bg);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: 800; border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tile.filled { border-color: #818384; animation: pop 0.1s ease-in-out; }
        .tile.correct { background: var(--color-correct) !important; border-color: var(--color-correct) !important; color: white; }
        .tile.present { background: var(--color-present) !important; border-color: var(--color-present) !important; color: white; }
        .tile.absent { background: var(--color-absent) !important; border-color: var(--color-absent) !important; color: white; }

        @keyframes pop { 50% { transform: scale(1.1); } }
        .flip { animation: flip 0.6s ease; }
        @keyframes flip { 50% { transform: rotateX(90deg); } }

        /* لوحة المفاتيح */
        .keyboard { width: 100%; max-width: 500px; padding: 0 10px 20px; direction: ltr !important; }
        .kb-row { display: flex; justify-content: center; gap: 5px; margin-bottom: 8px; }
        .key {
            height: 58px; flex: 1; background: #d3d6da; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; cursor: pointer; user-select: none; font-size: 1.1rem;
            color: #000; transition: all 0.2s;
        }
        .dark-mode .key { background: #818384; color: #fff; }
        .key.wide { flex: 2; font-size: 0.85rem; }
        .key.backspace { flex: 2; }
        .key.backspace i { transform: scaleX(1.8); font-size: 1.4rem; }

        #message { height: 35px; color: #e74c3c; font-weight: 700; text-align: center; }

        /* Footer */
        footer {
            padding: 15px; text-align: center; border-top: 1px solid var(--color-tile-border);
            font-size: 0.8rem; opacity: 0.7;
        }

        /* Modal */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); 
            display: none; align-items: center; justify-content: center; 
            padding: 20px; z-index: 1000; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: var(--header-bg); padding: 30px; border-radius: 15px; 
            max-width: 400px; width: 100%; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .ans-box { font-size: 2.2rem; font-weight: 900; color: var(--color-correct); margin: 15px 0; }
        
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
    </style>
</head>
<body class="dark-mode">

<header>
    <div class="flex gap-3">
        <button onclick="showHelp()" class="text-xl opacity-70"><i class="fas fa-question-circle"></i></button>
    </div>
    <div class="logo-text">Numberle</div>
    <div class="flex gap-4">
        <button onclick="location.reload()" class="text-xl opacity-70"><i class="fas fa-redo-alt"></i></button>
        <button id="themeToggle" class="text-xl opacity-70"><i class="fas fa-sun"></i></button>
    </div>
</header>

<div class="game-container">
    <div id="message"></div>
    <div id="grid" class="grid"></div>
    <div class="keyboard" id="keyboard"></div>
</div>

<footer>
    <div>Numberle.org © 2026 All rights reserved.</div>
    <div class="flex justify-center gap-4 mt-1 opacity-50">
        <span>Privacy Policy</span> | <span>Feedback</span>
    </div>
</footer>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="status" class="text-2xl font-bold"></h2>
        <p class="mt-3">المعادلة الصحيحة كانت:</p>
        <div id="answer" class="ans-box"></div>
        <button onclick="location.reload()" class="w-full bg-[#2fc1a5] text-white py-4 rounded-xl font-bold text-lg hover:opacity-90">لعبة جديدة</button>
    </div>
</div>

<script>
    const COLS = 8, ROWS = 6;
    let target = "", currentRow = 0, currentInput = "", isGameOver = false;

    // توليد معادلة بطول 8 خانات بالضبط (بدون قسمة)
    function generateTarget() {
        const ops = ['+', '-', '*'];
        let result = "";
        while (result.length !== COLS) {
            let op = ops[Math.floor(Math.random() * ops.length)];
            let a, b, res;
            if (op === '*') {
                a = Math.floor(Math.random() * 12) + 2;
                b = Math.floor(Math.random() * 8) + 1;
            } else {
                a = Math.floor(Math.random() * 89) + 10;
                b = Math.floor(Math.random() * 89) + 5;
            }
            res = op === '+' ? a + b : op === '-' ? a - b : a * b;
            if (res < 0 || res > 999) continue;
            result = `${a}${op}${b}=${res}`;
        }
        return result;
    }

    function init() {
        target = generateTarget();
        console.log("Solution:", target); // للمطور
        
        const grid = document.getElementById('grid');
        for (let i = 0; i < ROWS * COLS; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.id = 'tile-' + i;
            grid.appendChild(tile);
        }

        const kb = document.getElementById('keyboard');
        const rows = [
            ['1','2','3','4','5','6','7','8','9','0'],
            ['+','-','*','='],
            ['ENTER', 'BACK']
        ];
        rows.forEach(r => {
            const div = document.createElement('div');
            div.className = 'kb-row';
            r.forEach(k => {
                const btn = document.createElement('button');
                btn.className = 'key' + (k === 'ENTER' ? ' wide' : k === 'BACK' ? ' backspace' : '');
                if (k === 'ENTER') btn.textContent = 'ENTER';
                else if (k === 'BACK') btn.innerHTML = '<i class="fas fa-backspace"></i>';
                else btn.textContent = k;
                btn.onclick = () => onKey(k);
                div.appendChild(btn);
            });
            kb.appendChild(div);
        });
    }

    function onKey(k) {
        if (isGameOver) return;
        const msg = document.getElementById('message');
        msg.textContent = "";

        if (k === 'BACK') {
            currentInput = currentInput.slice(0, -1);
        } else if (k === 'ENTER') {
            if (currentInput.length < COLS) {
                msg.textContent = "المعادلة غير مكتملة";
                shake();
                return;
            }
            validate();
        } else {
            if (currentInput.length < COLS) currentInput += k;
        }
        draw();
    }

    function draw() {
        for (let i = 0; i < COLS; i++) {
            const tile = document.getElementById(`tile-${(currentRow * COLS) + i}`);
            tile.textContent = currentInput[i] || "";
            tile.classList.toggle('filled', !!currentInput[i]);
        }
    }

    function shake() {
        for (let i = 0; i < COLS; i++) {
            document.getElementById(`tile-${(currentRow * COLS) + i}`).classList.add('shake');
            setTimeout(() => {
                document.getElementById(`tile-${(currentRow * COLS) + i}`).classList.remove('shake');
            }, 500);
        }
    }

    function validate() {
        if (!currentInput.includes('=')) return fail("يجب وجود علامة =");
        const parts = currentInput.split('=');
        if (parts.length !== 2 || parts[1] === "") return fail("خطأ في المعادلة");
        
        try {
            const left = Function('"use strict"; return (' + parts[0] + ')')();
            const right = parseInt(parts[1]);
            if (left !== right) return fail("المعادلة غير صحيحة حسابياً");
        } catch(e) { return fail("خطأ في الرموز"); }

        check();
    }

    function fail(m) {
        document.getElementById('message').textContent = m;
        shake();
    }

    function check() {
        const guess = currentInput.split('');
        const sol = target.split('');
        const res = Array(COLS).fill('absent');

        // Green
        for (let i = 0; i < COLS; i++) {
            if (guess[i] === sol[i]) {
                res[i] = 'correct';
                sol[i] = null;
            }
        }
        // Yellow
        for (let i = 0; i < COLS; i++) {
            if (res[i] !== 'correct' && sol.includes(guess[i])) {
                res[i] = 'present';
                sol[sol.indexOf(guess[i])] = null;
            }
        }

        for (let i = 0; i < COLS; i++) {
            const tile = document.getElementById(`tile-${(currentRow * COLS) + i}`);
            setTimeout(() => {
                tile.classList.add('flip');
                setTimeout(() => tile.classList.add(res[i]), 300);
            }, i * 100);
        }

        if (currentInput === target) {
            setTimeout(() => finish(true), 1500);
        } else if (currentRow === ROWS - 1) {
            setTimeout(() => finish(false), 1500);
        } else {
            currentRow++;
            currentInput = "";
        }
    }

    function finish(win) {
        isGameOver = true;
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('status').textContent = win ? "عمل رائع! فزت 🎉" : "حظاً أوفر المرة القادمة 💔";
        document.getElementById('answer').textContent = target;
    }

    document.getElementById('themeToggle').onclick = () => {
        const isDark = document.body.classList.toggle('dark-mode');
        document.querySelector('#themeToggle i').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
    };

    init();
</script>
</body>
</html>
