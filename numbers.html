<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>window.history.replaceState(null, '', '/');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>لغز المعادلات 8</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
*{font-family:'Tajawal',sans-serif;box-sizing:border-box;}
:root{
    --correct-color:#538d4e;
    --present-color:#b59f3b;
    --absent-color:#3a3a3c;
    --default-color:#565758;
    --bg-color:#121213;
    --bg-gradient:linear-gradient(180deg,#121213 0%,#050505 100%);
    --surface-color:rgba(30,30,32,0.85);
    --text-color:#ffffff;
    --border-color:rgba(255,255,255,0.1);
    --border-active:rgba(255,255,255,0.2);
    --key-bg:rgba(255,255,255,0.08);
    --key-text:#ffffff;
    --enter-color:#538d4e;
    --backspace-color:#9b2335;
}
.light-mode{
    --bg-color:#f8f9fa;
    --bg-gradient:linear-gradient(180deg,#f8f9fa 0%,#e9ecef 100%);
    --surface-color:rgba(255,255,255,0.85);
    --text-color:#121213;
    --border-color:rgba(0,0,0,0.1);
    --key-bg:rgba(0,0,0,0.07);
    --key-text:#121213;
}
body{
    background:var(--bg-gradient); color:var(--text-color);
    margin:0; padding:0; height:100dvh; display:flex; flex-direction:column;
    overflow:hidden; touch-action:manipulation;
}
header{padding:10px 16px; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:space-between; background:rgba(0,0,0,0.2);}
h1{font-size:1.3rem; font-weight:800; margin:0;}

.game-wrapper{flex:1; display:flex; flex-direction:column; justify-content:space-between; width:100%; max-width:500px; margin:0 auto; padding:10px; overflow:hidden;}

/* جعل الشبكة من اليسار إلى اليمين */
.grid-row{display:flex; justify-content:center; gap:4px; margin-bottom:5px; direction:ltr !important;}
.tile{
    --size: clamp(38px, 11vw, 48px);
    width: var(--size); height: var(--size);
    border: 2px solid var(--border-color);
    display: flex; align-items: center; justify-content: center;
    font-size: calc(var(--size) * 0.5); font-weight: 800;
    border-radius: 6px; transition: all 0.3s;
    background: rgba(255,255,255,0.02);
}
.tile.correct{background:var(--correct-color); border-color:var(--correct-color); color:white;}
.tile.present{background:var(--present-color); border-color:var(--present-color); color:white;}
.tile.absent{background:var(--absent-color); border-color:var(--absent-color); color:white;}
.tile.filled{border-color:var(--border-active); animation:pop 0.1s;}

@keyframes pop{50%{transform:scale(1.1);}}
.flip{animation:flip 0.6s ease;}
@keyframes flip{0%{transform:rotateX(0);}50%{transform:rotateX(90deg);}100%{transform:rotateX(0);}}

/* لوحة المفاتيح */
.keyboard-row{display:flex; justify-content:center; gap:4px; margin-bottom:6px; direction:ltr !important;}
.key{
    height: 52px; flex: 1; background:var(--key-bg); border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; cursor:pointer; user-select:none; font-size: 1.1rem;
}
.key.enter{background:var(--enter-color); color:white; flex: 2; font-size: 0.9rem;}
.key.backspace{background:var(--backspace-color); color:white; flex: 2;}
.key.backspace i { transform: scaleX(1.8); }

#message{height:35px; text-align:center; font-weight:700; color:var(--present-color); font-size:0.95rem; margin-bottom:5px;}

.modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; backdrop-filter: blur(5px);}
.modal-content{background:var(--bg-color); border:1px solid var(--border-color); padding:30px; border-radius:24px; width:100%; max-width:360px; text-align:center;}
.correct-eq{background:var(--correct-color); padding:12px; border-radius:12px; font-size:1.8rem; font-weight:900; margin:20px 0; direction:ltr; box-shadow: 0 4px 15px rgba(0,0,0,0.3);}
.hidden{display:none;}
.shake{animation:shake 0.5s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
</style>
</head>
<body>

<header>
    <button onclick="location.reload()" class="w-10 h-10 rounded-lg bg-white/10 flex items-center justify-center"><i class="fas fa-redo-alt"></i></button>
    <h1>لغز المعادلات</h1>
    <button id="themeToggle" class="w-10 h-10 rounded-lg bg-white/10 flex items-center justify-center"><i class="fas fa-sun text-yellow-400"></i></button>
</header>

<div class="game-wrapper">
    <div id="message"></div>
    <div id="grid"></div>
    <div id="keyboard"></div>
</div>

<div id="resultModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h2 id="resultTitle" class="text-2xl font-bold mb-2"></h2>
        <p class="opacity-70">المعادلة الصحيحة كانت:</p>
        <div class="correct-eq" id="correctEq"></div>
        <button onclick="location.reload()" class="w-full bg-green-600 text-white py-3.5 rounded-xl font-bold mt-4 hover:bg-green-700 transition-colors">لعبة جديدة</button>
    </div>
</div>

<script>
const COLS = 8, ROWS = 6;
let target = "", currentRow = 0, currentInput = "", isGameOver = false;

// توليد معادلة عشوائية بطول 8 خانات
function generateTarget() {
    const ops = ['+', '-', '*'];
    let eq = "";
    
    while (eq.length !== COLS) {
        let op = ops[Math.floor(Math.random() * ops.length)];
        let a, b, res;
        
        if (op === '*') {
            a = Math.floor(Math.random() * 12) + 2;
            b = Math.floor(Math.random() * 8) + 1;
        } else {
            a = Math.floor(Math.random() * 89) + 10;
            b = Math.floor(Math.random() * 89) + 1;
        }
        
        res = op === '+' ? a + b : op === '-' ? a - b : a * b;
        if (res < 0 || res > 999) continue; 
        
        eq = `${a}${op}${b}=${res}`;
    }
    return eq;
}

function createGrid() {
    const grid = document.getElementById('grid');
    for (let r = 0; r < ROWS; r++) {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'grid-row';
        rowDiv.id = `row-${r}`;
        for (let c = 0; c < COLS; c++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.id = `t-${r}-${c}`;
            rowDiv.appendChild(tile);
        }
        grid.appendChild(rowDiv);
    }
}

function createKeyboard() {
    const kb = document.getElementById('keyboard');
    const keys = [
        ['1','2','3','4','5','6','7','8','9','0'],
        ['+', '-', '*', '='],
        ['Enter', 'Backspace']
    ];
    
    keys.forEach(line => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'keyboard-row';
        line.forEach(key => {
            const btn = document.createElement('button');
            btn.className = 'key';
            if (key === 'Enter') {
                btn.textContent = 'إدخال';
                btn.classList.add('enter');
            } else if (key === 'Backspace') {
                btn.innerHTML = '<i class="fas fa-backspace"></i>';
                btn.classList.add('backspace');
            } else {
                btn.textContent = key;
            }
            btn.onclick = () => handleInput(key);
            rowDiv.appendChild(btn);
        });
        kb.appendChild(rowDiv);
    });
}

function handleInput(key) {
    if (isGameOver) return;
    document.getElementById('message').textContent = "";

    if (key === 'Backspace') {
        currentInput = currentInput.slice(0, -1);
    } else if (key === 'Enter') {
        if (currentInput.length === COLS) submitGuess();
        else showMsg(`يجب إكمال ${COLS} خانات`);
    } else {
        if (currentInput.length < COLS) currentInput += key;
    }
    updateDisplay();
}

function updateDisplay() {
    for (let c = 0; c < COLS; c++) {
        const tile = document.getElementById(`t-${currentRow}-${c}`);
        tile.textContent = currentInput[c] || "";
        tile.classList.toggle('filled', !!currentInput[c]);
    }
}

function showMsg(m) {
    const msg = document.getElementById('message');
    msg.textContent = m;
    const row = document.getElementById(`row-${currentRow}`);
    row.classList.add('shake');
    setTimeout(() => row.classList.remove('shake'), 500);
}

function submitGuess() {
    // التحقق الحسابي
    if (!currentInput.includes('=')) return showMsg("المعادلة يجب أن تحتوي على =");
    
    const parts = currentInput.split('=');
    if (parts.length !== 2 || parts[0] === "" || parts[1] === "") return showMsg("خطأ في شكل المعادلة");

    try {
        // حساب الطرف الأيسر ومقارنته بالأيمن
        const leftSide = Function('"use strict";return (' + parts[0].replace(/x/g, '*') + ')')();
        const rightSide = parseInt(parts[1]);
        
        if (leftSide !== rightSide) return showMsg("المعادلة غير صحيحة حسابياً");
    } catch (e) {
        return showMsg("معادلة غير صالحة");
    }

    processColors();
}

function processColors() {
    let result = Array(COLS).fill('absent');
    let goalArr = target.split('');
    let guessArr = currentInput.split('');

    // المرحلة 1: الأخضر (صحيح في مكانه)
    for (let i = 0; i < COLS; i++) {
        if (guessArr[i] === goalArr[i]) {
            result[i] = 'correct';
            goalArr[i] = null;
        }
    }
    // المرحلة 2: الأصفر (موجود بمكان آخر)
    for (let i = 0; i < COLS; i++) {
        if (result[i] !== 'correct' && goalArr.includes(guessArr[i])) {
            result[i] = 'present';
            goalArr[goalArr.indexOf(guessArr[i])] = null;
        }
    }

    // تلوين المربعات مع حركة
    for (let i = 0; i < COLS; i++) {
        const tile = document.getElementById(`t-${currentRow}-${i}`);
        setTimeout(() => {
            tile.classList.add('flip');
            setTimeout(() => { tile.classList.add(result[i]); }, 300);
        }, i * 100);
    }

    if (currentInput === target) {
        setTimeout(() => endGame(true), 1500);
    } else if (currentRow === ROWS - 1) {
        setTimeout(() => endGame(false), 1500);
    } else {
        currentRow++;
        currentInput = "";
    }
}

function endGame(win) {
    isGameOver = true;
    const modal = document.getElementById('resultModal');
    modal.classList.remove('hidden');
    document.getElementById('resultTitle').textContent = win ? "أحسنت! فزت 🎉" : "انتهت المحاولات 💔";
    document.getElementById('correctEq').textContent = target;
}

// البدء
target = generateTarget();
console.log("Solution:", target); // للمطور
createGrid();
createKeyboard();

// الثيم
document.getElementById('themeToggle').onclick = () => {
    const isLight = document.body.classList.toggle('light-mode');
    document.querySelector('#themeToggle i').className = isLight ? 'fas fa-moon' : 'fas fa-sun text-yellow-400';
};
</script>
</body>
</html>
