<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>لغز الشبكة الحسابية</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
*{font-family:'Tajawal',sans-serif;box-sizing:border-box;}
:root{
    --correct-color:#538d4e;
    --present-color:#b59f3b;
    --absent-color:#3a3a3c;
    --default-color:#565758;
    --bg-color:#121213;
    --bg-gradient:linear-gradient(180deg,#121213 0%,#050505 100%);
    --surface-color:rgba(30,30,32,0.85);
    --text-color:#ffffff;
    --border-color:rgba(255,255,255,0.1);
    --border-active:rgba(255,255,255,0.2);
    --key-bg:rgba(255,255,255,0.08);
    --key-text:#ffffff;
    --enter-color:#538d4e;
    --backspace-color:#9b2335;
    --correct-glow:rgba(83,141,78,0.35);
    --present-glow:rgba(181,159,59,0.35);
    --header-border:rgba(255,255,255,0.07);
}
.light-mode{
    --bg-color:#f8f9fa;
    --bg-gradient:linear-gradient(180deg,#f8f9fa 0%,#e9ecef 100%);
    --surface-color:rgba(255,255,255,0.85);
    --text-color:#121213;
    --border-color:rgba(0,0,0,0.1);
    --border-active:rgba(0,0,0,0.2);
    --key-bg:rgba(0,0,0,0.07);
    --key-text:#121213;
    --default-color:#d3d6da;
    --header-border:rgba(0,0,0,0.08);
}
body{
    background:var(--bg-gradient);
    color:var(--text-color);
    transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
    margin:0;padding:0;
    height:100dvh;max-height:100dvh;
    display:flex;flex-direction:column;
    overflow:hidden;touch-action:manipulation;
}
.game-wrapper{flex:1;display:flex;flex-direction:column;justify-content:space-between;width:100%;max-width:600px;margin:0 auto;padding:6px 10px;overflow:hidden;min-height:0;}
.tile{--tile-size:52px;width:var(--tile-size);height:var(--tile-size);border:2px solid var(--border-color);display:flex;align-items:center;justify-content:center;font-size:calc(var(--tile-size)*0.48);font-weight:800;user-select:none;transition:all 0.3s ease;border-radius:6px;flex-shrink:0;direction:ltr;}
.tile.filled{border-color:rgba(255,255,255,0.3);animation:pop 0.1s ease;}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.12);}100%{transform:scale(1);}}
.tile.correct{background-color:var(--correct-color);border-color:var(--correct-color);color:white;box-shadow:0 0 14px var(--correct-glow);}
.tile.present{background-color:var(--present-color);border-color:var(--present-color);color:white;box-shadow:0 0 14px var(--present-glow);}
.tile.absent{background-color:var(--absent-color);border-color:var(--absent-color);color:white;}
.flip{animation:flip 0.6s ease;}
@keyframes flip{0%{transform:rotateX(0);}50%{transform:rotateX(90deg);}100%{transform:rotateX(0);}}
.keyboard-row{display:flex;justify-content:center;gap:4px;margin-bottom:6px;width:100%;}
.key{
    height:clamp(42px,6vh,58px);min-width:clamp(28px,6vw,43px);
    background-color:var(--key-bg);color:var(--key-text);
    border:1px solid var(--border-color);border-radius:8px;font-weight:700;
    font-size:clamp(0.85rem,3vw,1.1rem);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;user-select:none;transition:all 0.15s ease;
    flex:1;margin:0 2px;padding:0 2px;touch-action:manipulation;
}
.key.enter{background-color:var(--enter-color);color:white;border-color:var(--enter-color);font-size:clamp(0.7rem,2.5vw,0.9rem);flex:1.5;}
.key.backspace{background-color:var(--backspace-color);color:white;border-color:var(--backspace-color);flex:2!important;}
.key.backspace i{font-size:1.4rem;transform:scaleX(1.8);display:inline-block;}
@media(max-width:480px){.key{height:clamp(38px,5.5vh,50px);min-width:clamp(24px,5vw,34px);margin:0 1px;padding:0 1px;}.keyboard-row{gap:2px;margin-bottom:5px;}}
.key:hover{background-color:var(--border-active);transform:translateY(-1px);}
.key:active{transform:translateY(0);}
.key.correct{background-color:var(--correct-color)!important;border-color:var(--correct-color)!important;color:white!important;}
.key.present{background-color:var(--present-color)!important;border-color:var(--present-color)!important;color:white!important;}
.key.absent{background-color:var(--absent-color)!important;border-color:var(--absent-color)!important;color:rgba(255,255,255,0.4)!important;}
.shake{animation:shake 0.5s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}10%,30%,50%,70%,90%{transform:translateX(-5px);}20%,40%,60%,80%{transform:translateX(5px);}}
header{padding:10px 16px;border-bottom:1px solid var(--header-border);background:rgba(18,18,19,0.8);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:space-between;}
.light-mode header{background:rgba(248,249,250,0.85);}
h1{font-size:1.4rem;font-weight:800;margin:0;color:var(--text-color);}
.header-btn{width:42px;height:42px;border-radius:12px;background:var(--surface-color);border:1px solid var(--border-color);color:var(--text-color);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;}
.header-btn:hover{border-color:var(--border-active);}
.header-btn.new-game:hover{border-color:var(--correct-color);color:var(--correct-color);}
.header-btn i{font-size:1.2rem;}
.grid-row{display:flex;direction:ltr!important;justify-content:center;gap:5px;margin-bottom:5px;}
#grid,#grid .tile,.keyboard-row,.key{direction:ltr!important;unicode-bidi:plaintext;}
#message{font-size:1rem;min-height:40px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;padding:0 10px;text-align:center;gap:8px;flex-wrap:wrap;font-weight:700;}
.modal-overlay{background-color:rgba(0,0,0,0.75);backdrop-filter:blur(8px);}
.modal-content{width:95%;max-width:400px;max-height:85vh;overflow-y:auto;margin:10px;border-radius:20px;border:1px solid var(--border-color);background:var(--surface-color);backdrop-filter:blur(20px);}
.color-example{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding:10px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border-color);}
.color-box{width:44px;height:44px;border:none;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;flex-shrink:0;}
.color-box.correct{background:var(--correct-color);color:white;}
.color-box.present{background:var(--present-color);color:white;}
.color-box.absent{background:var(--absent-color);color:white;}
.color-description{flex:1;font-size:0.9rem;}
.stat-box{display:flex;justify-content:center;gap:16px;margin:16px 0;}
.stat-item{text-align:center;padding:12px 20px;background:rgba(255,255,255,0.05);border-radius:12px;min-width:70px;}
.stat-value{font-size:2rem;font-weight:800;}
.stat-label{font-size:0.75rem;opacity:0.7;margin-top:4px;}
.result-equation{background:linear-gradient(135deg,var(--correct-color),#2d6b2d);color:white;padding:14px 20px;border-radius:12px;margin:16px auto;text-align:center;font-size:1.8rem;font-weight:900;letter-spacing:0.08em;animation:pulse 2s infinite;box-shadow:0 4px 20px var(--correct-glow);direction:ltr;max-width:280px;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
.result-buttons{display:flex;gap:8px;margin-top:16px;}
.result-buttons button{flex:1;padding:13px;border-radius:12px;font-weight:800;font-size:0.95rem;cursor:pointer;border:none;transition:all 0.2s;}
.result-buttons .primary{background:var(--correct-color);color:white;}
.result-buttons .secondary{background:var(--key-bg);color:var(--text-color);border:1px solid var(--border-color);}
.close-btn{background:none;border:none;color:var(--text-color);font-size:1.5rem;cursor:pointer;padding:4px 8px;}
.close-btn:hover{opacity:0.7;}
</style>
</head>
<body>
<header>
<div class="flex items-center gap-2">
    <button id="helpBtn" class="header-btn" title="طريقة اللعب"><i class="fas fa-question-circle"></i></button>
    <a href="index.html" class="header-btn" title="القائمة"><i class="fas fa-th-large"></i></a>
</div>
<h1>لغز الحساب</h1>
<div class="flex items-center gap-2">
    <button id="statsBtn" class="header-btn"><i class="fas fa-chart-bar"></i></button>
    <button id="newGameBtn" class="header-btn new-game"><i class="fas fa-redo-alt"></i></button>
    <button id="themeToggle" class="header-btn"><i class="fas fa-sun text-yellow-400"></i></button>
</div>
</header>

<div class="game-wrapper">
<div id="message"></div>
<div id="grid"></div>
<div id="keyboard"></div>
</div>

<!-- Help Modal -->
<div id="helpModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden p-4">
<div class="modal-content p-5">
<div class="flex justify-between items-center mb-4">
<h2 class="text-xl font-bold">طريقة اللعب</h2>
<button class="close-btn" onclick="document.getElementById('helpModal').classList.add('hidden')">&times;</button>
</div>
<p class="text-center mb-4 opacity-80">اكتشف المعادلة الصحيحة في 6 محاولات</p>
<p class="text-center mb-4 text-sm" style="direction:ltr;font-family:monospace;font-size:1.2rem;font-weight:bold;">25+10=35</p>
<div class="color-example"><div class="color-box correct">5</div><div class="color-description"><strong>الأخضر</strong> - صحيح في مكانه</div></div>
<div class="color-example"><div class="color-box present">+</div><div class="color-description"><strong>الأصفر</strong> - موجود بمكان آخر</div></div>
<div class="color-example"><div class="color-box absent">7</div><div class="color-description"><strong>الرمادي</strong> - غير موجود</div></div>
<p class="text-sm opacity-60 mt-4 text-center">الأرقام: 0-9 | العمليات: + - * | =</p>
<p class="text-sm text-red-400 text-center mt-2">القسمة (/) غير مسموحة</p>
<button id="startGameBtn" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold mt-4 hover:bg-green-700">فهمت!</button>
</div>
</div>

<!-- Stats Modal -->
<div id="statsModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden p-4">
<div class="modal-content p-5">
<div class="flex justify-between items-center mb-4">
<h2 class="text-xl font-bold">الإحصائيات</h2>
<button class="close-btn" onclick="document.getElementById('statsModal').classList.add('hidden')">&times;</button>
</div>
<div class="stat-box">
<div class="stat-item"><div id="playedCount" class="stat-value">0</div><div class="stat-label">الألعاب</div></div>
<div class="stat-item"><div id="winPercent" class="stat-value">0%</div><div class="stat-label">نسبة الفوز</div></div>
<div class="stat-item"><div id="currentStreak" class="stat-value">0</div><div class="stat-label">التتابع</div></div>
<div class="stat-item"><div id="maxStreak" class="stat-value">0</div><div class="stat-label">أعلى تتابع</div></div>
</div>
<button id="newGameFromStats" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold mt-4 hover:bg-green-700">لعبة جديدة</button>
</div>
</div>

<!-- Result Modal -->
<div id="gameResultModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden p-4">
<div class="modal-content p-5">
<div class="flex justify-between items-center mb-4">
<h2 id="resultModalTitle" class="text-xl font-bold"></h2>
<button class="close-btn" onclick="document.getElementById('gameResultModal').classList.add('hidden')">&times;</button>
</div>
<div id="gameResultDetails" class="text-center"></div>
<div class="result-buttons">
<button class="primary" id="playAgainBtn"><i class="fas fa-redo ml-2"></i>لعبة جديدة</button>
<button class="secondary" id="viewStatsBtn"><i class="fas fa-chart-bar ml-2"></i>الإحصائيات</button>
</div>
</div>
</div>

<script>
const COLS = 8, ROWS = 6;
let target = "", row = 0, input = "", gameOver = false, won = false;
let isProcessing = false, lock = false;
let stats = {played:0, wins:0, streak:0, maxStreak:0};

function genEquation() {
    const ops = ['+', '-', '*'];
    const op = ops[Math.floor(Math.random() * ops.length)];
    let a, b, result;
    if (op === '+') { a = Math.floor(Math.random() * 50) + 1; b = Math.floor(Math.random() * 50) + 1; result = a + b; }
    else if (op === '-') { a = Math.floor(Math.random() * 50) + 20; b = Math.floor(Math.random() * Math.min(a-1, 50)) + 1; result = a - b; }
    else { a = Math.floor(Math.random() * 12) + 1; b = Math.floor(Math.random() * 12) + 1; result = a * b; }
    const eq = `${a}${op}${b}=${result}`;
    return eq.length === COLS ? eq : genEquation();
}

function calcResult(expr) {
    // Handle * before +/-
    const parts = expr.split(/([+*-])/);
    let nums = [], ops = [];
    parts.forEach(p => { if (/^\d+$/.test(p)) nums.push(parseInt(p)); else if (p) ops.push(p); });

    // First: handle multiplication
    let i = 0, finalNums = [], finalOps = [];
    while (i < nums.length) {
        if (ops[i] === '*') {
            finalNums.push(nums[i] * nums[i+1]);
            i += 2;
            if (ops[i]) finalOps.push(ops[i]);
            i++;
        } else {
            finalNums.push(nums[i]);
            if (ops[i]) finalOps.push(ops[i]);
            i++;
        }
    }

    // Then: + and - left to right
    let res = finalNums[0];
    for (let j = 0; j < finalOps.length; j++) {
        if (finalOps[j] === '+') res += finalNums[j+1];
        else if (finalOps[j] === '-') res -= finalNums[j+1];
    }
    return res;
}

function validate(inp) {
    if (inp.length !== COLS) return {ok: false, msg: `يجب إدخال ${COLS} خانات`};
    if (!inp.includes('=')) return {ok: false, msg: 'المعادلة يجب أن تحتوي على ='};
    if ((inp.match(/=/g)||[]).length !== 1) return {ok: false, msg: 'علامة = واحدة فقط'};
    if (inp.indexOf('=') === 0 || inp.indexOf('=') === COLS-1) return {ok: false, msg: '= لا يمكن أن تكون في البداية أو النهاية'};
    if (inp.includes('/')) return {ok: false, msg: 'القسمة (/) غير مسموحة!'};

    const sides = inp.split('=');
    if (!sides[0] || !sides[1] || !/^\d+$/.test(sides[1])) return {ok: false, msg: 'الناتج يجب أن يكون رقماً'};
    if (!/^[0-9+*-]+$/.test(inp)) return {ok: false, msg: 'أحرف غير مسموحة'};

    const left = calcResult(sides[0]);
    const right = parseInt(sides[1]);
    if (left !== right) return {ok: false, msg: `${sides[0]} = ${left} ≠ ${right}`};
    return {ok: true};
}

function calcGuess(guess, tgt) {
    const res = Array(COLS).fill('absent');
    const tgtArr = tgt.split(''), guessArr = guess.split('');
    const cnt = {};
    tgtArr.forEach(c => cnt[c] = (cnt[c]||0)+1);
    for (let i = 0; i < COLS; i++) {
        if (guessArr[i] === tgtArr[i]) { res[i] = 'correct'; cnt[guessArr[i]]--; }
    }
    for (let i = 0; i < COLS; i++) {
        if (res[i] !== 'correct' && cnt[guessArr[i]] > 0) { res[i] = 'present'; cnt[guessArr[i]]--; }
    }
    return res;
}

function updateKey(char, status) {
    const k = document.querySelector(`.key[data-key="${char}"]`);
    if (!k) return;
    if (status === 'correct') { k.classList.add('correct'); k.classList.remove('present','absent'); }
    else if (status === 'present' && !k.classList.contains('correct')) { k.classList.add('present'); k.classList.remove('absent'); }
    else if (status === 'absent' && !k.classList.contains('correct') && !k.classList.contains('present')) k.classList.add('absent');
}

function updateRow() {
    for (let i = 0; i < COLS; i++) {
        const t = document.getElementById(`t-${row}-${i}`);
        if (t) t.textContent = input[i] || '';
    }
}

function showMsg(msg, dur = 2500) {
    document.getElementById('message').innerHTML = msg;
    if (window._t) clearTimeout(window._t);
    window._t = setTimeout(() => document.getElementById('message').innerHTML = '', dur);
}

function shake() {
    document.getElementById(`row-${row}`)?.classList.add('shake');
    setTimeout(() => document.getElementById(`row-${row}`)?.classList.remove('shake'), 500);
}

function submitGuess() {
    if (lock || isProcessing || gameOver) return;
    const v = validate(input);
    if (!v.ok) { showMsg(v.msg); shake(); return; }

    lock = true; isProcessing = true;
    const result = calcGuess(input, target);
    let done = 0;

    for (let i = 0; i < COLS; i++) {
        const t = document.getElementById(`t-${row}-${i}`);
        if (!t) continue;
        setTimeout(() => {
            t.classList.add('flip');
            setTimeout(() => {
                t.classList.add(result[i]);
                updateKey(input[i], result[i]);
                done++;
                if (done === COLS) {
                    setTimeout(() => {
                        if (input === target) {
                            won = true; gameOver = true;
                            stats.played++; stats.wins++; stats.streak++;
                            if (stats.streak > stats.maxStreak) stats.maxStreak = stats.streak;
                            saveStats();
                            showMsg('🎉 أحسنت! فزت!');
                            setTimeout(() => showResult(true), 2000);
                        } else if (row === ROWS-1) {
                            gameOver = true;
                            stats.played++; stats.streak = 0;
                            saveStats();
                            showMsg(`💔 انتهت المحاولات!`);
                            setTimeout(() => showResult(false), 2000);
                        } else {
                            row++; input = ''; lock = false;
                        }
                        isProcessing = false;
                    }, 300);
                }
            }, 300);
        }, i * 200);
    }
}

function showResult(isWin) {
    document.getElementById('resultModalTitle').textContent = isWin ? '🎉 مبروك!' : '💔 انتهت المحاولات!';
    document.getElementById('gameResultDetails').innerHTML = `
        <div class="text-lg mb-2">${isWin ? `فزت في المحاولة ${row+1}` : 'المعادلة الصحيحة:'}</div>
        <div class="result-equation">${target}</div>
    `;
    document.getElementById('gameResultModal').classList.remove('hidden');
}

function updateStats() {
    document.getElementById('playedCount').textContent = stats.played;
    document.getElementById('winPercent').textContent = stats.played ? Math.round(stats.wins/stats.played*100)+'%' : '0%';
    document.getElementById('currentStreak').textContent = stats.streak;
    document.getElementById('maxStreak').textContent = stats.maxStreak;
}

function saveStats() { localStorage.setItem('mathgrid_stats', JSON.stringify(stats)); }
function loadStats() { const s = localStorage.getItem('mathgrid_stats'); if (s) stats = JSON.parse(s); }

function createGrid() {
    document.getElementById('grid').innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
        const d = document.createElement('div');
        d.className = 'grid-row';
        d.id = `row-${r}`;
        for (let c = 0; c < COLS; c++) {
            const t = document.createElement('div');
            t.className = 'tile';
            t.id = `t-${r}-${c}`;
            d.appendChild(t);
        }
        document.getElementById('grid').appendChild(d);
    }
    resizeTiles();
}

function resizeTiles() {
    const h = document.querySelector('header')?.offsetHeight || 60;
    const kb = document.getElementById('keyboard')?.offsetHeight || 180;
    const avail = window.innerHeight - h - kb - 90;
    const size = Math.min(Math.floor(avail/ROWS), Math.floor((window.innerWidth-40)/COLS), 58);
    document.querySelectorAll('.tile').forEach(t => t.style.setProperty('--tile-size', Math.max(size,36)+'px'));
}

function createKeyboard() {
    document.getElementById('keyboard').innerHTML = '';
    const layout = [
        ['1','2','3','4','5','6','7','8','9','0'],
        ['+','-','*','='],
        ['Enter','Backspace']
    ];
    layout.forEach(r => {
        const d = document.createElement('div');
        d.className = 'keyboard-row';
        r.forEach(k => {
            const b = document.createElement('button');
            b.className = 'key';
            b.dataset.key = k;
            if (k === 'Enter') { b.classList.add('enter'); b.textContent = 'إدخال'; }
            else if (k === 'Backspace') { b.classList.add('backspace'); b.innerHTML = '<i class="fas fa-backspace"></i>'; }
            else b.textContent = k;
            b.onclick = () => handleInput(k);
            d.appendChild(b);
        });
        document.getElementById('keyboard').appendChild(d);
    });
}

function handleInput(v) {
    if (lock || gameOver || isProcessing) return;
    if (v === 'Enter') { if (input.length === COLS) submitGuess(); else { showMsg(`أدخل ${COLS} خانات`); shake(); } }
    else if (v === 'Backspace') { input = input.slice(0,-1); updateRow(); }
    else if (/^[0-9+\-*=]$/.test(v) && input.length < COLS) {
        input += v; updateRow();
        const t = document.getElementById(`t-${row}-${input.length-1}`);
        if (t) { t.classList.add('filled'); setTimeout(() => t.classList.remove('filled'), 100); }
    }
}

function newGame() {
    target = genEquation();
    console.log('الجواب:', target);
    row = 0; input = ''; gameOver = false; won = false; isProcessing = false; lock = false;
    createGrid();
    document.querySelectorAll('.key').forEach(k => k.classList.remove('correct','present','absent'));
    document.getElementById('message').innerHTML = '';
    document.getElementById('gameResultModal').classList.add('hidden');
}

function init() {
    loadStats();
    createKeyboard();
    newGame();

    // Theme
    const saved = localStorage.getItem('mathgrid_theme');
    if (saved === 'light') { document.body.classList.add('light-mode'); document.querySelector('#themeToggle i').className = 'fas fa-moon'; }
    document.getElementById('themeToggle').onclick = () => {
        const isLight = document.body.classList.toggle('light-mode');
        document.querySelector('#themeToggle i').className = isLight ? 'fas fa-moon' : 'fas fa-sun';
        localStorage.setItem('mathgrid_theme', isLight ? 'light' : 'dark');
    };

    // Events
    document.addEventListener('keydown', e => {
        if (e.ctrlKey || e.metaKey || e.altKey) return;
        if (e.key === 'Enter') handleInput('Enter');
        else if (e.key === 'Backspace') handleInput('Backspace');
        else if (/^[0-9+\-*=]$/.test(e.key)) handleInput(e.key);
    });

    document.getElementById('helpBtn').onclick = () => document.getElementById('helpModal').classList.remove('hidden');
    document.getElementById('startGameBtn').onclick = () => { document.getElementById('helpModal').classList.add('hidden'); newGame(); };
    document.getElementById('statsBtn').onclick = () => { updateStats(); document.getElementById('statsModal').classList.remove('hidden'); };
    document.getElementById('newGameBtn').onclick = newGame;
    document.getElementById('newGameFromStats').onclick = () => { document.getElementById('statsModal').classList.add('hidden'); newGame(); };
    document.getElementById('playAgainBtn').onclick = () => { document.getElementById('gameResultModal').classList.add('hidden'); newGame(); };
    document.getElementById('viewStatsBtn').onclick = () => { document.getElementById('gameResultModal').classList.add('hidden'); updateStats(); document.getElementById('statsModal').classList.remove('hidden'); };

    window.onresize = resizeTiles;

    if (!localStorage.getItem('mathgrid_help')) {
        setTimeout(() => document.getElementById('helpModal').classList.remove('hidden'), 500);
        localStorage.setItem('mathgrid_help', 'true');
    }
}

window.onload = init;
</script>
</body>
</html>
