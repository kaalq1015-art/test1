<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>12345</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
*{font-family:'Tajawal',sans-serif;box-sizing:border-box;}

:root {
    --correct-color: #538d4e;
    --correct-glow: rgba(83, 141, 78, 0.35);
    --present-color: #b59f3b;
    --present-glow: rgba(181, 159, 59, 0.35);
    --absent-color: #3a3a3c;
    --default-color: #565758;
    --bg-color: #0f0f10;
    --surface-color: rgba(30, 30, 32, 0.6);
    --text-color: #ffffff;
    --text-muted: #a0a0a0;
    --border-color: rgba(255, 255, 255, 0.1);
    --border-active: #818384;
    --key-bg: #4a4a4e;
    --key-text: #ffffff;
    --enter-color: #538d4e;
    --backspace-color: #9b2335;
    --newgame-color: #538d4e;
    --header-border: rgba(255, 255, 255, 0.08);
}

.light-mode {
    --correct-color: #6aaa64;
    --present-color: #c9b458;
    --absent-color: #787c7e;
    --bg-color: #f8f9fa;
    --surface-color: rgba(255, 255, 255, 0.9);
    --text-color: #1a1a1b;
    --text-muted: #787c7e;
    --border-color: rgba(0, 0, 0, 0.1);
    --border-active: #d3d6da;
    --key-bg: #d3d6da;
    --key-text: #1a1a1b;
    --header-border: rgba(0, 0, 0, 0.08);
}

body {
    background-color: var(--bg-color);
    color: var(--text-color);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    margin: 0;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    touch-action: manipulation;
}

.game-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    width: 100%;
    max-width: 550px;
    margin: 0 auto;
    padding: 10px 15px;
    min-height: 0;
}

/* التروس وأزرار الهيدر المطورة */
.header-btn {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    background: var(--surface-color);
    border: 1px solid var(--border-color);
    transition: all 0.3s ease;
    backdrop-filter: blur(4px);
}
.header-btn:hover {
    transform: scale(1.05);
    background: var(--border-color);
}

#grid, .grid-row, .keyboard-row, .key, .tile, .matrix-grid, .matrix-row, .correct-number, .matrix-tile {
    direction: ltr !important;
}

/* شكل الخانات الأنعم والعصري */
.tile {
    --tile-size: 62px;
    width: var(--tile-size);
    height: var(--tile-size);
    border: 1.5px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    font-weight: 800; /* خط أرقام أسمك */
    user-select: none;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 16px; /* زوايا ناعمة جداً */
}

.tile.filled { border-color: var(--border-active); animation: pop 0.1s ease; }
@keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

.tile.correct { background-color: var(--correct-color); border-color: var(--correct-color); color: white; box-shadow: 0 0 15px var(--correct-glow); }
.tile.present { background-color: var(--present-color); border-color: var(--present-color); color: white; box-shadow: 0 0 15px var(--present-glow); }
.tile.absent { background-color: var(--absent-color); border-color: var(--absent-color); color: white; }

.flip { animation: flip 0.6s ease; }
@keyframes flip { 0% { transform: rotateX(0); } 50% { transform: rotateX(90deg); } 100% { transform: rotateX(0); } }

.keyboard-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; }
.key {
    height: 56px;
    background-color: var(--key-bg);
    color: var(--key-text);
    border-radius: 10px;
    font-weight: 700;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex: 1;
    transition: all 0.2s ease;
}
.key.enter { flex: 1.6; font-size: 0.9rem; background-color: var(--enter-color); color: white; }
.key.backspace { flex: 1.6; background-color: var(--absent-color); color: white; }

.difficulty-toggle {
    padding: 6px 12px;
    border-radius: 10px;
    background: var(--surface-color);
    border: 1px solid var(--border-color);
    font-size: 0.75rem;
    font-weight: 800;
}

.correct-number {
    background: linear-gradient(135deg, var(--correct-color), #3a7a3e);
    color: white;
    padding: 18px;
    border-radius: 16px;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: 0.2em;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.modal-content {
    background: var(--bg-color);
    border: 1px solid var(--border-color);
    border-radius: 28px;
    overflow: hidden;
}

.shake { animation: shake 0.5s ease; }
@keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); } 20%, 40%, 60%, 80% { transform: translateX(5px); } }

.matrix-tile { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; }
</style>
</head>
<body>

<header class="grid grid-cols-3 items-center px-4 py-3 border-b border-[var(--header-border)] min-h-[65px]">
    <div class="flex items-center gap-2">
        <a href="index.html" class="header-btn" title="تغيير اللعبة">
            <i class="fas fa-th-large text-white text-lg"></i>
        </a>
        <button id="statsBtn" class="header-btn">
            <i class="fas fa-chart-bar text-lg"></i>
        </button>
    </div>

    <div class="flex justify-center">
        <h1 class="font-black text-xl tracking-tighter">12345</h1>
    </div>

    <div class="flex items-center justify-end gap-2">
        <div class="relative">
            <button id="difficultyToggle" class="difficulty-toggle flex items-center gap-2">
                <span>الصعوبة</span>
                <i class="fas fa-chevron-down text-[10px]"></i>
            </button>
            <div id="difficultyMenu" class="absolute top-full left-0 mt-2 bg-[var(--bg-color)] border border-[var(--border-color)] rounded-xl hidden z-50 shadow-xl min-w-[100px]">
                <button data-difficulty="hard" class="w-full p-3 text-xs active font-black">صعب</button>
                <button data-difficulty="easy" class="w-full p-3 text-xs font-black">سهل</button>
            </div>
        </div>
        <button id="newGameHeaderBtn" class="header-btn !bg-[var(--correct-color)] !text-white">
            <i class="fas fa-redo-alt text-sm"></i>
        </button>
        <button id="themeToggle" class="header-btn">
            <i class="fas fa-sun text-lg"></i>
        </button>
    </div>
</header>

<div class="game-wrapper">
    <div id="message" class="text-center font-bold h-10 flex items-center justify-center text-sm"></div>
    <div id="grid" class="flex flex-col gap-2 items-center"></div>
    <div id="keyboard" class="w-full flex flex-col gap-2 mt-4"></div>
</div>

<div id="helpModal" class="fixed inset-0 bg-black/70 backdrop-blur-md z-50 flex items-center justify-center hidden p-4">
    <div class="modal-content max-w-sm w-full p-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black">طريقة اللعب</h2>
            <button id="closeHelp" class="text-3xl">&times;</button>
        </div>
        <p class="text-sm opacity-70 mb-8 text-center" id="helpAttemptsText"></p>
        <div class="space-y-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-[var(--correct-color)] rounded-2xl flex items-center justify-center font-black text-white text-xl shadow-lg">5</div>
                <div class="text-xs font-bold">الرقم صحيح وفي مكانه الصحيح.</div>
            </div>
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-[var(--present-color)] rounded-2xl flex items-center justify-center font-black text-white text-xl shadow-lg">2</div>
                <div class="text-xs font-bold">الرقم موجود ولكن بمكان آخر.</div>
            </div>
        </div>
        <button id="startGameBtn" class="w-full mt-8 bg-[var(--correct-color)] text-white py-4 rounded-2xl font-black">ابدأ اللعب</button>
    </div>
</div>

<div id="statsModal" class="fixed inset-0 bg-black/70 backdrop-blur-md z-50 flex items-center justify-center hidden p-4">
    <div class="modal-content max-w-sm w-full p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-black">الإحصائيات</h2>
            <button id="closeStats" class="text-3xl">&times;</button>
        </div>
        <div class="grid grid-cols-4 gap-2 text-center mb-8">
            <div><div id="playedCount" class="text-2xl font-black">0</div><div class="text-[10px] opacity-50">لعب</div></div>
            <div><div id="winPercent" class="text-2xl font-black">0%</div><div class="text-[10px] opacity-50">فوز</div></div>
            <div><div id="currentStreak" class="text-2xl font-black">0</div><div class="text-[10px] opacity-50">تتابع</div></div>
            <div><div id="maxStreak" class="text-2xl font-black">0</div><div class="text-[10px] opacity-50">أفضل</div></div>
        </div>
        <div class="max-h-48 overflow-y-auto border border-[var(--border-color)] rounded-2xl mb-6">
            <table class="w-full text-xs">
                <thead class="bg-white/5 sticky top-0">
                    <tr><th class="p-3">#</th><th class="p-3">المحاولات</th><th class="p-3">النتيجة</th></tr>
                </thead>
                <tbody id="attemptsTableBody" class="text-center"></tbody>
            </table>
        </div>
        <button id="newGameFromStats" class="w-full bg-[var(--correct-color)] text-white py-3 rounded-2xl font-black">لعبة جديدة</button>
    </div>
</div>

<div id="gameResultModal" class="fixed inset-0 bg-black/70 backdrop-blur-md z-50 flex items-center justify-center hidden p-4">
    <div class="modal-content max-w-sm w-full p-8 text-center">
        <h2 id="resultModalTitle" class="text-2xl font-black mb-4"></h2>
        <div id="gameResultDetails" class="mb-6 flex justify-center"></div>
        <div class="mb-6"><div class="text-[10px] opacity-50 mb-3 uppercase tracking-widest">تحليل المحاولات</div><div class="flex flex-col gap-1 items-center" id="matrixGrid"></div></div>
        <div class="flex gap-3">
            <button id="playAgainBtn" class="flex-1 bg-[var(--correct-color)] text-white py-4 rounded-2xl font-black">مرة أخرى</button>
            <button id="viewStatsBtn" class="flex-1 border border-[var(--border-color)] py-4 rounded-2xl font-black">الإحصائيات</button>
        </div>
    </div>
</div>

<script>
const MAX_DIGITS = 5;
let targetNumber = "";
let currentRow = 0;
let currentGuess = "";
let gameOver = false;
let gameWon = false;
let stats = { played: 0, wins: 0, currentStreak: 0, maxStreak: 0 };
let attemptsHistory = [];
let attemptResults = [];
let isProcessing = false;
let inputLock = false;
let difficulty = 'hard';
let maxAttempts = 6;

function convertArabicDigits(str) {
    const arabicDigits = /[٠-٩]/g;
    return str.replace(arabicDigits, d => String.fromCharCode(d.charCodeAt(0) - 1632 + 48));
}

function generateRandomNumber() {
    let num = "";
    for (let i = 0; i < MAX_DIGITS; i++) num += Math.floor(Math.random() * 10);
    return num;
}

function calculateGuessResult(guess, target) {
    const result = Array(MAX_DIGITS).fill('absent');
    const targetCount = {};
    for (const d of target) targetCount[d] = (targetCount[d] || 0) + 1;
    for (let i = 0; i < MAX_DIGITS; i++) if (guess[i] === target[i]) { result[i] = 'correct'; targetCount[guess[i]]--; }
    for (let i = 0; i < MAX_DIGITS; i++) if (result[i] !== 'correct' && targetCount[guess[i]] > 0) { result[i] = 'present'; targetCount[guess[i]]--; }
    return result;
}

function updateKeyboard(digit, status) {
    const key = document.querySelector(`.key[data-key="${digit}"]`);
    if (!key) return;
    if (status === 'correct') { key.style.backgroundColor = 'var(--correct-color)'; key.style.color = 'white'; }
    else if (status === 'present' && key.style.backgroundColor !== 'var(--correct-color)') { key.style.backgroundColor = 'var(--present-color)'; key.style.color = 'white'; }
    else if (status === 'absent' && !['var(--correct-color)', 'var(--present-color)'].includes(key.style.backgroundColor)) { key.style.backgroundColor = 'var(--absent-color)'; key.style.color = 'white'; }
}

function updateCurrentRow() {
    for (let i = 0; i < MAX_DIGITS; i++) {
        const tile = document.getElementById(`tile-${currentRow}-${i}`);
        if (tile) tile.textContent = currentGuess[i] || '';
    }
}

function showMessage(msg) {
    const m = document.getElementById('message');
    m.textContent = msg;
    setTimeout(() => m.textContent = '', 3000);
}

function evaluateGuess() {
    const guess = currentGuess;
    const result = calculateGuessResult(guess, targetNumber);
    attemptResults[currentRow] = result;
    inputLock = true;
    let completed = 0;
    
    for (let i = 0; i < MAX_DIGITS; i++) {
        const tile = document.getElementById(`tile-${currentRow}-${i}`);
        setTimeout(() => {
            tile.classList.add('flip');
            setTimeout(() => {
                tile.classList.add(result[i]);
                updateKeyboard(guess[i], result[i]);
                completed++;
                if (completed === MAX_DIGITS) {
                    if (guess === targetNumber) { gameWon = true; gameOver = true; handleWin(); }
                    else if (currentRow === maxAttempts - 1) { gameOver = true; handleLoss(); }
                    else { currentRow++; currentGuess = ""; inputLock = false; }
                    isProcessing = false;
                }
            }, 300);
        }, i * 200);
    }
}

function handleWin() {
    stats.played++; stats.wins++; stats.currentStreak++;
    if (stats.currentStreak > stats.maxStreak) stats.maxStreak = stats.currentStreak;
    saveAndShow(true);
}

function handleLoss() {
    stats.played++; stats.currentStreak = 0;
    saveAndShow(false);
}

function saveAndShow(isWin) {
    localStorage.setItem('numberle_stats', JSON.stringify(stats));
    attemptsHistory.unshift({ number: attemptsHistory.length + 1, attempts: currentRow + 1, result: isWin ? 'win' : 'loss' });
    localStorage.setItem('numberle_history', JSON.stringify(attemptsHistory));
    updateStatsDisplay();
    setTimeout(() => showGameResultModal(isWin), 2000);
}

function renderAttemptMatrix() {
    const container = document.getElementById('matrixGrid');
    container.innerHTML = '';
    const used = attemptResults.filter(r => r && r.length);
    used.forEach((res, idx) => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'flex gap-1';
        res.forEach((st, col) => {
            const tile = document.createElement('div');
            tile.className = `matrix-tile ${st}`;
            tile.textContent = document.getElementById(`tile-${idx}-${col}`).textContent;
            rowDiv.appendChild(tile);
        });
        container.appendChild(rowDiv);
    });
}

function showGameResultModal(isWin) {
    document.getElementById('resultModalTitle').textContent = isWin ? 'كفو! جبتها ✅' : 'حظ أوفر ❌';
    document.getElementById('gameResultDetails').innerHTML = `<div class="correct-number">${targetNumber}</div>`;
    renderAttemptMatrix();
    document.getElementById('gameResultModal').classList.remove('hidden');
}

function updateStatsDisplay() {
    document.getElementById('playedCount').textContent = stats.played;
    document.getElementById('winPercent').textContent = stats.played ? Math.round((stats.wins / stats.played) * 100) + '%' : '0%';
    document.getElementById('currentStreak').textContent = stats.currentStreak;
    document.getElementById('maxStreak').textContent = stats.maxStreak;
    const body = document.getElementById('attemptsTableBody');
    body.innerHTML = attemptsHistory.map(a => `<tr class="border-b border-white/5"><td class="p-3">${a.number}</td><td class="p-3">${a.attempts}</td><td class="p-3 ${a.result === 'win' ? 'text-green-500' : 'text-red-500'} font-bold">${a.result === 'win' ? 'فوز' : 'خسارة'}</td></tr>`).join('');
}

function startNewGame() {
    targetNumber = generateRandomNumber();
    currentRow = 0; currentGuess = ""; gameOver = false; isProcessing = false; inputLock = false;
    attemptResults = [];
    createGrid();
    document.querySelectorAll('.key').forEach(k => { k.style.backgroundColor = ''; k.style.color = ''; });
    document.getElementById('gameResultModal').classList.add('hidden');
    document.getElementById('statsModal').classList.add('hidden');
}

function handleInput(value) {
    if (inputLock || gameOver || isProcessing) return;
    if (value === 'Enter') {
        if (currentGuess.length !== MAX_DIGITS) { showMessage('كمل الأرقام أول'); return; }
        isProcessing = true; evaluateGuess();
    } else if (value === 'Backspace') {
        currentGuess = currentGuess.slice(0, -1); updateCurrentRow();
    } else if (/^\d$/.test(value) && currentGuess.length < MAX_DIGITS) {
        currentGuess += value; updateCurrentRow();
    }
}

function createGrid() {
    const g = document.getElementById('grid');
    g.innerHTML = '';
    for (let r = 0; r < maxAttempts; r++) {
        const row = document.createElement('div');
        row.className = 'flex gap-2 mb-1';
        for (let c = 0; c < MAX_DIGITS; c++) {
            const tile = document.createElement('div');
            tile.className = 'tile'; tile.id = `tile-${r}-${c}`;
            row.appendChild(tile);
        }
        g.appendChild(row);
    }
}

function createKeyboard() {
    const k = document.getElementById('keyboard');
    const layout = [['1','2','3','4','5'],['6','7','8','9','0'],['Enter','Backspace']];
    k.innerHTML = layout.map(row => `<div class="keyboard-row">${row.map(key => `<button class="key" data-key="${key}">${key === 'Backspace' ? '⌫' : (key === 'Enter' ? 'دخول' : key)}</button>`).join('')}</div>`).join('');
    k.querySelectorAll('.key').forEach(btn => btn.addEventListener('click', () => handleInput(btn.dataset.key)));
}

function setupDifficulty() {
    const saved = localStorage.getItem('numberle_difficulty') || 'hard';
    difficulty = saved;
    maxAttempts = difficulty === 'hard' ? 6 : 8;
    document.getElementById('helpAttemptsText').textContent = `خمن الرقم المكون من 5 خانات في ${maxAttempts} محاولات.`;
    document.querySelectorAll('[data-difficulty]').forEach(opt => {
        opt.classList.toggle('text-[var(--correct-color)]', opt.dataset.difficulty === difficulty);
        opt.addEventListener('click', () => {
            localStorage.setItem('numberle_difficulty', opt.dataset.difficulty);
            location.reload();
        });
    });
    document.getElementById('difficultyToggle').addEventListener('click', (e) => {
        e.stopPropagation();
        document.getElementById('difficultyMenu').classList.toggle('hidden');
    });
}

window.addEventListener('load', () => {
    const savedStats = localStorage.getItem('numberle_stats');
    if (savedStats) stats = JSON.parse(savedStats);
    const savedHist = localStorage.getItem('numberle_history');
    if (savedHist) attemptsHistory = JSON.parse(savedHist);
    
    createKeyboard();
    setupDifficulty();
    startNewGame();
    updateStatsDisplay();

    document.getElementById('themeToggle').addEventListener('click', () => {
        const isLight = document.body.classList.toggle('light-mode');
        localStorage.setItem('numberle_theme', isLight ? 'light' : 'dark');
    });

    document.getElementById('statsBtn').addEventListener('click', () => document.getElementById('statsModal').classList.remove('hidden'));
    document.getElementById('closeStats').addEventListener('click', () => document.getElementById('statsModal').classList.add('hidden'));
    document.getElementById('newGameHeaderBtn').addEventListener('click', startNewGame);
    document.getElementById('playAgainBtn').addEventListener('click', startNewGame);
    document.getElementById('viewStatsBtn').addEventListener('click', () => {
        document.getElementById('gameResultModal').classList.add('hidden');
        document.getElementById('statsModal').classList.remove('hidden');
    });

    if (!localStorage.getItem('numberle_help_seen')) {
        document.getElementById('helpModal').classList.remove('hidden');
        localStorage.setItem('numberle_help_seen', 'true');
    }
    document.getElementById('startGameBtn').addEventListener('click', () => document.getElementById('helpModal').classList.add('hidden'));
    document.getElementById('closeHelp').addEventListener('click', () => document.getElementById('helpModal').classList.add('hidden'));
});

document.addEventListener('keydown', (e) => {
    const key = convertArabicDigits(e.key);
    if (key === 'Enter') handleInput('Enter');
    else if (key === 'Backspace') handleInput('Backspace');
    else if (/^\d$/.test(key)) handleInput(key);
});
</script>
</body>
</html>
