<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ووردل الأرقام - 12345</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        
        * { font-family: 'Tajawal', sans-serif; box-sizing: border-box; }
        
        :root {
            --correct-color: #538d4e;
            --correct-glow: rgba(83, 141, 78, 0.35);
            --present-color: #b59f3b;
            --present-glow: rgba(181, 159, 59, 0.35);
            --absent-color: #3a3a3c;
            --bg-color: #121213;
            --surface-color: #1e1e20;
            --text-color: #ffffff;
            --text-muted: #818384;
            --border-color: #3a3a3c;
            --border-active: #565758;
            --key-bg: #818384;
            --key-text: #ffffff;
            --enter-color: #538d4e;
            --backspace-color: #3a3a3c;
            --header-border: rgba(255, 255, 255, 0.1);
        }

        .light-mode {
            --correct-color: #6aaa64;
            --correct-glow: rgba(106, 170, 100, 0.2);
            --present-color: #c9b458;
            --present-glow: rgba(201, 180, 88, 0.2);
            --absent-color: #787c7e;
            --bg-color: #ffffff;
            --surface-color: #f8f9fa;
            --text-color: #121213;
            --text-muted: #787c7e;
            --border-color: #d3d6da;
            --border-active: #878a8c;
            --key-bg: #d3d6da;
            --key-text: #121213;
            --header-border: rgba(0, 0, 0, 0.1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
            margin: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 10px;
            min-height: 0;
        }

        #grid, .grid-row, .keyboard-row, .key, .tile, .matrix-tile {
            direction: ltr !important;
        }

        .tile {
            --tile-size: 60px;
            width: var(--tile-size);
            height: var(--tile-size);
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 800;
            user-select: none;
            transition: all 0.3s ease;
            border-radius: 4px;
        }

        .tile.filled { border-color: var(--border-active); animation: pop 0.1s ease; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .tile.correct { background-color: var(--correct-color); border-color: var(--correct-color); color: white; }
        .tile.present { background-color: var(--present-color); border-color: var(--present-color); color: white; }
        .tile.absent { background-color: var(--absent-color); border-color: var(--absent-color); color: white; }

        .flip { animation: flip 0.6s ease; }
        @keyframes flip { 0% { transform: rotateX(0); } 50% { transform: rotateX(90deg); } 100% { transform: rotateX(0); } }

        .key {
            height: 58px;
            background-color: var(--key-bg);
            color: var(--key-text);
            border-radius: 4px;
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex: 1;
            transition: all 0.2s ease;
        }
        .key.enter { flex: 1.5; font-size: 0.9rem; background-color: var(--correct-color); color: white; }
        .key.backspace { flex: 1.5; background-color: var(--absent-color); color: white; }
        
        .difficulty-menu {
            position: absolute;
            top: 100%;
            left: 0;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            z-index: 100;
            display: none;
            min-width: 100px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .difficulty-menu.show { display: block; }
        .difficulty-option { width: 100%; padding: 10px; text-align: center; border-bottom: 1px solid var(--border-color); }
        .difficulty-option.active { color: var(--correct-color); font-weight: 800; }

        .correct-number {
            background: var(--correct-color);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 0.2em;
        }

        .shake { animation: shake 0.5s ease; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); } 20%, 40%, 60%, 80% { transform: translateX(5px); } }
    </style>
</head>
<body>

<header class="grid grid-cols-3 items-center px-4 py-3 border-b border-[var(--header-border)] min-h-[65px]">
    <div class="flex items-center gap-2">
        <a href="index.html" class="w-9 h-9 bg-[var(--correct-color)] rounded-lg flex items-center justify-center hover:opacity-90 transition-all shadow-sm">
            <i class="fas fa-th-large text-white text-sm"></i>
        </a>
        <button id="statsBtn" class="w-9 h-9 rounded-lg hover:bg-[var(--surface-color)] border border-[var(--border-color)] flex items-center justify-center transition-all">
            <i class="fas fa-chart-bar text-lg"></i>
        </button>
    </div>

    <div class="flex justify-center">
        <h1 class="font-black text-xl tracking-tighter">12345</h1>
    </div>

    <div class="flex items-center justify-end gap-2">
        <div class="relative">
            <button id="difficultyToggle" class="px-3 py-1.5 border border-[var(--border-color)] rounded-lg bg-[var(--surface-color)] text-xs font-bold flex items-center gap-2">
                <span>الصعوبة</span>
                <i class="fas fa-chevron-down text-[10px]"></i>
            </button>
            <div id="difficultyMenu" class="difficulty-menu">
                <button data-difficulty="hard" class="difficulty-option active text-xs">صعب</button>
                <button data-difficulty="easy" class="difficulty-option text-xs">سهل</button>
            </div>
        </div>
        <button id="newGameHeaderBtn" class="w-9 h-9 bg-[var(--correct-color)] text-white rounded-full flex items-center justify-center shadow-md hover:scale-105 transition-all">
            <i class="fas fa-redo-alt text-sm"></i>
        </button>
        <button id="themeToggle" class="w-9 h-9 rounded-lg border border-[var(--border-color)] flex items-center justify-center">
            <i class="fas fa-sun text-lg"></i>
        </button>
    </div>
</header>

<div class="game-wrapper">
    <div id="message" class="text-center font-bold h-10 flex items-center justify-center text-sm"></div>
    <div id="grid" class="flex flex-col gap-1.5 items-center"></div>
    <div id="keyboard" class="w-full flex flex-col gap-2 mt-4"></div>
</div>

<div id="helpModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden p-4">
    <div class="bg-[var(--bg-color)] border border-[var(--border-color)] rounded-2xl max-w-sm w-full p-6 shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-extrabold">كيف تلعب؟</h2>
            <button id="closeHelp" class="text-2xl">&times;</button>
        </div>
        <p class="text-sm opacity-70 mb-6 text-center" id="helpAttemptsText"></p>
        <div class="space-y-4">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-[var(--correct-color)] rounded flex items-center justify-center font-bold text-white">5</div>
                <div class="text-xs">الرقم في المكان الصحيح.</div>
            </div>
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-[var(--present-color)] rounded flex items-center justify-center font-bold text-white">2</div>
                <div class="text-xs">الرقم موجود ولكن بمكان آخر.</div>
            </div>
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-[var(--absent-color)] rounded flex items-center justify-center font-bold text-white">7</div>
                <div class="text-xs">الرقم غير موجود نهائياً.</div>
            </div>
        </div>
        <button id="startGameBtn" class="w-full mt-8 bg-[var(--correct-color)] text-white py-3 rounded-xl font-bold">ابدأ اللعب</button>
    </div>
</div>

<div id="statsModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden p-4">
    <div class="bg-[var(--bg-color)] border border-[var(--border-color)] rounded-2xl max-w-sm w-full p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-extrabold">الإحصائيات</h2>
            <button id="closeStats" class="text-2xl">&times;</button>
        </div>
        <div class="grid grid-cols-4 gap-2 text-center mb-8">
            <div><div id="playedCount" class="text-2xl font-black">0</div><div class="text-[10px] opacity-50">لعب</div></div>
            <div><div id="winPercent" class="text-2xl font-black">0%</div><div class="text-[10px] opacity-50">فوز</div></div>
            <div><div id="currentStreak" class="text-2xl font-black">0</div><div class="text-[10px] opacity-50">تتابع</div></div>
            <div><div id="maxStreak" class="text-2xl font-black">0</div><div class="text-[10px] opacity-50">أفضل</div></div>
        </div>
        <div class="max-h-40 overflow-y-auto border border-[var(--border-color)] rounded-lg mb-6">
            <table class="w-full text-xs">
                <thead class="bg-[var(--surface-color)] sticky top-0">
                    <tr><th class="p-2">#</th><th class="p-2">المحاولات</th><th class="p-2">النتيجة</th></tr>
                </thead>
                <tbody id="attemptsTableBody" class="text-center"></tbody>
            </table>
        </div>
        <button id="newGameFromStats" class="w-full bg-[var(--correct-color)] text-white py-3 rounded-xl font-bold">لعبة جديدة</button>
    </div>
</div>

<div id="gameResultModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden p-4">
    <div class="bg-[var(--bg-color)] border border-[var(--border-color)] rounded-2xl max-w-sm w-full p-6 text-center">
        <h2 id="resultModalTitle" class="text-2xl font-black mb-4"></h2>
        <div id="gameResultDetails" class="mb-6"></div>
        <div class="matrix-grid flex flex-col gap-1 items-center mb-8" id="matrixGrid"></div>
        <div class="flex gap-3">
            <button id="playAgainBtn" class="flex-1 bg-[var(--correct-color)] text-white py-3 rounded-xl font-bold">مرة أخرى</button>
            <button id="viewStatsBtn" class="flex-1 border border-[var(--border-color)] py-3 rounded-xl font-bold">الإحصائيات</button>
        </div>
    </div>
</div>

<script>
const MAX_DIGITS = 5;
let targetNumber = "";
let currentRow = 0;
let currentGuess = "";
let gameOver = false;
let gameWon = false;
let stats = { played: 0, wins: 0, currentStreak: 0, maxStreak: 0 };
let attemptsHistory = [];
let attemptMatrices = [];
let isProcessing = false;
let inputLock = false;
let difficulty = 'hard';
let maxAttempts = 6;

function generateRandomNumber() {
    let num = "";
    for (let i = 0; i < MAX_DIGITS; i++) num += Math.floor(Math.random() * 10);
    return num;
}

function calculateGuessResult(guess, target) {
    const result = Array(MAX_DIGITS).fill('absent');
    const targetCount = {};
    for (const d of target) targetCount[d] = (targetCount[d] || 0) + 1;
    for (let i = 0; i < MAX_DIGITS; i++) if (guess[i] === target[i]) { result[i] = 'correct'; targetCount[guess[i]]--; }
    for (let i = 0; i < MAX_DIGITS; i++) if (result[i] !== 'correct' && targetCount[guess[i]] > 0) { result[i] = 'present'; targetCount[guess[i]]--; }
    return result;
}

function updateKeyboard(digit, status) {
    const key = document.querySelector(`.key[data-key="${digit}"]`);
    if (!key) return;
    if (status === 'correct') { key.style.backgroundColor = 'var(--correct-color)'; key.style.color = 'white'; }
    else if (status === 'present' && key.style.backgroundColor !== 'var(--correct-color)') { key.style.backgroundColor = 'var(--present-color)'; key.style.color = 'white'; }
    else if (status === 'absent' && !['var(--correct-color)', 'var(--present-color)'].includes(key.style.backgroundColor)) { key.style.backgroundColor = 'var(--absent-color)'; key.style.color = 'white'; }
}

function updateCurrentRow() {
    for (let i = 0; i < MAX_DIGITS; i++) {
        const tile = document.getElementById(`tile-${currentRow}-${i}`);
        if (tile) tile.textContent = currentGuess[i] || '';
    }
}

function showMessage(msg) {
    const m = document.getElementById('message');
    m.textContent = msg;
    setTimeout(() => m.textContent = '', 3000);
}

function evaluateGuess() {
    const guess = currentGuess;
    const result = calculateGuessResult(guess, targetNumber);
    inputLock = true;
    let completed = 0;
    
    for (let i = 0; i < MAX_DIGITS; i++) {
        const tile = document.getElementById(`tile-${currentRow}-${i}`);
        setTimeout(() => {
            tile.classList.add('flip');
            setTimeout(() => {
                tile.classList.add(result[i]);
                updateKeyboard(guess[i], result[i]);
                completed++;
                if (completed === MAX_DIGITS) {
                    if (guess === targetNumber) { gameWon = true; gameOver = true; handleWin(); }
                    else if (currentRow === maxAttempts - 1) { gameOver = true; handleLoss(); }
                    else { currentRow++; currentGuess = ""; inputLock = false; }
                    isProcessing = false;
                }
            }, 300);
        }, i * 200);
    }
}

function handleWin() {
    stats.played++; stats.wins++; stats.currentStreak++;
    if (stats.currentStreak > stats.maxStreak) stats.maxStreak = stats.currentStreak;
    saveAndShow(true);
}

function handleLoss() {
    stats.played++; stats.currentStreak = 0;
    saveAndShow(false);
}

function saveAndShow(isWin) {
    localStorage.setItem('numberle_stats', JSON.stringify(stats));
    attemptsHistory.unshift({ number: attemptsHistory.length + 1, attempts: currentRow + 1, result: isWin ? 'win' : 'loss' });
    localStorage.setItem('numberle_history', JSON.stringify(attemptsHistory));
    updateStatsDisplay();
    setTimeout(() => showGameResultModal(isWin), 2000);
}

function showGameResultModal(isWin) {
    document.getElementById('resultModalTitle').textContent = isWin ? 'كفو! جبتها ✅' : 'حظ أوفر المرة الجاية ❌';
    document.getElementById('gameResultDetails').innerHTML = `<div class="correct-number">${targetNumber}</div>`;
    document.getElementById('gameResultModal').classList.remove('hidden');
}

function updateStatsDisplay() {
    document.getElementById('playedCount').textContent = stats.played;
    document.getElementById('winPercent').textContent = stats.played ? Math.round((stats.wins / stats.played) * 100) + '%' : '0%';
    document.getElementById('currentStreak').textContent = stats.currentStreak;
    document.getElementById('maxStreak').textContent = stats.maxStreak;
    const body = document.getElementById('attemptsTableBody');
    body.innerHTML = attemptsHistory.map(a => `<tr><td class="p-2">${a.number}</td><td class="p-2">${a.attempts}</td><td class="p-2 ${a.result === 'win' ? 'text-green-500' : 'text-red-500'} font-bold">${a.result === 'win' ? 'فوز' : 'خسارة'}</td></tr>`).join('');
}

function startNewGame() {
    targetNumber = generateRandomNumber();
    currentRow = 0; currentGuess = ""; gameOver = false; isProcessing = false; inputLock = false;
    createGrid();
    document.querySelectorAll('.key').forEach(k => { k.style.backgroundColor = ''; k.style.color = ''; });
    document.getElementById('gameResultModal').classList.add('hidden');
    document.getElementById('statsModal').classList.add('hidden');
}

function handleInput(value) {
    if (inputLock || gameOver || isProcessing) return;
    if (value === 'Enter') {
        if (currentGuess.length !== MAX_DIGITS) { showMessage('كمل الأرقام أول'); return; }
        isProcessing = true; evaluateGuess();
    } else if (value === 'Backspace') {
        currentGuess = currentGuess.slice(0, -1); updateCurrentRow();
    } else if (/^\d$/.test(value) && currentGuess.length < MAX_DIGITS) {
        currentGuess += value; updateCurrentRow();
    }
}

function createGrid() {
    const g = document.getElementById('grid');
    g.innerHTML = '';
    for (let r = 0; r < maxAttempts; r++) {
        const row = document.createElement('div');
        row.className = 'flex gap-1.5';
        for (let c = 0; c < MAX_DIGITS; c++) {
            const tile = document.createElement('div');
            tile.className = 'tile'; tile.id = `tile-${r}-${c}`;
            row.appendChild(tile);
        }
        g.appendChild(row);
    }
}

function createKeyboard() {
    const k = document.getElementById('keyboard');
    const layout = [['1','2','3','4','5'],['6','7','8','9','0'],['Enter','Backspace']];
    k.innerHTML = layout.map(row => `<div class="flex gap-2">${row.map(key => `<button class="key ${key.toLowerCase()}" data-key="${key}">${key === 'Backspace' ? '⌫' : (key === 'Enter' ? 'دخول' : key)}</button>`).join('')}</div>`).join('');
    k.querySelectorAll('.key').forEach(btn => btn.addEventListener('click', () => handleInput(btn.dataset.key)));
}

function setupDifficulty() {
    const saved = localStorage.getItem('numberle_difficulty') || 'hard';
    difficulty = saved;
    maxAttempts = difficulty === 'hard' ? 6 : 8;
    document.getElementById('helpAttemptsText').textContent = `خمن الرقم المكون من 5 خانات في ${maxAttempts} محاولات.`;
    document.querySelectorAll('.difficulty-option').forEach(opt => {
        opt.classList.toggle('active', opt.dataset.difficulty === difficulty);
        opt.addEventListener('click', () => {
            difficulty = opt.dataset.difficulty;
            localStorage.setItem('numberle_difficulty', difficulty);
            location.reload();
        });
    });
    document.getElementById('difficultyToggle').addEventListener('click', (e) => {
        e.stopPropagation();
        document.getElementById('difficultyMenu').classList.toggle('show');
    });
}

// Init
window.addEventListener('load', () => {
    const savedStats = localStorage.getItem('numberle_stats');
    if (savedStats) stats = JSON.parse(savedStats);
    const savedHist = localStorage.getItem('numberle_history');
    if (savedHist) attemptsHistory = JSON.parse(savedHist);
    
    createKeyboard();
    setupDifficulty();
    startNewGame();
    updateStatsDisplay();

    document.getElementById('themeToggle').addEventListener('click', () => {
        const isLight = document.body.classList.toggle('light-mode');
        localStorage.setItem('numberle_theme', isLight ? 'light' : 'dark');
    });

    document.getElementById('statsBtn').addEventListener('click', () => document.getElementById('statsModal').classList.remove('hidden'));
    document.getElementById('closeStats').addEventListener('click', () => document.getElementById('statsModal').classList.add('hidden'));
    document.getElementById('newGameHeaderBtn').addEventListener('click', startNewGame);
    document.getElementById('playAgainBtn').addEventListener('click', startNewGame);
    document.getElementById('viewStatsBtn').addEventListener('click', () => {
        document.getElementById('gameResultModal').classList.add('hidden');
        document.getElementById('statsModal').classList.remove('hidden');
    });

    if (!localStorage.getItem('numberle_help_seen')) {
        document.getElementById('helpModal').classList.remove('hidden');
        localStorage.setItem('numberle_help_seen', 'true');
    }
    document.getElementById('startGameBtn').addEventListener('click', () => document.getElementById('helpModal').classList.add('hidden'));
    document.getElementById('closeHelp').addEventListener('click', () => document.getElementById('helpModal').classList.add('hidden'));
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleInput('Enter');
    else if (e.key === 'Backspace') handleInput('Backspace');
    else if (/^\d$/.test(e.key)) handleInput(e.key);
});
</script>
</body>
</html>
